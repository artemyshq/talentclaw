<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TalentClaw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fafdfb;
    color: #1c1917;
    font-family: "DM Sans", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    -webkit-user-select: none;
    user-select: none;
    -webkit-app-region: drag;
  }

  .splash-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    width: 64px;
    height: 58px;
    margin-bottom: 20px;
    animation: breathe 3s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }

  .wordmark {
    font-family: "Instrument Serif", Georgia, "Times New Roman", serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: #1c1917;
    margin-bottom: 40px;
    font-feature-settings: "liga" 1, "onum" 1;
  }

  .loader {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }

  .loader-dot {
    width: 5px;
    height: 5px;
    border-radius: 9999px;
    background: #059669;
    animation: pulse 1.4s ease-in-out infinite;
  }

  .loader-dot:nth-child(2) { animation-delay: 0.2s; }
  .loader-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.15; transform: scale(0.8); }
    40%           { opacity: 1;    transform: scale(1); }
  }

  .status {
    font-size: 13px;
    font-weight: 500;
    color: #a8a29e;
    transition: color 0.25s ease-in-out;
  }

  /* Error state */
  .error-state { display: none; text-align: center; }

  body.error .loader { display: none; }
  body.error .status { display: none; }
  body.error .logo   { animation: none; }
  body.error .error-state { display: block; }

  .error-title {
    font-family: "Instrument Serif", Georgia, "Times New Roman", serif;
    font-size: 22px;
    color: #1c1917;
    margin-bottom: 8px;
  }

  .error-message {
    font-size: 14px;
    color: #57534e;
    max-width: 360px;
    line-height: 1.5;
    margin-bottom: 24px;
  }

  .error-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    -webkit-app-region: no-drag;
  }

  .btn {
    padding: 8px 20px;
    border-radius: 6px;
    border: none;
    font-size: 14px;
    font-family: "DM Sans", system-ui, sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease-in-out;
  }

  .btn-primary {
    background: #059669;
    color: #fff;
  }
  .btn-primary:hover { background: #10b981; }

  .btn-secondary {
    background: #f0f5f2;
    color: #57534e;
    border: 1px solid rgba(0,0,0,0.05);
  }
  .btn-secondary:hover { background: #e8ede9; }

  @media (prefers-reduced-motion: reduce) {
    .splash-content { animation: none; }
    .logo { animation: none; }
    .loader-dot { animation: none; opacity: 0.6; transform: scale(1); }
    .status { transition: none; }
  }
</style>
</head>
<body>
  <div class="splash-content">
    <!-- Crab logo inline SVG -->
    <svg class="logo" viewBox="0 0 88 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="26" y1="56" x2="20" y2="74" stroke="#059669" stroke-width="2.5" stroke-linecap="round" />
      <line x1="38" y1="58" x2="34" y2="76" stroke="#059669" stroke-width="2.5" stroke-linecap="round" />
      <line x1="50" y1="58" x2="54" y2="76" stroke="#059669" stroke-width="2.5" stroke-linecap="round" />
      <line x1="62" y1="56" x2="68" y2="74" stroke="#059669" stroke-width="2.5" stroke-linecap="round" />
      <line x1="10" y1="30" x2="2" y2="22" stroke="#059669" stroke-width="3.5" stroke-linecap="round" />
      <line x1="78" y1="30" x2="86" y2="22" stroke="#059669" stroke-width="3.5" stroke-linecap="round" />
      <line x1="2" y1="22" x2="0" y2="14" stroke="#059669" stroke-width="2.5" stroke-linecap="round" />
      <line x1="2" y1="22" x2="8" y2="16" stroke="#059669" stroke-width="2.5" stroke-linecap="round" />
      <line x1="86" y1="22" x2="88" y2="14" stroke="#059669" stroke-width="2.5" stroke-linecap="round" />
      <line x1="86" y1="22" x2="80" y2="16" stroke="#059669" stroke-width="2.5" stroke-linecap="round" />
      <rect x="10" y="14" width="68" height="46" rx="23" fill="#059669" />
      <rect x="28" y="26" width="10" height="9" rx="3" fill="white" />
      <rect x="50" y="26" width="10" height="9" rx="3" fill="white" />
      <rect x="30" y="27" width="7" height="7" rx="2" fill="#1a1a2e" />
      <rect x="52" y="27" width="7" height="7" rx="2" fill="#1a1a2e" />
      <line x1="36" y1="44" x2="52" y2="44" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85" />
    </svg>
    <div class="wordmark">talentclaw</div>
    <div class="loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
    <div class="status" id="status">Starting&hellip;</div>
    <div class="error-state">
      <div class="error-title" id="error-title">Failed to start</div>
      <div class="error-message" id="error-message">Something went wrong while starting the server.</div>
      <div class="error-buttons">
        <button class="btn btn-primary" id="btn-retry">Retry</button>
        <button class="btn btn-secondary" id="btn-quit">Quit</button>
      </div>
    </div>
  </div>
<script>
  window.addEventListener("message", function(e) {
    var data = e.data;
    if (!data || !data.type) return;

    if (data.type === "status") {
      document.getElementById("status").textContent = data.text || "Starting\u2026";
    }

    if (data.type === "error") {
      document.body.classList.add("error");
      if (data.title) document.getElementById("error-title").textContent = data.title;
      if (data.message) document.getElementById("error-message").textContent = data.message;
      document.getElementById("btn-retry").style.display = data.canRetry === false ? "none" : "";
    }
  });

  document.getElementById("btn-retry").addEventListener("click", function() {
    document.body.classList.remove("error");
    document.getElementById("status").textContent = "Retrying\u2026";
    if (window.talentclaw && window.talentclaw.splashRetry) {
      window.talentclaw.splashRetry();
    }
  });

  document.getElementById("btn-quit").addEventListener("click", function() {
    if (window.talentclaw && window.talentclaw.splashQuit) {
      window.talentclaw.splashQuit();
    }
  });
</script>
</body>
</html>
