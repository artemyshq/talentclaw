<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TalentClaw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f0f;
    color: #e7e5e4;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    -webkit-user-select: none;
    user-select: none;
    -webkit-app-region: drag;
  }

  .wordmark {
    font-family: "Instrument Serif", Georgia, "Times New Roman", serif;
    font-size: 42px;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: #e7e5e4;
    margin-bottom: 32px;
    font-feature-settings: "liga" 1, "onum" 1;
  }

  .loader {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }

  .loader-dot {
    width: 6px;
    height: 6px;
    border-radius: 9999px;
    background: #34d399;
    animation: pulse 1.4s ease-in-out infinite;
  }

  .loader-dot:nth-child(2) { animation-delay: 0.2s; }
  .loader-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .status {
    font-size: 14px;
    color: #78716c;
    transition: color 0.25s ease-in-out;
  }

  /* Error state */
  .error-state { display: none; text-align: center; }

  body.error .loader { display: none; }
  body.error .status { display: none; }
  body.error .error-state { display: block; }

  .error-title {
    font-family: "Instrument Serif", Georgia, "Times New Roman", serif;
    font-size: 22px;
    color: #e7e5e4;
    margin-bottom: 8px;
  }

  .error-message {
    font-size: 14px;
    color: #a8a29e;
    max-width: 360px;
    line-height: 1.5;
    margin-bottom: 24px;
  }

  .error-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    -webkit-app-region: no-drag;
  }

  .btn {
    padding: 8px 20px;
    border-radius: 6px;
    border: none;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s ease-in-out;
  }

  .btn-primary {
    background: #059669;
    color: #fff;
  }
  .btn-primary:hover { background: #10b981; }

  .btn-secondary {
    background: #1a1a1a;
    color: #a8a29e;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-secondary:hover { background: #222222; }

  @media (prefers-reduced-motion: reduce) {
    .loader-dot { animation: none; opacity: 0.6; transform: scale(1); }
    .status { transition: none; }
  }
</style>
</head>
<body>
  <div class="wordmark">TalentClaw</div>
  <div class="loader">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
  <div class="status" id="status">Starting&hellip;</div>
  <div class="error-state">
    <div class="error-title" id="error-title">Failed to start</div>
    <div class="error-message" id="error-message">Something went wrong while starting the server.</div>
    <div class="error-buttons">
      <button class="btn btn-primary" id="btn-retry">Retry</button>
      <button class="btn btn-secondary" id="btn-quit">Quit</button>
    </div>
  </div>
<script>
  // Listen for messages from the main process
  window.addEventListener("message", function(e) {
    var data = e.data;
    if (!data || !data.type) return;

    if (data.type === "status") {
      document.getElementById("status").textContent = data.text || "Starting\u2026";
    }

    if (data.type === "error") {
      document.body.classList.add("error");
      if (data.title) document.getElementById("error-title").textContent = data.title;
      if (data.message) document.getElementById("error-message").textContent = data.message;
      // Show/hide retry button based on whether retry is available
      document.getElementById("btn-retry").style.display = data.canRetry === false ? "none" : "";
    }
  });

  document.getElementById("btn-retry").addEventListener("click", function() {
    // Reset to loading state
    document.body.classList.remove("error");
    document.getElementById("status").textContent = "Retrying\u2026";
    // Notify main process via preload bridge
    if (window.talentclaw && window.talentclaw.splashRetry) {
      window.talentclaw.splashRetry();
    }
  });

  document.getElementById("btn-quit").addEventListener("click", function() {
    if (window.talentclaw && window.talentclaw.splashQuit) {
      window.talentclaw.splashQuit();
    }
  });
</script>
</body>
</html>
