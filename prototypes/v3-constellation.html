<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Constellation — Jordan Blue</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #06080d;
    color: #c8ccd4;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', 'Segoe UI', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }

  body.dragging { cursor: grabbing; }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Legend */
  #legend {
    position: fixed;
    bottom: 24px;
    left: 24px;
    background: rgba(10, 14, 22, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px 20px;
    z-index: 10;
    max-width: 560px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11.5px;
    letter-spacing: 0.3px;
    color: rgba(200,204,212,0.7);
    text-transform: capitalize;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--c);
  }

  /* Detail panel */
  #detail-panel {
    position: fixed;
    top: 24px;
    right: 24px;
    width: 280px;
    background: rgba(10, 14, 22, 0.88);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 24px;
    z-index: 20;
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  #detail-panel.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  #detail-panel .type-badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    margin-bottom: 10px;
  }

  #detail-panel .node-label {
    font-size: 18px;
    font-weight: 600;
    color: #eef0f4;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  #detail-panel .node-detail {
    font-size: 13px;
    color: rgba(200,204,212,0.6);
    line-height: 1.5;
  }

  #detail-panel .connections {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 11.5px;
    color: rgba(200,204,212,0.45);
  }

  #detail-panel .close-btn {
    position: absolute;
    top: 12px;
    right: 14px;
    width: 24px;
    height: 24px;
    border: none;
    background: rgba(255,255,255,0.06);
    color: rgba(200,204,212,0.5);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s;
  }

  #detail-panel .close-btn:hover {
    background: rgba(255,255,255,0.1);
    color: rgba(200,204,212,0.8);
  }

  /* Title watermark */
  #title {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 10;
  }

  #title h1 {
    font-size: 14px;
    font-weight: 600;
    color: rgba(200,204,212,0.35);
    letter-spacing: 0.5px;
  }

  #title p {
    font-size: 11px;
    color: rgba(200,204,212,0.2);
    margin-top: 3px;
  }

  /* Zoom controls */
  #zoom-controls {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 10;
  }

  #zoom-controls button {
    width: 36px;
    height: 36px;
    border: 1px solid rgba(255,255,255,0.07);
    background: rgba(10, 14, 22, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: rgba(200,204,212,0.5);
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s;
  }

  #zoom-controls button:hover {
    background: rgba(20, 24, 36, 0.9);
    color: rgba(200,204,212,0.8);
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="title">
  <h1>Career Constellation</h1>
  <p>Jordan Blue</p>
</div>

<div id="legend"></div>

<div id="detail-panel">
  <button class="close-btn" id="close-detail">&times;</button>
  <div class="type-badge" id="detail-type"></div>
  <div class="node-label" id="detail-label"></div>
  <div class="node-detail" id="detail-desc"></div>
  <div class="connections" id="detail-connections"></div>
</div>

<div id="zoom-controls">
  <button id="zoom-in">+</button>
  <button id="zoom-out">&minus;</button>
  <button id="zoom-reset" style="font-size:11px;">&#8634;</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3-dispatch@3/dist/d3-dispatch.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/d3-force@3/dist/d3-force.min.js"></script>

<script>
// ─── Data ───────────────────────────────────────────────────────────
const nodes = [
  { id: "person-jordan-blue", label: "Jordan Blue", type: "person", cluster: "center", detail: "Career Hub", size: 20 },
  { id: "company-artemys", label: "Artemys", type: "company", cluster: "companies", detail: "2024 - present", size: 10 },
  { id: "company-google", label: "Google", type: "company", cluster: "companies", detail: "2020 - 2024", size: 9 },
  { id: "company-stripe", label: "Stripe", type: "company", cluster: "companies", detail: "2017 - 2020", size: 9 },

  { id: "skill-typescript", label: "TypeScript", type: "skill", cluster: "skills", size: 9 },

  { id: "skill-system-design", label: "System Design", type: "skill", cluster: "skills", size: 7 },

  { id: "project-talentclaw", label: "TalentClaw", type: "project", cluster: "projects", detail: "Career advisor for AI agents", size: 8 },
  { id: "project-search-infra", label: "Search Infra", type: "project", cluster: "projects", detail: "Distributed search pipeline", size: 7 },
  { id: "edu-mit", label: "MIT", type: "education", cluster: "education", detail: "BS Computer Science", size: 8 },
  { id: "goal-target-cto", label: "CTO", type: "goal", cluster: "goals", detail: "Target role", size: 8 },
  { id: "goal-target-vp-engineering", label: "VP Engineering", type: "goal", cluster: "goals", detail: "Target role", size: 8 },
  { id: "goal-build-agent-ecosystem", label: "Build Agent Ecosystem", type: "goal", cluster: "goals", detail: "Create the definitive agent-to-agent career network", size: 8 },
  { id: "industry-ai", label: "Artificial Intelligence", type: "industry", cluster: "industries", detail: "Industry", size: 7 },
  { id: "industry-fintech", label: "Fintech", type: "industry", cluster: "industries", detail: "Industry", size: 7 },
  { id: "industry-developer-tools", label: "Developer Tools", type: "industry", cluster: "industries", detail: "Industry", size: 7 },
  { id: "contact-sarah-chen", label: "Sarah Chen", type: "contact", cluster: "companies", detail: "VP Eng at Google", size: 7 },
  { id: "contact-mike-ross", label: "Mike Ross", type: "contact", cluster: "companies", detail: "CTO at Stripe", size: 7 },
];

const edges = [
  { source: "person-jordan-blue", target: "company-artemys" },
  { source: "person-jordan-blue", target: "company-google" },
  { source: "person-jordan-blue", target: "company-stripe" },
  { source: "person-jordan-blue", target: "company-acme-corp" },
  { source: "person-jordan-blue", target: "role-founder-ceo" },
  { source: "person-jordan-blue", target: "role-senior-engineer" },
  { source: "person-jordan-blue", target: "role-backend-engineer" },
  { source: "person-jordan-blue", target: "role-junior-dev" },
  { source: "company-artemys", target: "role-founder-ceo" },
  { source: "company-google", target: "role-senior-engineer" },
  { source: "company-stripe", target: "role-backend-engineer" },
  { source: "company-acme-corp", target: "role-junior-dev" },
  { source: "person-jordan-blue", target: "skill-typescript" },
  { source: "person-jordan-blue", target: "skill-react" },
  { source: "person-jordan-blue", target: "skill-nodejs" },
  { source: "person-jordan-blue", target: "skill-python" },
  { source: "person-jordan-blue", target: "skill-product-strategy" },
  { source: "person-jordan-blue", target: "skill-ai-ml" },
  { source: "role-founder-ceo", target: "skill-typescript" },
  { source: "role-founder-ceo", target: "skill-product-strategy" },
  { source: "role-senior-engineer", target: "skill-graphql" },
  { source: "role-senior-engineer", target: "skill-kubernetes" },
  { source: "role-senior-engineer", target: "skill-system-design" },
  { source: "role-backend-engineer", target: "skill-python" },
  { source: "role-backend-engineer", target: "skill-nodejs" },
  { source: "role-junior-dev", target: "skill-react" },
  { source: "person-jordan-blue", target: "project-openclaw" },
  { source: "person-jordan-blue", target: "project-coffee-shop" },
  { source: "person-jordan-blue", target: "project-talentclaw" },
  { source: "person-jordan-blue", target: "project-search-infra" },
  { source: "company-artemys", target: "project-openclaw" },
  { source: "company-artemys", target: "project-coffee-shop" },
  { source: "company-artemys", target: "project-talentclaw" },
  { source: "company-google", target: "project-search-infra" },
  { source: "project-openclaw", target: "skill-typescript" },
  { source: "project-openclaw", target: "skill-rust" },
  { source: "project-coffee-shop", target: "skill-nodejs" },
  { source: "project-talentclaw", target: "skill-react" },
  { source: "project-search-infra", target: "skill-python" },
  { source: "project-search-infra", target: "skill-kubernetes" },
  { source: "person-jordan-blue", target: "edu-mit" },
  { source: "edu-mit", target: "skill-python" },
  { source: "edu-mit", target: "skill-ai-ml" },
  { source: "person-jordan-blue", target: "goal-target-cto" },
  { source: "person-jordan-blue", target: "goal-target-vp-engineering" },
  { source: "person-jordan-blue", target: "goal-build-agent-ecosystem" },
  { source: "company-artemys", target: "industry-ai" },
  { source: "company-stripe", target: "industry-fintech" },
  { source: "company-google", target: "industry-developer-tools" },
  { source: "industry-ai", target: "industry-developer-tools" },
  { source: "person-jordan-blue", target: "contact-sarah-chen" },
  { source: "person-jordan-blue", target: "contact-mike-ross" },
  { source: "contact-sarah-chen", target: "company-google" },
  { source: "contact-mike-ross", target: "company-stripe" },
];

// ─── Color palette ──────────────────────────────────────────────────
const COLORS = {
  person:    '#059669',
  company:   '#3b82f6',
  role:      '#8b5cf6',
  skill:     '#f59e0b',
  project:   '#ec4899',
  education: '#06b6d4',
  goal:      '#10b981',
  industry:  '#f97316',
  contact:   '#6366f1',
};

const TYPE_LABELS = {
  person: 'Person', company: 'Company', role: 'Role', skill: 'Skill',
  project: 'Project', education: 'Education', goal: 'Goal',
  industry: 'Industry', contact: 'Contact',
};

// ─── Build adjacency ────────────────────────────────────────────────
const nodeMap = new Map();
nodes.forEach(n => { n.connections = []; nodeMap.set(n.id, n); });
edges.forEach(e => {
  const s = nodeMap.get(e.source);
  const t = nodeMap.get(e.target);
  if (s && t) { s.connections.push(t.id); t.connections.push(s.id); }
});

// ─── Legend ──────────────────────────────────────────────────────────
const legendEl = document.getElementById('legend');
Object.entries(COLORS).forEach(([type, color]) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${color};--c:${color}"></span>${TYPE_LABELS[type]}`;
  legendEl.appendChild(item);
});

// ─── Canvas setup ───────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ─── Stars (background particles) ──────────────────────────────────
const STAR_COUNT = 400;
const stars = [];
for (let i = 0; i < STAR_COUNT; i++) {
  stars.push({
    x: Math.random() * 4000 - 2000,
    y: Math.random() * 4000 - 2000,
    r: Math.random() * 1.2 + 0.2,
    brightness: Math.random(),
    twinkleSpeed: Math.random() * 0.002 + 0.001,
    twinkleOffset: Math.random() * Math.PI * 2,
  });
}

// ─── Dust particles (ambient floating) ─────────────────────────────
const DUST_COUNT = 60;
const dust = [];
for (let i = 0; i < DUST_COUNT; i++) {
  dust.push({
    x: Math.random() * 3000 - 1500,
    y: Math.random() * 3000 - 1500,
    vx: (Math.random() - 0.5) * 0.08,
    vy: (Math.random() - 0.5) * 0.08,
    r: Math.random() * 1.5 + 0.5,
    alpha: Math.random() * 0.15 + 0.03,
  });
}

// ─── Camera state ───────────────────────────────────────────────────
let cam = { x: 0, y: 0, zoom: 1, targetX: 0, targetY: 0, targetZoom: 1 };

function screenToWorld(sx, sy) {
  return {
    x: (sx - W / 2) / cam.zoom + cam.x,
    y: (sy - H / 2) / cam.zoom + cam.y,
  };
}

function worldToScreen(wx, wy) {
  return {
    x: (wx - cam.x) * cam.zoom + W / 2,
    y: (wy - cam.y) * cam.zoom + H / 2,
  };
}

// ─── Force simulation ───────────────────────────────────────────────
// Cluster centers — push clusters to different quadrants for visual separation
const clusterTargets = {
  center:     { x: 0,    y: 0 },
  companies:  { x: -220, y: -160 },
  titles:     { x: 220,  y: -160 },
  skills:     { x: 0,    y: 200 },
  projects:   { x: -240, y: 120 },
  education:  { x: 280,  y: 60 },
  goals:      { x: 260,  y: 180 },
  industries: { x: -160, y: -280 },
};

// Clone edges for d3 (it mutates them)
const simEdges = edges.map(e => ({ source: e.source, target: e.target }));

const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(simEdges).id(d => d.id).distance(d => {
    const s = nodeMap.get(typeof d.source === 'string' ? d.source : d.source.id);
    const t = nodeMap.get(typeof d.target === 'string' ? d.target : d.target.id);
    if (s && t && (s.type === 'person' || t.type === 'person')) return 120;
    return 70;
  }).strength(0.4))
  .force('charge', d3.forceManyBody().strength(d => d.type === 'person' ? -600 : -200).distanceMax(500))
  .force('collision', d3.forceCollide().radius(d => d.size * 1.8 + 8))
  .force('cluster', alpha => {
    nodes.forEach(n => {
      const target = clusterTargets[n.cluster];
      if (!target) return;
      const k = alpha * 0.15;
      n.vx += (target.x - n.x) * k;
      n.vy += (target.y - n.y) * k;
    });
  })
  .force('center', d3.forceCenter(0, 0).strength(0.02))
  .alphaDecay(0.015)
  .velocityDecay(0.35)
  .on('tick', () => {});

// ─── Interaction state ──────────────────────────────────────────────
let hoveredNode = null;
let selectedNode = null;
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let camStart = { x: 0, y: 0 };
let isDraggingNode = null;
let mouseScreen = { x: -9999, y: -9999 };

// Ambient drift for nodes (gentle breathing)
let time = 0;

// ─── Hit testing ────────────────────────────────────────────────────
function hitTest(sx, sy) {
  const w = screenToWorld(sx, sy);
  let closest = null;
  let closestDist = Infinity;
  for (const n of nodes) {
    const dx = n.x - w.x;
    const dy = n.y - w.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const hitRadius = (n.size * 1.2 + 6) / cam.zoom;
    if (dist < hitRadius && dist < closestDist) {
      closest = n;
      closestDist = dist;
    }
  }
  return closest;
}

// ─── Mouse events ───────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  mouseScreen.x = e.clientX;
  mouseScreen.y = e.clientY;

  if (isDraggingNode) {
    const w = screenToWorld(e.clientX, e.clientY);
    isDraggingNode.fx = w.x;
    isDraggingNode.fy = w.y;
    simulation.alpha(0.1).restart();
    return;
  }

  if (isDragging) {
    const dx = (e.clientX - dragStart.x) / cam.zoom;
    const dy = (e.clientY - dragStart.y) / cam.zoom;
    cam.targetX = camStart.x - dx;
    cam.targetY = camStart.y - dy;
    return;
  }

  const hit = hitTest(e.clientX, e.clientY);
  hoveredNode = hit;
  canvas.style.cursor = hit ? 'pointer' : 'grab';
});

canvas.addEventListener('mousedown', e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    isDraggingNode = hit;
    hit.fx = hit.x;
    hit.fy = hit.y;
    simulation.alphaTarget(0.05).restart();
    return;
  }
  isDragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  camStart = { x: cam.targetX, y: cam.targetY };
  document.body.classList.add('dragging');
});

canvas.addEventListener('mouseup', e => {
  if (isDraggingNode) {
    // If we barely moved, treat as click (select)
    const w = screenToWorld(e.clientX, e.clientY);
    const dx = isDraggingNode.fx - isDraggingNode.x;
    const dy = isDraggingNode.fy - isDraggingNode.y;
    isDraggingNode.fx = null;
    isDraggingNode.fy = null;
    simulation.alphaTarget(0);

    const hit = hitTest(e.clientX, e.clientY);
    if (hit) {
      selectNode(hit);
    }

    isDraggingNode = null;
    return;
  }
  if (isDragging) {
    isDragging = false;
    document.body.classList.remove('dragging');

    // If barely moved, deselect
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    if (Math.abs(dx) < 3 && Math.abs(dy) < 3) {
      selectNode(null);
    }
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 0.92 : 1.08;
  cam.targetZoom = Math.max(0.2, Math.min(4, cam.targetZoom * zoomFactor));

  // Zoom toward mouse position
  const w = screenToWorld(e.clientX, e.clientY);
  const newZoom = cam.targetZoom;
  cam.targetX = w.x - (e.clientX - W / 2) / newZoom;
  cam.targetY = w.y - (e.clientY - H / 2) / newZoom;
}, { passive: false });

// Touch support
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const hit = hitTest(t.clientX, t.clientY);
    if (hit) {
      selectNode(hit);
    } else {
      isDragging = true;
      dragStart = { x: t.clientX, y: t.clientY };
      camStart = { x: cam.targetX, y: cam.targetY };
    }
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx * dx + dy * dy);
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    const t = e.touches[0];
    const dx = (t.clientX - dragStart.x) / cam.zoom;
    const dy = (t.clientY - dragStart.y) / cam.zoom;
    cam.targetX = camStart.x - dx;
    cam.targetY = camStart.y - dy;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (lastTouchDist > 0) {
      const scale = dist / lastTouchDist;
      cam.targetZoom = Math.max(0.2, Math.min(4, cam.targetZoom * scale));
    }
    lastTouchDist = dist;
  }
}, { passive: false });

canvas.addEventListener('touchend', () => {
  isDragging = false;
  lastTouchDist = 0;
});

// ─── Zoom controls ──────────────────────────────────────────────────
document.getElementById('zoom-in').addEventListener('click', () => {
  cam.targetZoom = Math.min(4, cam.targetZoom * 1.3);
});
document.getElementById('zoom-out').addEventListener('click', () => {
  cam.targetZoom = Math.max(0.2, cam.targetZoom * 0.7);
});
document.getElementById('zoom-reset').addEventListener('click', () => {
  cam.targetX = 0; cam.targetY = 0; cam.targetZoom = 1;
  selectNode(null);
});

// ─── Detail panel ───────────────────────────────────────────────────
const detailPanel = document.getElementById('detail-panel');
const detailType = document.getElementById('detail-type');
const detailLabel = document.getElementById('detail-label');
const detailDesc = document.getElementById('detail-desc');
const detailConnections = document.getElementById('detail-connections');

document.getElementById('close-detail').addEventListener('click', () => selectNode(null));

function selectNode(node) {
  selectedNode = node;
  if (!node) {
    detailPanel.classList.remove('visible');
    return;
  }
  const color = COLORS[node.type];
  detailType.textContent = TYPE_LABELS[node.type];
  detailType.style.background = color + '20';
  detailType.style.color = color;
  detailLabel.textContent = node.label;
  detailDesc.textContent = node.detail || '';

  const connLabels = node.connections
    .map(id => nodeMap.get(id))
    .filter(Boolean)
    .map(n => n.label);
  detailConnections.textContent = connLabels.length
    ? `${connLabels.length} connection${connLabels.length > 1 ? 's' : ''}: ${connLabels.join(', ')}`
    : 'No connections';

  detailPanel.classList.add('visible');
}

// ─── Drawing helpers ────────────────────────────────────────────────

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

// Pre-compute RGB values
const COLORS_RGB = {};
for (const [type, hex] of Object.entries(COLORS)) {
  COLORS_RGB[type] = hexToRgb(hex);
}

// ─── Render ─────────────────────────────────────────────────────────

// Build a set of connected node ids for hover/select highlighting
function getConnectedSet(node) {
  if (!node) return null;
  const set = new Set([node.id]);
  node.connections.forEach(id => set.add(id));
  return set;
}

function render() {
  time += 0.016; // ~60fps tick

  // Smooth camera
  cam.x += (cam.targetX - cam.x) * 0.12;
  cam.y += (cam.targetY - cam.y) * 0.12;
  cam.zoom += (cam.targetZoom - cam.zoom) * 0.12;

  ctx.clearRect(0, 0, W, H);

  // Background gradient (subtle vignette)
  const vignette = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
  vignette.addColorStop(0, '#0a0e16');
  vignette.addColorStop(1, '#040609');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  // ── Background stars ──
  for (const star of stars) {
    const s = worldToScreen(star.x, star.y);
    // Parallax: stars move slower
    const px = (s.x - W / 2) * 0.3 + W / 2;
    const py = (s.y - H / 2) * 0.3 + H / 2;
    if (px < -20 || px > W + 20 || py < -20 || py > H + 20) continue;

    const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(time * star.twinkleSpeed * 60 + star.twinkleOffset));
    const alpha = star.brightness * twinkle * 0.4;
    ctx.beginPath();
    ctx.arc(px, py, star.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180, 200, 230, ${alpha})`;
    ctx.fill();
  }

  // ── Dust particles ──
  for (const d of dust) {
    d.x += d.vx;
    d.y += d.vy;
    // Wrap around
    if (d.x < -1500) d.x = 1500;
    if (d.x > 1500) d.x = -1500;
    if (d.y < -1500) d.y = 1500;
    if (d.y > 1500) d.y = -1500;

    const s = worldToScreen(d.x, d.y);
    if (s.x < -20 || s.x > W + 20 || s.y < -20 || s.y > H + 20) continue;
    ctx.beginPath();
    ctx.arc(s.x, s.y, d.r * cam.zoom, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(140, 160, 200, ${d.alpha})`;
    ctx.fill();
  }

  // Determine highlight set
  const focusNode = hoveredNode || selectedNode;
  const connSet = getConnectedSet(focusNode);
  const hasFocus = !!connSet;

  // ── Edges ──
  for (const edge of simEdges) {
    const s = typeof edge.source === 'object' ? edge.source : nodeMap.get(edge.source);
    const t = typeof edge.target === 'object' ? edge.target : nodeMap.get(edge.target);
    if (!s || !t || s.x == null || t.x == null) continue;

    const p1 = worldToScreen(s.x, s.y);
    const p2 = worldToScreen(t.x, t.y);

    // Frustum cull
    const minX = Math.min(p1.x, p2.x);
    const maxX = Math.max(p1.x, p2.x);
    const minY = Math.min(p1.y, p2.y);
    const maxY = Math.max(p1.y, p2.y);
    if (maxX < -50 || minX > W + 50 || maxY < -50 || minY > H + 50) continue;

    const sId = typeof edge.source === 'object' ? edge.source.id : edge.source;
    const tId = typeof edge.target === 'object' ? edge.target.id : edge.target;

    let edgeAlpha, edgeWidth;
    if (hasFocus) {
      const isConnected = connSet.has(sId) && connSet.has(tId);
      if (isConnected) {
        // Bright highlighted edge
        const srcColor = COLORS_RGB[s.type] || COLORS_RGB.person;
        const tgtColor = COLORS_RGB[t.type] || COLORS_RGB.person;
        const grad = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
        grad.addColorStop(0, `rgba(${srcColor.r},${srcColor.g},${srcColor.b},0.5)`);
        grad.addColorStop(1, `rgba(${tgtColor.r},${tgtColor.g},${tgtColor.b},0.5)`);
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        continue;
      } else {
        edgeAlpha = 0.03;
        edgeWidth = 0.5;
      }
    } else {
      edgeAlpha = 0.08;
      edgeWidth = 0.8;
    }

    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = `rgba(100, 120, 160, ${edgeAlpha})`;
    ctx.lineWidth = edgeWidth;
    ctx.stroke();
  }

  // ── Nodes ──
  for (const node of nodes) {
    if (node.x == null) continue;

    // Ambient drift
    const driftX = Math.sin(time * 0.3 + node.x * 0.01) * 0.3;
    const driftY = Math.cos(time * 0.25 + node.y * 0.01) * 0.3;
    const wx = node.x + driftX;
    const wy = node.y + driftY;

    const p = worldToScreen(wx, wy);
    if (p.x < -80 || p.x > W + 80 || p.y < -80 || p.y > H + 80) continue;

    const color = COLORS[node.type];
    const rgb = COLORS_RGB[node.type];
    const baseRadius = node.size * 0.5;
    const screenRadius = baseRadius * cam.zoom;

    const isCenter = node.type === 'person';
    const isHovered = hoveredNode === node;
    const isSelected = selectedNode === node;
    const isConnected = connSet && connSet.has(node.id);

    // Determine alpha and scale based on focus state
    let alpha = 1;
    let scale = 1;
    let glowIntensity = isCenter ? 0.6 : 0.25;

    if (hasFocus) {
      if (isHovered || isSelected) {
        scale = 1.2;
        glowIntensity = 0.9;
      } else if (isConnected) {
        alpha = 1;
        glowIntensity = 0.5;
      } else {
        alpha = 0.12;
        glowIntensity = 0.05;
      }
    } else if (isHovered) {
      scale = 1.15;
      glowIntensity = 0.8;
    }

    const r = screenRadius * scale;

    // Outer glow
    if (glowIntensity > 0.05) {
      const glowRadius = r * (isCenter ? 5 : 3.5);
      const glow = ctx.createRadialGradient(p.x, p.y, r * 0.5, p.x, p.y, glowRadius);
      glow.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},${glowIntensity * alpha * 0.4})`);
      glow.addColorStop(0.4, `rgba(${rgb.r},${rgb.g},${rgb.b},${glowIntensity * alpha * 0.12})`);
      glow.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
      ctx.beginPath();
      ctx.arc(p.x, p.y, glowRadius, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
    }

    // Person node gets a special pulsing ring
    if (isCenter) {
      const pulsePhase = 0.5 + 0.5 * Math.sin(time * 1.2);
      const ringRadius = r * (1.8 + pulsePhase * 0.6);
      ctx.beginPath();
      ctx.arc(p.x, p.y, ringRadius, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${0.08 + pulsePhase * 0.06})`;
      ctx.lineWidth = 1;
      ctx.stroke();

      // Second ring
      const ring2Radius = r * (2.5 + pulsePhase * 0.8);
      ctx.beginPath();
      ctx.arc(p.x, p.y, ring2Radius, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${0.03 + pulsePhase * 0.03})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    // Core dot
    const coreGrad = ctx.createRadialGradient(p.x - r * 0.2, p.y - r * 0.2, 0, p.x, p.y, r);
    coreGrad.addColorStop(0, `rgba(255,255,255,${alpha * 0.9})`);
    coreGrad.addColorStop(0.3, `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`);
    coreGrad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha * 0.7})`);
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = coreGrad;
    ctx.fill();

    // Label
    const showLabel = cam.zoom > 0.5 || isCenter || isHovered || isSelected || (isConnected && hasFocus);
    if (showLabel) {
      let labelAlpha = alpha;
      if (!hasFocus && !isCenter && !isHovered) {
        // Fade label based on zoom
        labelAlpha = Math.min(1, (cam.zoom - 0.5) * 2) * alpha;
      }
      if (labelAlpha > 0.02) {
        const fontSize = Math.max(9, Math.min(13, 11 * cam.zoom));
        ctx.font = `${isCenter || isHovered || isSelected ? '600' : '400'} ${fontSize}px -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';

        const labelY = p.y + r + 6;
        const text = node.label;

        // Text shadow for readability
        ctx.fillStyle = `rgba(6, 8, 13, ${labelAlpha * 0.8})`;
        ctx.fillText(text, p.x + 1, labelY + 1);

        ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${labelAlpha * 0.85})`;
        ctx.fillText(text, p.x, labelY);
      }
    }
  }

  requestAnimationFrame(render);
}

// ─── Initial camera: fit all nodes ──────────────────────────────────
simulation.on('end', () => {
  // After simulation settles, ensure view is nice
});

// Kick off rendering immediately
requestAnimationFrame(render);

// After a brief warm-up, re-center
setTimeout(() => {
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    if (n.x < minX) minX = n.x;
    if (n.x > maxX) maxX = n.x;
    if (n.y < minY) minY = n.y;
    if (n.y > maxY) maxY = n.y;
  });
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const rangeX = maxX - minX + 200;
  const rangeY = maxY - minY + 200;
  const fitZoom = Math.min(W / rangeX, H / rangeY, 1.5);
  cam.targetX = cx;
  cam.targetY = cy;
  cam.targetZoom = fitZoom * 0.85;
}, 800);
</script>
</body>
</html>
