<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Nebula — Jordan Blue</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050810;
    color: #c8ccd4;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', 'Segoe UI', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }

  body.dragging { cursor: grabbing; }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Legend */
  #legend {
    position: fixed;
    bottom: 24px;
    left: 24px;
    background: rgba(8, 12, 20, 0.82);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px 20px;
    z-index: 10;
    max-width: 560px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11.5px;
    letter-spacing: 0.3px;
    color: rgba(200,204,212,0.7);
    text-transform: capitalize;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--c);
  }

  /* Tooltip */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(8, 12, 20, 0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 16px;
    z-index: 30;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    max-width: 240px;
  }

  #tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }

  #tooltip .tt-label {
    font-size: 13px;
    font-weight: 600;
    color: #e8ecf4;
    margin-bottom: 2px;
  }

  #tooltip .tt-type {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    opacity: 0.5;
    margin-bottom: 4px;
  }

  #tooltip .tt-detail {
    font-size: 11.5px;
    color: rgba(200,204,212,0.7);
    line-height: 1.4;
  }

  /* Detail panel */
  #detail-panel {
    position: fixed;
    top: 24px;
    right: 24px;
    width: 300px;
    background: rgba(8, 12, 20, 0.9);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);

    padding: 24px;
    z-index: 20;
    opacity: 0;

    pointer-events: none;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  #detail-panel.visible {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }

  #detail-panel .dp-close {

    top: 12px;
    right: 14px;
    background: none;
    border: none;
    color: rgba(200,204,212,0.4);

    padding: 4px 8px;

  }

  #detail-panel .dp-close:hover {
    color: rgba(200,204,212,0.8);
    background: rgba(255,255,255,0.05);
  }

    text-transform: uppercase;
    letter-spacing: 1px;

    color: #e8ecf4;

  #detail-panel .dp-detail {

    margin-bottom: 16px;

  #detail-panel .dp-connections-title {

    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(200,204,212,0.4);
    margin-bottom: 8px;

  #detail-panel .dp-connection {

    align-items: center;

    padding: 5px 0;
    font-size: 12px;

    width: 6px;

    border-radius: 50%;

    top: 24px;

    z-index: 10;

  #title h1 {
    font-size: 16px;

  }

  #title p {
    font-size: 11px;
    color: rgba(200,204,212,0.35);
    margin-top: 4px;
    letter-spacing: 0.3px;
  }
</style>

<script>

  { id: "edu-mit", label: "MIT", type: "education", cluster: "education", detail: "BS Computer Science", size: 8 },
  { id: "goal-target-cto", label: "CTO", type: "goal", cluster: "goals", detail: "Target role", size: 8 },

  { id: "industry-ai", label: "Artificial Intelligence", type: "industry", cluster: "industries", detail: "Industry", size: 7 },

  { id: "contact-mike-ross", label: "Mike Ross", type: "contact", cluster: "companies", detail: "CTO at Stripe", size: 7 },
];

const edges = [
  { source: "person-jordan-blue", target: "company-artemys" },
  { source: "person-jordan-blue", target: "company-google" },
  { source: "person-jordan-blue", target: "company-stripe" },
  { source: "person-jordan-blue", target: "company-acme-corp" },
  { source: "person-jordan-blue", target: "role-founder-ceo" },
  { source: "person-jordan-blue", target: "role-senior-engineer" },
  { source: "person-jordan-blue", target: "role-backend-engineer" },
  { source: "person-jordan-blue", target: "role-junior-dev" },
  { source: "company-artemys", target: "role-founder-ceo" },
  { source: "company-google", target: "role-senior-engineer" },
  { source: "company-stripe", target: "role-backend-engineer" },
  { source: "company-acme-corp", target: "role-junior-dev" },
  { source: "person-jordan-blue", target: "skill-typescript" },
  { source: "person-jordan-blue", target: "skill-react" },
  { source: "person-jordan-blue", target: "skill-nodejs" },
  { source: "person-jordan-blue", target: "skill-python" },
  { source: "person-jordan-blue", target: "skill-product-strategy" },
  { source: "person-jordan-blue", target: "skill-ai-ml" },
  { source: "role-founder-ceo", target: "skill-typescript" },
  { source: "role-founder-ceo", target: "skill-product-strategy" },
  { source: "role-senior-engineer", target: "skill-graphql" },
  { source: "role-senior-engineer", target: "skill-kubernetes" },
  { source: "role-senior-engineer", target: "skill-system-design" },
  { source: "role-backend-engineer", target: "skill-python" },
  { source: "role-backend-engineer", target: "skill-nodejs" },
  { source: "role-junior-dev", target: "skill-react" },
  { source: "person-jordan-blue", target: "project-openclaw" },
  { source: "person-jordan-blue", target: "project-coffee-shop" },
  { source: "person-jordan-blue", target: "project-talentclaw" },
  { source: "person-jordan-blue", target: "project-search-infra" },
  { source: "company-artemys", target: "project-openclaw" },
  { source: "company-artemys", target: "project-coffee-shop" },
  { source: "company-artemys", target: "project-talentclaw" },
  { source: "company-google", target: "project-search-infra" },
  { source: "project-openclaw", target: "skill-typescript" },
  { source: "project-openclaw", target: "skill-rust" },
  { source: "project-coffee-shop", target: "skill-nodejs" },
  { source: "project-talentclaw", target: "skill-react" },
  { source: "project-search-infra", target: "skill-python" },
  { source: "project-search-infra", target: "skill-kubernetes" },
  { source: "person-jordan-blue", target: "edu-mit" },
  { source: "edu-mit", target: "skill-python" },
  { source: "edu-mit", target: "skill-ai-ml" },
  { source: "person-jordan-blue", target: "goal-target-cto" },
  { source: "person-jordan-blue", target: "goal-target-vp-engineering" },
  { source: "person-jordan-blue", target: "goal-build-agent-ecosystem" },
  { source: "company-artemys", target: "industry-ai" },
  { source: "company-stripe", target: "industry-fintech" },
  { source: "company-google", target: "industry-developer-tools" },
  { source: "industry-ai", target: "industry-developer-tools" },
  { source: "person-jordan-blue", target: "contact-sarah-chen" },
  { source: "person-jordan-blue", target: "contact-mike-ross" },
  { source: "contact-sarah-chen", target: "company-google" },
  { source: "contact-mike-ross", target: "company-stripe" },
];

// ─── Color palette ────────────────────────────────────────────────────────

const COLORS = {
  person:    '#059669',
  company:   '#3b82f6',
  role:      '#8b5cf6',
  skill:     '#f59e0b',
  project:   '#ec4899',
  education: '#06b6d4',
  goal:      '#10b981',
  industry:  '#f97316',
  contact:   '#6366f1',
};

// Cluster target positions (angles around center, as fractions of 2PI)
const CLUSTER_ANGLES = {
  center:     null,
  companies:  0,
  titles:     1,
  skills:     2,
  projects:   3,
  education:  4,
  goals:      5,
  industries: 6,
};

const CLUSTER_COUNT = 7;

// ─── Canvas setup ─────────────────────────────────────────────────────────

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ─── Camera (pan & zoom) ──────────────────────────────────────────────────

let camera = { x: 0, y: 0, zoom: 1 };
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let cameraStart = { x: 0, y: 0 };
let draggedNode = null;

function screenToWorld(sx, sy) {
  return {
    x: (sx - W / 2) / camera.zoom + camera.x,
    y: (sy - H / 2) / camera.zoom + camera.y,
  };
}

function worldToScreen(wx, wy) {
  return {
    x: (wx - camera.x) * camera.zoom + W / 2,
    y: (wy - camera.y) * camera.zoom + H / 2,
  };
}

// ─── Build node index ─────────────────────────────────────────────────────

const nodeMap = new Map();
nodes.forEach(n => {
  n.x = 0;
  n.y = 0;
  n.vx = 0;
  n.vy = 0;
  nodeMap.set(n.id, n);
});

// Resolve edges to node references
const resolvedEdges = edges.map(e => ({
  source: nodeMap.get(e.source),
  target: nodeMap.get(e.target),
})).filter(e => e.source && e.target);

// ─── Force simulation ─────────────────────────────────────────────────────

const clusterRadius = 200;

// Calculate cluster centers
const clusterCenters = {};
Object.entries(CLUSTER_ANGLES).forEach(([name, idx]) => {
  if (idx === null) {
    clusterCenters[name] = { x: 0, y: 0 };
  } else {
    const angle = (idx / CLUSTER_COUNT) * Math.PI * 2 - Math.PI / 2;
    clusterCenters[name] = {
      x: Math.cos(angle) * clusterRadius,
      y: Math.sin(angle) * clusterRadius,
    };
  }
});

// Custom cluster force — gently pull nodes toward their cluster center
function forceCluster(alpha) {
  const strength = 0.3;
  nodes.forEach(n => {
    const center = clusterCenters[n.cluster];
    if (!center) return;
    n.vx += (center.x - n.x) * strength * alpha;
    n.vy += (center.y - n.y) * strength * alpha;
  });
}

const simulation = d3.forceSimulation(nodes)
  .force('charge', d3.forceManyBody().strength(d => d.type === 'person' ? -300 : -80))
  .force('link', d3.forceLink(resolvedEdges).id(d => d.id).distance(d => {
    if (d.source.type === 'person' || d.target.type === 'person') return 120;
    return 70;
  }).strength(0.3))
  .force('collision', d3.forceCollide().radius(d => d.size * 1.8 + 4))
  .force('cluster', forceCluster)
  .force('center', d3.forceCenter(0, 0).strength(0.05))
  .alphaDecay(0.015)
  .velocityDecay(0.35)
  .on('tick', () => {});

// Let the simulation run for a bit to settle
simulation.alpha(1).restart();

// ─── Nebula clouds (precompute per cluster) ───────────────────────────────

function getClusterNodes(clusterName) {
  return nodes.filter(n => n.cluster === clusterName);
}

function getClusterColor(clusterName) {
  const cn = getClusterNodes(clusterName);
  if (cn.length === 0) return '#ffffff';
  // Use the most common type color
  const types = {};
  cn.forEach(n => { types[n.type] = (types[n.type] || 0) + 1; });
  const dominant = Object.entries(types).sort((a, b) => b[1] - a[1])[0][0];
  return COLORS[dominant] || '#ffffff';
}

// ─── Stars (background particles) ────────────────────────────────────────

const stars = [];
for (let i = 0; i < 300; i++) {
  stars.push({
    x: (Math.random() - 0.5) * 2000,
    y: (Math.random() - 0.5) * 2000,
    r: Math.random() * 1.2 + 0.2,
    brightness: Math.random() * 0.5 + 0.1,
    twinkleSpeed: Math.random() * 0.002 + 0.001,
    twinkleOffset: Math.random() * Math.PI * 2,
  });
}

// ─── Animation state ─────────────────────────────────────────────────────

let time = 0;
let hoveredNode = null;
let selectedNode = null;
let tooltipEl = document.getElementById('tooltip');
let detailPanel = document.getElementById('detail-panel');

// ─── Helper: parse hex to rgb ────────────────────────────────────────────

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

// ─── Helper: get connected nodes ─────────────────────────────────────────

function getConnected(nodeId) {
  const connected = new Set();
  resolvedEdges.forEach(e => {
    if (e.source.id === nodeId) connected.add(e.target.id);
    if (e.target.id === nodeId) connected.add(e.source.id);
  });
  return connected;
}

// ─── Render ──────────────────────────────────────────────────────────────

function render() {
  time += 0.016;
  ctx.save();
  ctx.clearRect(0, 0, W, H);

  // Deep space background
  const bgGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
  bgGrad.addColorStop(0, '#0a0e1a');
  bgGrad.addColorStop(1, '#050810');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Apply camera transform
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-camera.x, -camera.y);

  // Draw background stars
  stars.forEach(s => {
    const twinkle = Math.sin(time * s.twinkleSpeed * 60 + s.twinkleOffset) * 0.3 + 0.7;
    const alpha = s.brightness * twinkle;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 210, 230, ${alpha})`;
    ctx.fill();
  });

  // ─── Nebula clouds ─────────────────────────────────────────────────────
  const clusterNames = Object.keys(CLUSTER_ANGLES);
  clusterNames.forEach(clusterName => {
    const cn = getClusterNodes(clusterName);
    if (cn.length === 0) return;

    // Compute bounding box of cluster
    let cx = 0, cy = 0;
    cn.forEach(n => { cx += n.x; cy += n.y; });
    cx /= cn.length;
    cy /= cn.length;

    // Compute spread
    let maxDist = 0;
    cn.forEach(n => {
      const d = Math.hypot(n.x - cx, n.y - cy);
      if (d > maxDist) maxDist = d;
    });

    const nebulaRadius = Math.max(maxDist + 60, 80);
    const color = getClusterColor(clusterName);
    const rgb = hexToRgb(color);

    // Breathing animation
    const breathe = Math.sin(time * 0.5 + clusterNames.indexOf(clusterName) * 0.8) * 0.08 + 1;
    const r = nebulaRadius * breathe;

    // Draw multiple overlapping soft radial gradients for organic feel
    for (let layer = 0; layer < 3; layer++) {
      const offsetX = Math.sin(time * 0.3 + layer * 2.1) * 8;
      const offsetY = Math.cos(time * 0.25 + layer * 1.7) * 8;
      const layerR = r * (1 + layer * 0.15);
      const alpha = clusterName === 'center' ? 0.06 : 0.045;

      const grad = ctx.createRadialGradient(
        cx + offsetX, cy + offsetY, 0,
        cx + offsetX, cy + offsetY, layerR
      );
      grad.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha * (1 - layer * 0.25)})`);
      grad.addColorStop(0.4, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha * 0.6 * (1 - layer * 0.2)})`);
      grad.addColorStop(0.7, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha * 0.2})`);
      grad.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);

      ctx.beginPath();
      ctx.arc(cx + offsetX, cy + offsetY, layerR, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Extra glow core for the center node (person)
    if (clusterName === 'center') {
      const personNode = cn[0];
      if (personNode) {
        const pulseR = 50 + Math.sin(time * 0.8) * 8;
        const coreGrad = ctx.createRadialGradient(
          personNode.x, personNode.y, 0,
          personNode.x, personNode.y, pulseR
        );
        coreGrad.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.15)`);
        coreGrad.addColorStop(0.5, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.06)`);
        coreGrad.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
        ctx.beginPath();
        ctx.arc(personNode.x, personNode.y, pulseR, 0, Math.PI * 2);
        ctx.fillStyle = coreGrad;
        ctx.fill();
      }
    }
  });

  // ─── Edges ─────────────────────────────────────────────────────────────

  const activeConnections = hoveredNode ? getConnected(hoveredNode.id) : (selectedNode ? getConnected(selectedNode.id) : null);
  const highlightNode = hoveredNode || selectedNode;

  resolvedEdges.forEach(e => {
    const sx = e.source.x;
    const sy = e.source.y;
    const tx = e.target.x;
    const ty = e.target.y;

    const sourceColor = COLORS[e.source.type] || '#ffffff';
    const targetColor = COLORS[e.target.type] || '#ffffff';
    const srcRgb = hexToRgb(sourceColor);
    const tgtRgb = hexToRgb(targetColor);

    // Determine if this edge is highlighted
    let alpha = 0.12;
    let width = 0.8;

    if (highlightNode) {
      const isConnected = (e.source.id === highlightNode.id || e.target.id === highlightNode.id);
      if (isConnected) {
        alpha = 0.5;
        width = 1.5;
      } else {
        alpha = 0.04;
        width = 0.4;
      }
    }

    // Soft breathing on edge alpha
    alpha *= (0.85 + Math.sin(time * 0.7 + (sx + sy) * 0.01) * 0.15);

    // Draw gradient edge
    const grad = ctx.createLinearGradient(sx, sy, tx, ty);
    grad.addColorStop(0, `rgba(${srcRgb.r}, ${srcRgb.g}, ${srcRgb.b}, ${alpha})`);
    grad.addColorStop(1, `rgba(${tgtRgb.r}, ${tgtRgb.g}, ${tgtRgb.b}, ${alpha})`);

    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(tx, ty);
    ctx.strokeStyle = grad;
    ctx.lineWidth = width;
    ctx.stroke();

    // Glow on highlighted edges
    if (highlightNode && (e.source.id === highlightNode.id || e.target.id === highlightNode.id)) {
      const glowGrad = ctx.createLinearGradient(sx, sy, tx, ty);
      glowGrad.addColorStop(0, `rgba(${srcRgb.r}, ${srcRgb.g}, ${srcRgb.b}, ${alpha * 0.3})`);
      glowGrad.addColorStop(1, `rgba(${tgtRgb.r}, ${tgtRgb.g}, ${tgtRgb.b}, ${alpha * 0.3})`);
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(tx, ty);
      ctx.strokeStyle = glowGrad;
      ctx.lineWidth = width + 3;
      ctx.stroke();
    }
  });

  // ─── Nodes ─────────────────────────────────────────────────────────────

  nodes.forEach(n => {
    const color = COLORS[n.type] || '#ffffff';
    const rgb = hexToRgb(color);
    const baseRadius = n.size * (n.type === 'person' ? 1.4 : 0.9);

    // Pulse
    const pulse = Math.sin(time * 1.2 + n.x * 0.01 + n.y * 0.01) * 0.1 + 1;
    const radius = baseRadius * pulse;

    // Determine visual state
    let nodeAlpha = 1;
    let glowMultiplier = 1;
    const isHovered = hoveredNode && hoveredNode.id === n.id;
    const isSelected = selectedNode && selectedNode.id === n.id;
    const isConnectedToHighlight = activeConnections && activeConnections.has(n.id);
    const isHighlightNode = highlightNode && highlightNode.id === n.id;

    if (highlightNode && !isHighlightNode && !isConnectedToHighlight) {
      nodeAlpha = 0.2;
      glowMultiplier = 0.3;
    }
    if (isHovered || isSelected) {
      glowMultiplier = 2;
    }
    if (isConnectedToHighlight) {
      glowMultiplier = 1.5;
    }

    // Outer glow
    const glowRadius = radius * 3 * glowMultiplier;
    const glowGrad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glowRadius);
    glowGrad.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${0.2 * nodeAlpha * glowMultiplier})`);
    glowGrad.addColorStop(0.4, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${0.06 * nodeAlpha * glowMultiplier})`);
    glowGrad.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
    ctx.beginPath();
    ctx.arc(n.x, n.y, glowRadius, 0, Math.PI * 2);
    ctx.fillStyle = glowGrad;
    ctx.fill();

    // Node body
    const bodyGrad = ctx.createRadialGradient(
      n.x - radius * 0.3, n.y - radius * 0.3, 0,
      n.x, n.y, radius
    );
    bodyGrad.addColorStop(0, `rgba(${Math.min(rgb.r + 60, 255)}, ${Math.min(rgb.g + 60, 255)}, ${Math.min(rgb.b + 60, 255)}, ${nodeAlpha})`);
    bodyGrad.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${nodeAlpha * 0.9})`);

    ctx.beginPath();
    ctx.arc(n.x, n.y, radius, 0, Math.PI * 2);
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    // Bright rim on hovered/selected
    if (isHovered || isSelected) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, radius + 1.5, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.6)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Label
    const labelAlpha = nodeAlpha * (isHovered || isSelected || n.type === 'person' ? 0.95 : 0.6);
    const fontSize = n.type === 'person' ? 13 : 10;
    ctx.font = `${n.type === 'person' ? '600' : '400'} ${fontSize}px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    // Text shadow
    ctx.fillStyle = `rgba(5, 8, 16, ${labelAlpha * 0.8})`;
    ctx.fillText(n.label, n.x + 0.5, n.y + radius + 7.5);
    ctx.fillText(n.label, n.x - 0.5, n.y + radius + 6.5);

    ctx.fillStyle = `rgba(232, 236, 244, ${labelAlpha})`;
    ctx.fillText(n.label, n.x, n.y + radius + 7);
  });

  ctx.restore();
  ctx.restore();

  requestAnimationFrame(render);
}

requestAnimationFrame(render);

// ─── Hit testing ─────────────────────────────────────────────────────────

function hitTest(mx, my) {
  const world = screenToWorld(mx, my);
  let closest = null;
  let closestDist = Infinity;
  nodes.forEach(n => {
    const radius = n.size * (n.type === 'person' ? 1.4 : 0.9) + 6;
    const d = Math.hypot(n.x - world.x, n.y - world.y);
    if (d < radius && d < closestDist) {
      closest = n;
      closestDist = d;
    }
  });
  return closest;
}

// ─── Mouse events ────────────────────────────────────────────────────────

let mouseX = 0, mouseY = 0;

canvas.addEventListener('mousedown', e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    draggedNode = hit;
    draggedNode._fx = hit.fx;
    draggedNode._fy = hit.fy;
    draggedNode.fx = hit.x;
    draggedNode.fy = hit.y;
    simulation.alphaTarget(0.1).restart();
  } else {
    isDragging = true;
    dragStart.x = e.clientX;
    dragStart.y = e.clientY;
    cameraStart.x = camera.x;
    cameraStart.y = camera.y;
    document.body.classList.add('dragging');
  }
});

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;

  if (draggedNode) {
    const world = screenToWorld(e.clientX, e.clientY);
    draggedNode.fx = world.x;
    draggedNode.fy = world.y;
    return;
  }

  if (isDragging) {
    const dx = (e.clientX - dragStart.x) / camera.zoom;
    const dy = (e.clientY - dragStart.y) / camera.zoom;
    camera.x = cameraStart.x - dx;
    camera.y = cameraStart.y - dy;
    return;
  }

  // Hover detection
  const hit = hitTest(e.clientX, e.clientY);
  hoveredNode = hit;
  canvas.style.cursor = hit ? 'pointer' : 'grab';

  // Tooltip
  if (hit) {
    tooltipEl.querySelector('.tt-label').textContent = hit.label;
    tooltipEl.querySelector('.tt-type').textContent = hit.type;
    tooltipEl.querySelector('.tt-detail').textContent = hit.detail || '';
    tooltipEl.style.left = (e.clientX + 16) + 'px';
    tooltipEl.style.top = (e.clientY - 10) + 'px';

    // Keep tooltip in viewport
    const rect = tooltipEl.getBoundingClientRect();
    if (rect.right > W - 10) {
      tooltipEl.style.left = (e.clientX - rect.width - 16) + 'px';
    }
    if (rect.bottom > H - 10) {
      tooltipEl.style.top = (e.clientY - rect.height - 10) + 'px';
    }

    tooltipEl.classList.add('visible');
  } else {
    tooltipEl.classList.remove('visible');
  }
});

canvas.addEventListener('mouseup', e => {
  if (draggedNode) {
    // If barely moved, treat as click
    const world = screenToWorld(e.clientX, e.clientY);
    const moved = Math.hypot(draggedNode.fx - (draggedNode._fx ?? draggedNode.x), draggedNode.fy - (draggedNode._fy ?? draggedNode.y));

    draggedNode.fx = null;
    draggedNode.fy = null;
    simulation.alphaTarget(0);

    if (moved < 5) {
      selectNode(draggedNode);
    }

    draggedNode = null;
    return;
  }

  if (isDragging) {
    isDragging = false;
    document.body.classList.remove('dragging');

    // If barely moved, treat as click to deselect
    const dx = Math.abs(e.clientX - dragStart.x);
    const dy = Math.abs(e.clientY - dragStart.y);
    if (dx < 3 && dy < 3) {
      selectNode(null);
    }
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 0.92 : 1.08;
  const newZoom = Math.max(0.2, Math.min(5, camera.zoom * zoomFactor));

  // Zoom toward cursor
  const wx = (e.clientX - W / 2) / camera.zoom + camera.x;
  const wy = (e.clientY - H / 2) / camera.zoom + camera.y;

  camera.zoom = newZoom;

  camera.x = wx - (e.clientX - W / 2) / camera.zoom;
  camera.y = wy - (e.clientY - H / 2) / camera.zoom;
}, { passive: false });

// ─── Touch support ───────────────────────────────────────────────────────

let lastTouchDist = 0;
let touchStartCamera = { x: 0, y: 0, zoom: 1 };

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const hit = hitTest(t.clientX, t.clientY);
    if (hit) {
      draggedNode = hit;
      draggedNode.fx = hit.x;
      draggedNode.fy = hit.y;
      simulation.alphaTarget(0.1).restart();
    } else {
      isDragging = true;
      dragStart.x = t.clientX;
      dragStart.y = t.clientY;
      cameraStart.x = camera.x;
      cameraStart.y = camera.y;
    }
  } else if (e.touches.length === 2) {
    isDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.hypot(dx, dy);
    touchStartCamera = { ...camera };
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && draggedNode) {
    const t = e.touches[0];
    const world = screenToWorld(t.clientX, t.clientY);
    draggedNode.fx = world.x;
    draggedNode.fy = world.y;
  } else if (e.touches.length === 1 && isDragging) {
    const t = e.touches[0];
    const dx = (t.clientX - dragStart.x) / camera.zoom;
    const dy = (t.clientY - dragStart.y) / camera.zoom;
    camera.x = cameraStart.x - dx;
    camera.y = cameraStart.y - dy;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const scale = dist / lastTouchDist;
    camera.zoom = Math.max(0.2, Math.min(5, touchStartCamera.zoom * scale));
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (draggedNode) {
    draggedNode.fx = null;
    draggedNode.fy = null;
    simulation.alphaTarget(0);
    // Tap detection for touch
    selectNode(draggedNode);
    draggedNode = null;
  }
  isDragging = false;
  e.preventDefault();
}, { passive: false });

// ─── Detail panel ────────────────────────────────────────────────────────

function selectNode(node) {
  selectedNode = node;

  if (!node) {
    detailPanel.classList.remove('visible');
    return;
  }

  const color = COLORS[node.type] || '#ffffff';
  detailPanel.querySelector('.dp-type').textContent = node.type;
  detailPanel.querySelector('.dp-type').style.color = color;
  detailPanel.querySelector('.dp-label').textContent = node.label;
  detailPanel.querySelector('.dp-detail').textContent = node.detail || '';

  // Connections list
  const connected = getConnected(node.id);
  const connContainer = detailPanel.querySelector('.dp-connections');
  connContainer.innerHTML = '';

  connected.forEach(id => {
    const cn = nodeMap.get(id);
    if (!cn) return;
    const div = document.createElement('div');
    div.className = 'dp-connection';
    const dot = document.createElement('span');
    dot.className = 'dp-conn-dot';
    dot.style.backgroundColor = COLORS[cn.type] || '#ffffff';
    const text = document.createTextNode(cn.label);
    div.appendChild(dot);
    div.appendChild(text);
    div.style.cursor = 'pointer';
    div.addEventListener('click', () => selectNode(cn));
    connContainer.appendChild(div);
  });

  detailPanel.classList.add('visible');
}

detailPanel.querySelector('.dp-close').addEventListener('click', e => {
  e.stopPropagation();
  selectNode(null);
});

// ─── Legend ───────────────────────────────────────────────────────────────

const legendEl = document.getElementById('legend');
const typeOrder = ['person', 'company', 'role', 'skill', 'project', 'education', 'goal', 'industry', 'contact'];
typeOrder.forEach(type => {
  const color = COLORS[type];
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${color}; --c:${color}"></span>${type}`;
  legendEl.appendChild(item);
});

// ─── Initial camera fit ──────────────────────────────────────────────────

// After simulation settles a bit, fit to view
setTimeout(() => {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    if (n.x < minX) minX = n.x;
    if (n.y < minY) minY = n.y;
    if (n.x > maxX) maxX = n.x;
    if (n.y > maxY) maxY = n.y;
  });
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const rangeX = maxX - minX + 200;
  const rangeY = maxY - minY + 200;
  const zoom = Math.min(W / rangeX, H / rangeY, 2.5) * 0.85;

  // Smooth animate to position
  const startCamera = { ...camera };
  const targetCamera = { x: cx, y: cy, zoom: zoom };
  const startTime = performance.now();
  const duration = 1200;

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function animateCamera() {
    const elapsed = performance.now() - startTime;
    const t = Math.min(elapsed / duration, 1);
    const et = easeOut(t);

    camera.x = startCamera.x + (targetCamera.x - startCamera.x) * et;
    camera.y = startCamera.y + (targetCamera.y - startCamera.y) * et;
    camera.zoom = startCamera.zoom + (targetCamera.zoom - startCamera.zoom) * et;

    if (t < 1) requestAnimationFrame(animateCamera);
  }
  animateCamera();
}, 800);

// ─── Keyboard ────────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') selectNode(null);
});
</script>
