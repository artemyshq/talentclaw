<script>
// ── Color palette for auto-assignment ─────────────────────────────────
const BRANCH_COLORS = [

  '#EF4444', '#8B5CF6', '#14B8A6', '#F97316', '#06B6D4',
  '#D946EF', '#10B981', '#E11D48', '#3B82F6', '#FBBF24',
  '#6366F1', '#F43F5E', '#2DD4BF', '#FB923C', '#818CF8'

const EDU_COLOR = '#93C5FD';

// ── Test Profiles ─────────────────────────────────────────────────────
const profiles = {

  ],

    { type: 'company', name: 'Stripe', role: 'Staff Engineer', startYear: 2019, endYear: 2022, skills: ['TypeScript', 'Node.js', 'GraphQL', 'System Design', 'API Design', 'Payments'], projects: ['API Gateway'] },
    { type: 'company', name: 'Vercel', role: 'Senior Frontend Engineer', startYear: 2022, endYear: 2024, skills: ['TypeScript', 'React', 'Next.js', 'Tailwind CSS'], projects: ['Design System', 'Developer SDK'] },
    { type: 'company', name: 'Fly.io', role: 'Platform Engineer', startYear: 2024, endYear: 2026, skills: ['Docker', 'Edge Computing', 'Rust'], projects: [] },
    { type: 'consulting', name: 'Notion', role: 'React Consulting', startYear: 2023, endYear: 2023.5, skills: ['React'], projects: [] },
  ],

  seniorVet: [
    { type: 'education', name: 'MIT', role: 'BS Electrical Engineering', startYear: 1989, endYear: 1993, skills: ['C', 'Assembly', 'Digital Logic'], projects: [] },
    { type: 'company', name: 'Sun Microsystems', role: 'Software Engineer', startYear: 1993, endYear: 1997, skills: ['Java', 'Solaris', 'Networking'], projects: ['JVM Tooling'] },
    { type: 'company', name: 'Cisco Systems', role: 'Senior Engineer', startYear: 1997, endYear: 2001, skills: ['C++', 'Networking', 'TCP/IP', 'SNMP'], projects: ['Router Firmware'] },
    { type: 'company', name: 'Oracle', role: 'Principal Engineer', startYear: 2001, endYear: 2006, skills: ['Java', 'SQL', 'PL/SQL', 'Database Internals'], projects: ['Query Optimizer'] },
    { type: 'company', name: 'VMware', role: 'Staff Engineer', startYear: 2006, endYear: 2010, skills: ['C', 'Virtualization', 'Linux Kernel', 'Hypervisors'], projects: ['ESXi Storage'] },
    { type: 'company', name: 'Twitter', role: 'Senior Staff Engineer', startYear: 2010, endYear: 2014, skills: ['Scala', 'JVM', 'Distributed Systems', 'Kafka'], projects: ['Timeline Service'] },
    { type: 'company', name: 'Uber', role: 'Principal Engineer', startYear: 2014, endYear: 2017, skills: ['Go', 'Microservices', 'Cassandra', 'Real-time Systems'], projects: ['Dispatch Engine'] },
    { type: 'company', name: 'Netflix', role: 'Distinguished Engineer', startYear: 2017, endYear: 2021, skills: ['Java', 'Chaos Engineering', 'Streaming', 'CDN'], projects: ['Resilience Platform'] },
    { type: 'company', name: 'Anthropic', role: 'VP of Engineering', startYear: 2021, endYear: 2026, skills: ['Python', 'ML Infrastructure', 'Distributed Training', 'Safety'], projects: ['Training Platform'] },
  ],

  careerSwitcher: [
    { type: 'education', name: 'NYU Tisch', role: 'BFA Film Production', startYear: 2001, endYear: 2005, skills: ['Storytelling', 'Video Editing'], projects: [] },
    { type: 'company', name: 'HBO', role: 'Associate Producer', startYear: 2005, endYear: 2009, skills: ['Production Management', 'Budgeting'], projects: ['Documentary Series'] },
    { type: 'company', name: 'Freelance', role: 'Video Producer', startYear: 2009, endYear: 2012, skills: ['After Effects', 'Final Cut', 'Client Relations'], projects: [] },
    { type: 'education', name: 'Hack Reactor', role: 'Coding Bootcamp', startYear: 2012, endYear: 2013, skills: ['JavaScript', 'Node.js', 'React'], projects: [] },
    { type: 'company', name: 'Vimeo', role: 'Frontend Developer', startYear: 2013, endYear: 2016, skills: ['JavaScript', 'React', 'Video APIs', 'CSS'], projects: ['Player Redesign'] },
    { type: 'company', name: 'Squarespace', role: 'Senior Frontend Engineer', startYear: 2016, endYear: 2019, skills: ['TypeScript', 'React', 'Node.js', 'GraphQL'], projects: ['Template Builder'] },
    { type: 'company', name: 'Webflow', role: 'Staff Engineer', startYear: 2019, endYear: 2023, skills: ['TypeScript', 'WebGL', 'WASM', 'Design Systems'], projects: ['Visual Editor 2.0'] },
    { type: 'company', name: 'Runway ML', role: 'Principal Engineer', startYear: 2023, endYear: 2026, skills: ['Python', 'ML', 'Video Generation', 'WebGPU'], projects: ['Gen-3 Pipeline'] },
  ],

  longTenure: [
    { type: 'education', name: 'University of Washington', role: 'BS Computer Science', startYear: 1996, endYear: 2000, skills: ['C++', 'Algorithms', 'OS Design'], projects: [] },
    { type: 'company', name: 'Microsoft', role: 'Software Engineer → Distinguished Engineer', startYear: 2000, endYear: 2020, skills: ['C#', '.NET', 'Azure', 'Windows', 'Distributed Systems', 'TypeScript'], projects: ['Azure Functions', 'VS Code Extensions', '.NET Core'] },
    { type: 'company', name: 'Oxide Computer', role: 'CTO', startYear: 2020, endYear: 2026, skills: ['Rust', 'Hardware', 'Firmware', 'Hypervisors'], projects: ['Oxide Rack'] },
  ],
};

// ── Auto-assign side, offsetY, color ──────────────────────────────────
function prepareData(raw) {
  let colorIdx = 0;
  return raw.map((entry, idx) => {
    const isEdu = entry.type === 'education';
    const isConsulting = entry.type === 'consulting';
    return {
      ...entry,
      color: isEdu ? EDU_COLOR : BRANCH_COLORS[colorIdx++ % BRANCH_COLORS.length],
      side: idx % 2 === 0 ? -1 : 1,
      offsetY: isConsulting ? 45 : (isEdu ? 60 : 70),
    };
  });
}

// ── Active data ───────────────────────────────────────────────────────
let careerData = prepareData(profiles.midCareer);

// ── Canvas Setup ──────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;
let mouse = { x: -9999, y: -9999 };
let hoveredBranch = null;
let growthProgress = 0;
let growthStartTime = 0;
const GROWTH_DURATION = 3500;

let axonPoints = [];
let branches = [];
let pulses = [];
let yearMarkers = [];

let seed = 42;
function seededRandom() {
  seed = (seed * 16807 + 0) % 2147483647;
  return (seed - 1) / 2147483646;
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  seed = 42;
  computeLayout();
}

// ── Layout ────────────────────────────────────────────────────────────
function computeLayout() {
  branches = [];
  axonPoints = [];
  yearMarkers = [];

  const padL = 120, padR = 80;
  const axonY = H * 0.5;

  // Derive year range from data
  let dataMinYear = Infinity, dataMaxYear = -Infinity;
  careerData.forEach(e => {
    if (e.startYear < dataMinYear) dataMinYear = e.startYear;
    if (e.endYear > dataMaxYear) dataMaxYear = e.endYear;
  });
  const currentYear = 2026;
  const minYear = dataMinYear - 1;
  const maxYear = Math.max(dataMaxYear, currentYear) + 0.8;
  const yearSpan = maxYear - minYear;

  function yearToX(y) {
    return padL + ((y - minYear) / yearSpan) * (W - padL - padR);
  }

  // Year markers — adapt density based on span
  const totalYears = Math.ceil(maxYear) - Math.floor(minYear);
  let yearStep = 1;
  if (totalYears > 30) yearStep = 5;
  else if (totalYears > 15) yearStep = 2;

  for (let y = Math.ceil(dataMinYear / yearStep) * yearStep; y <= Math.floor(maxYear); y += yearStep) {
    yearMarkers.push({ year: y, x: yearToX(y), y: axonY });
  }

  // Axon path
  const axonSegments = 400;
  for (let i = 0; i <= axonSegments; i++) {
    const t = i / axonSegments;
    const x = padL + t * (W - padL - padR);
    const wobble = Math.sin(t * Math.PI * 3) * 4 + Math.sin(t * Math.PI * 7) * 1.5;
    axonPoints.push({ x, y: axonY + wobble });
  }

  function axonYAtX(targetX) {
    let closest = axonPoints[0];
    let minDist = Infinity;
    for (const ap of axonPoints) {
      const d = Math.abs(ap.x - targetX);
      if (d < minDist) { minDist = d; closest = ap; }
    }
    return closest.y;
  }

  // Adaptive transition width based on how dense the timeline is
  const pxPerYear = (W - padL - padR) / yearSpan;
  const transitionYears = Math.min(0.4, 0.5 * pxPerYear > 30 ? 0.4 : 0.2);

  careerData.forEach((entry, idx) => {
    const isConsulting = entry.type === 'consulting';
    const isCurrent = entry.endYear >= currentYear;
    const side = entry.side;
    const offsetY = entry.offsetY * side;

    const forkX = yearToX(entry.startYear);
    const forkAxonY = axonYAtX(forkX);
    const mergeX = yearToX(entry.endYear);
    const mergeAxonY = axonYAtX(mergeX);

    const transitionPx = yearToX(entry.startYear + transitionYears) - forkX;
    const minTransition = 8;
    const actualTransitionPx = Math.max(transitionPx, minTransition);
    const parallelStartX = forkX + actualTransitionPx;
    const parallelEndX = isCurrent ? mergeX : Math.max(mergeX - actualTransitionPx, parallelStartX);
    const parallelY = forkAxonY + offsetY;

    const pathPoints = [];
    const pathSegments = 80;
    const totalLen = Math.max(mergeX - forkX, 1);

    for (let i = 0; i <= pathSegments; i++) {
      const t = i / pathSegments;
      const currentX = forkX + t * totalLen;
      let currentY;

      if (currentX <= parallelStartX) {
        const forkT = Math.max(0, Math.min(1, (currentX - forkX) / Math.max(parallelStartX - forkX, 1)));
        const eased = forkT * forkT * (3 - 2 * forkT);
        currentY = axonYAtX(currentX) + offsetY * eased;
      } else if (currentX >= parallelEndX && !isCurrent) {
        const mergeT = Math.max(0, Math.min(1, (currentX - parallelEndX) / Math.max(mergeX - parallelEndX, 1)));
        const eased = mergeT * mergeT * (3 - 2 * mergeT);
        currentY = parallelY + (mergeAxonY - parallelY) * eased;
      } else {
        const wobbleT = (currentX - parallelStartX) / Math.max(parallelEndX - parallelStartX, 1);
        currentY = parallelY + Math.sin(wobbleT * Math.PI * 2 + idx) * 2;
      }

      pathPoints.push({ x: currentX, y: currentY });
    }

    // Store branch pixel width for label sizing
    const branchPxWidth = mergeX - forkX;

    branches.push({
      ...entry,
      idx,
      forkX, forkAxonY,
      mergeX, mergeAxonY,
      parallelStartX, parallelEndX,
      parallelY,
      pathPoints,
      offsetY: entry.offsetY,
      side,
      isConsulting,
      isCurrent,
      branchPxWidth,
      growDelay: idx * (0.6 / Math.max(careerData.length, 1)), // adaptive: fits all entries within 60% of growth
    });
  });

  // Pulses
  pulses = [];
  for (let i = 0; i < 5; i++) {
    pulses.push({ t: i / 5, speed: 0.00035, size: 3, brightness: 0.6 });
  }

  // Update subtitle
  document.getElementById('subtitle').textContent = `${Math.floor(dataMinYear)} — ${dataMaxYear >= currentYear ? 'PRESENT' : Math.floor(dataMaxYear)}`;
  document.getElementById('profile-info').textContent = `${careerData.length} entries · ${Math.ceil(dataMaxYear - dataMinYear)} years`;
}

// ── Drawing ───────────────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle = '#08090E';
  ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < 200; i++) {
    ctx.fillStyle = `rgba(80, 50, 120, ${Math.random() * 0.025})`;
    ctx.fillRect(Math.random() * W, Math.random() * H, 1, 1);
  }
}

function drawAxon(time, gp) {
  if (axonPoints.length < 2) return;
  const visibleCount = Math.floor(axonPoints.length * Math.min(gp * 1.3, 1));
  if (visibleCount < 2) return;

  const breathe = 1 + Math.sin(time * 0.0008) * 0.005;

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  ctx.strokeStyle = 'rgba(240, 230, 208, 0.035)';
  ctx.lineWidth = 18 * breathe;
  ctx.beginPath();
  ctx.moveTo(axonPoints[0].x, axonPoints[0].y);
  for (let i = 1; i < visibleCount; i++) ctx.lineTo(axonPoints[i].x, axonPoints[i].y);
  ctx.stroke();

  ctx.strokeStyle = 'rgba(240, 230, 208, 0.1)';
  ctx.lineWidth = 5 * breathe;
  ctx.beginPath();
  ctx.moveTo(axonPoints[0].x, axonPoints[0].y);
  for (let i = 1; i < visibleCount; i++) ctx.lineTo(axonPoints[i].x, axonPoints[i].y);
  ctx.stroke();

  ctx.strokeStyle = 'rgba(240, 230, 208, 0.35)';
  ctx.lineWidth = 1.8 * breathe;
  ctx.beginPath();
  ctx.moveTo(axonPoints[0].x, axonPoints[0].y);
  for (let i = 1; i < visibleCount; i++) ctx.lineTo(axonPoints[i].x, axonPoints[i].y);
  ctx.stroke();

  ctx.restore();

  pulses.forEach(pulse => {
    pulse.t += pulse.speed;
    if (pulse.t > 1) pulse.t -= 1;
    const idx = Math.floor(pulse.t * (visibleCount - 1));
    if (idx >= 0 && idx < visibleCount) {
      const pt = axonPoints[idx];
      const grad = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, pulse.size * 5);
      grad.addColorStop(0, `rgba(240, 230, 208, ${pulse.brightness})`);
      grad.addColorStop(0.4, `rgba(240, 230, 208, ${pulse.brightness * 0.25})`);
      grad.addColorStop(1, 'rgba(240, 230, 208, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pulse.size * 5, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

function drawBranch(branch, time, gp) {
  const brGrow = Math.max(0, Math.min(1, (gp - branch.growDelay) / 0.2));
  if (brGrow <= 0) return;

  const isHovered = hoveredBranch === branch;
  const breathe = 1 + Math.sin(time * 0.001 + branch.idx * 1.5) * 0.015;
  const dimFactor = (hoveredBranch && !isHovered) ? 0.12 : 1;

  const pts = branch.pathPoints;
  const visibleCount = Math.floor(pts.length * Math.min(brGrow * 1.3, 1));
  if (visibleCount < 2) return;

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Fork junction
  const jR = isHovered ? 16 : 8;
  const jGrad = ctx.createRadialGradient(branch.forkX, branch.forkAxonY, 0, branch.forkX, branch.forkAxonY, jR);
  jGrad.addColorStop(0, hexToRgba(branch.color, 0.35 * dimFactor));
  jGrad.addColorStop(1, hexToRgba(branch.color, 0));
  ctx.fillStyle = jGrad;
  ctx.beginPath();
  ctx.arc(branch.forkX, branch.forkAxonY, jR, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = hexToRgba(branch.color, 0.8 * dimFactor);
  ctx.beginPath();
  ctx.arc(branch.forkX, branch.forkAxonY, 3 * breathe, 0, Math.PI * 2);
  ctx.fill();

  // Branch path glow
  ctx.strokeStyle = hexToRgba(branch.color, (isHovered ? 0.1 : 0.035) * dimFactor);
  ctx.lineWidth = (branch.isConsulting ? 8 : 12) * breathe;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < visibleCount; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();

  // Core
  ctx.strokeStyle = hexToRgba(branch.color, (isHovered ? 0.6 : 0.28) * dimFactor);
  ctx.lineWidth = (branch.isConsulting ? 1.2 : 2.2) * breathe;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < visibleCount; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();

  // Bright inner core
  ctx.strokeStyle = hexToRgba(branch.color, (isHovered ? 0.8 : 0.45) * dimFactor);
  ctx.lineWidth = (branch.isConsulting ? 0.5 : 0.8) * breathe;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < visibleCount; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();

  // Merge junction
  if (!branch.isCurrent && brGrow > 0.9) {
    const mAlpha = (brGrow - 0.9) / 0.1;
    const mR = isHovered ? 14 : 7;
    const mGrad = ctx.createRadialGradient(branch.mergeX, branch.mergeAxonY, 0, branch.mergeX, branch.mergeAxonY, mR);
    mGrad.addColorStop(0, hexToRgba(branch.color, 0.3 * dimFactor * mAlpha));
    mGrad.addColorStop(1, hexToRgba(branch.color, 0));
    ctx.fillStyle = mGrad;
    ctx.beginPath();
    ctx.arc(branch.mergeX, branch.mergeAxonY, mR, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = hexToRgba(branch.color, 0.6 * dimFactor * mAlpha);
    ctx.beginPath();
    ctx.arc(branch.mergeX, branch.mergeAxonY, 2.5 * breathe, 0, Math.PI * 2);
    ctx.fill();
  }

  // Labels — adaptive sizing based on branch pixel width
  if (brGrow > 0.4) {
    const labelAlpha = (isHovered ? 0.95 : 0.55) * dimFactor;
    const midX = (branch.parallelStartX + branch.parallelEndX) / 2;

    let labelY = branch.parallelY;
    for (const pp of pts) {
      if (Math.abs(pp.x - midX) < 5) { labelY = pp.y; break; }
    }

    const clearance = 10;
    const glowHalf = 7;

    // Scale font size down for narrow branches
    const bw = branch.branchPxWidth;
    const nameFontSize = branch.isConsulting ? 11 : Math.max(10, Math.min(13, bw * 0.08));
    const roleFontSize = Math.max(8, Math.min(10, bw * 0.06));
    const nameWeight = branch.isConsulting ? '400' : '600';

    // Truncate text helper
    function fitText(text, font, maxWidth) {
      ctx.font = font;
      if (ctx.measureText(text).width <= maxWidth) return text;
      let truncated = text;
      while (truncated.length > 1 && ctx.measureText(truncated + '…').width > maxWidth) {
        truncated = truncated.slice(0, -1);
      }
      return truncated + '…';
    }

    // Allow labels to extend a bit beyond branch, but cap for very narrow ones
    const maxLabelWidth = Math.max(bw * 1.4, 80);

    const nameFont = `${nameWeight} ${nameFontSize}px "Outfit", sans-serif`;
    const roleFont = `${roleFontSize}px "Space Mono", monospace`;
    const nameText = fitText(branch.name, nameFont, maxLabelWidth);
    const roleText = fitText(branch.role, roleFont, maxLabelWidth);

    if (branch.side === -1) {
      const baseY = labelY - glowHalf - clearance;

      if (brGrow > 0.6) {
        ctx.font = roleFont;
        ctx.fillStyle = `rgba(240, 230, 208, ${(isHovered ? 0.4 : 0.18) * dimFactor})`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(roleText, midX, baseY);
      }

      ctx.font = nameFont;
      ctx.fillStyle = hexToRgba(branch.color, labelAlpha);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(nameText, midX, baseY - (roleFontSize + 4));
    } else {
      const baseY = labelY + glowHalf + clearance;

      ctx.font = nameFont;
      ctx.fillStyle = hexToRgba(branch.color, labelAlpha);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(nameText, midX, baseY);

      if (brGrow > 0.6) {
        ctx.font = roleFont;
        ctx.fillStyle = `rgba(240, 230, 208, ${(isHovered ? 0.4 : 0.18) * dimFactor})`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(roleText, midX, baseY + nameFontSize + 3);
      }
    }
  }

  ctx.restore();
}

function drawYearMarkers(time, gp) {
  yearMarkers.forEach((ym, i) => {
    const yearProgress = Math.max(0, Math.min(1, gp * 14 - i * 0.5));
    if (yearProgress <= 0) return;

    ctx.save();

    const tickLen = 8;
    ctx.strokeStyle = `rgba(240, 230, 208, ${0.1 * yearProgress})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(ym.x, ym.y - tickLen);
    ctx.lineTo(ym.x, ym.y + tickLen);
    ctx.stroke();

    const dotGrad = ctx.createRadialGradient(ym.x, ym.y, 0, ym.x, ym.y, 3);
    dotGrad.addColorStop(0, `rgba(240, 230, 208, ${0.12 * yearProgress})`);
    dotGrad.addColorStop(1, 'rgba(240, 230, 208, 0)');
    ctx.fillStyle = dotGrad;
    ctx.beginPath();
    ctx.arc(ym.x, ym.y, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.font = '9px "Space Mono", monospace';
    ctx.fillStyle = `rgba(240, 230, 208, ${0.22 * yearProgress})`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(ym.year.toString(), ym.x, ym.y + tickLen + 3);

    ctx.restore();
  });
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

// ── Hit Testing ───────────────────────────────────────────────────────
function updateHover() {
  let found = null;
  for (const br of branches) {
    for (const pp of br.pathPoints) {
      if (Math.abs(mouse.x - pp.x) < 15 && Math.abs(mouse.y - pp.y) < 20) {
        found = br;
        break;
      }
    }
    if (found) break;
  }

  hoveredBranch = found;
  const tooltip = document.getElementById('tooltip');
  if (found) {
    canvas.style.cursor = 'pointer';
    tooltip.querySelector('.tt-company').textContent = found.name;
    tooltip.querySelector('.tt-company').style.color = found.color;
    tooltip.querySelector('.tt-role').textContent = found.role;
    tooltip.querySelector('.tt-skills').textContent = found.skills.join(' · ');
    tooltip.querySelector('.tt-projects').textContent = found.projects.length ? 'Projects: ' + found.projects.join(', ') : '';
    tooltip.classList.add('visible');
    let tx = mouse.x + 20, ty = mouse.y - 10;
    if (tx + 260 > W) tx = mouse.x - 280;
    if (ty + 150 > H) ty = mouse.y - 150;
    if (ty < 10) ty = 10;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  } else {
    canvas.style.cursor = 'default';
    tooltip.classList.remove('visible');
  }
}

// ── Main Loop ─────────────────────────────────────────────────────────
function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }

function draw(time) {
  if (!growthStartTime) growthStartTime = time || performance.now();
  const elapsed = time - growthStartTime;
  const rawGP = Math.min(elapsed / GROWTH_DURATION, 1);
  growthProgress = easeOutQuart(rawGP);

  drawBackground();
  drawAxon(time, growthProgress);
  branches.forEach(br => drawBranch(br, time, growthProgress));
  drawYearMarkers(time, growthProgress);

  updateHover();
  requestAnimationFrame(draw);
}

// ── Profile switching ─────────────────────────────────────────────────
function switchProfile(key) {
  careerData = prepareData(profiles[key]);
  seed = 42;
  growthStartTime = 0;
  hoveredBranch = null;
  computeLayout();
}

document.getElementById('profileSelect').addEventListener('change', function() {
  switchProfile(this.value);
});

// ── Events ────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; hoveredBranch = null; });
window.addEventListener('resize', resize);

resize();
requestAnimationFrame(function start(time) { growthStartTime = time; draw(time); });
document.addEventListener('visibilitychange', () => { if (!document.hidden) requestAnimationFrame(draw); });
</script>
