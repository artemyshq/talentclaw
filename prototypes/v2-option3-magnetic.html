<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentClaw — Career Context Graph (Magnetic Field)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --surface: #FAFDFB;
    --surface-raised: #ffffff;
    --surface-overlay: #F0F5F2;
    --border-subtle: rgba(0,0,0,0.05);
    --border-default: rgba(0,0,0,0.1);
    --text-primary: #1c1917;
    --text-secondary: #57534e;
    --text-muted: #a8a29e;
    --accent: #059669;
    --accent-hover: #10b981;
    --accent-subtle: rgba(5,150,105,0.08);
    --accent-glow: rgba(5,150,105,0.2);
    --sidebar-bg: #F5F7F6;
    --sidebar-border: rgba(0,0,0,0.07);
  }

  body {
    font-family: "Avenir Next", "SF Pro Text", "Segoe UI", sans-serif;
    background: var(--surface);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    overflow: hidden; height: 100vh;
  }

  .layout { display: flex; height: 100vh; }

  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--sidebar-border);
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 24px;
  }
  .sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 0 4px; }
  .sidebar-brand svg { width: 28px; height: 28px; }
  .sidebar-brand span { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
  .sidebar-profile { padding: 12px; background: var(--surface-raised); border: 1px solid var(--border-subtle); border-radius: 12px; }
  .sidebar-profile .name { font-size: 13px; font-weight: 600; }
  .sidebar-profile .role { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
  .sidebar-nav-item { padding: 8px 12px; border-radius: 8px; font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
  .sidebar-nav-item.active { background: var(--accent-subtle); color: var(--accent); font-weight: 600; }
  .sidebar-nav-item:hover:not(.active) { background: var(--surface-overlay); }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

  .toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border-subtle);
    background: var(--surface-raised); z-index: 20;
  }
  .toolbar h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; white-space: nowrap; }
  .toolbar .spacer { flex: 1; }


  .search-box {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px; background: var(--surface-overlay);
    border: 1px solid var(--border-subtle); border-radius: 8px;
    font-size: 12px; min-width: 180px;
  }
  .search-box input {
    border: none; background: transparent; outline: none;
    font-family: inherit; font-size: 12px; color: var(--text-primary); width: 100%;
  }
  .search-box input::placeholder { color: var(--text-muted); }

  .zoom-controls { display: flex; align-items: center; gap: 2px; }
  .zoom-btn {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border-subtle); background: var(--surface-raised);
    color: var(--text-secondary); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .zoom-btn:hover { border-color: var(--border-default); background: var(--surface-overlay); }

  .canvas-container { flex: 1; position: relative; overflow: hidden; background: var(--surface); }
  canvas { display: block; width: 100%; height: 100%; }

  .constellation-panel {
    position: absolute; top: 16px; right: 16px;
    background: var(--surface-raised);
    border: 1px solid var(--border-subtle);
    border-radius: 14px; padding: 16px 20px;
    z-index: 10; min-width: 190px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .constellation-panel h3 {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px;
  }
  .const-item {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px; margin: 0 -8px;
    border-radius: 8px;
    font-size: 12px; font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer; transition: all 0.2s;
  }
  .const-item:hover { background: var(--surface-overlay); color: var(--text-primary); }
  .const-item.active { background: var(--accent-subtle); color: var(--accent); }
  .const-icon { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .const-count {
    margin-left: auto; font-family: "SF Mono", "Fira Code", monospace;
    font-size: 10px; color: var(--text-muted);
  }
  .const-desc {
    font-size: 10px; color: var(--text-muted); font-weight: 400;
    margin-left: 20px; margin-top: -2px; margin-bottom: 4px;
  }

  .tooltip {
    position: absolute; pointer-events: none;
    background: var(--surface-raised);
    border: 1px solid var(--border-default);
    border-radius: 12px; padding: 12px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
    z-index: 100; opacity: 0; transform: translateY(4px);
    transition: opacity 0.15s, transform 0.15s; max-width: 240px;
  }
  .tooltip.visible { opacity: 1; transform: translateY(0); }
  .tooltip .tt-cluster {
    display: inline-block;
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; padding: 2px 8px;
    border-radius: 20px; margin-bottom: 6px;
  }
  .tooltip .tt-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
  .tooltip .tt-detail { font-size: 11px; color: var(--text-muted); }
  .tooltip .tt-connections {
    font-size: 10px; color: var(--text-muted); margin-top: 6px;
    padding-top: 6px; border-top: 1px solid var(--border-subtle);
    font-family: "SF Mono", "Fira Code", monospace;
  }


  .node-count {
    position: absolute; bottom: 16px; right: 16px;
    font-family: "SF Mono", "Fira Code", monospace; font-size: 11px;
    color: var(--text-muted); z-index: 10;
  }
</style>
</head>

<script>
// ── Data ──────────────────────────────────────────────────────────────────

const CLUSTER_COLORS = {
  center:     '#059669',
  companies:  '#3b82f6',
  titles:     '#8b5cf6',
  skills:     '#f59e0b',
  projects:   '#ec4899',
  trajectory: '#10b981',
};

const NODE_COLORS = {
  person: '#059669', skill: '#f59e0b', company: '#3b82f6', project: '#ec4899',
  role: '#8b5cf6', education: '#3b82f6', goal: '#10b981', industry: '#10b981',
};

const nodes = [
  { id:'alex', label:'Alex Chen', type:'person', cluster:'center', size:20, detail:'Senior Software Engineer' },
  { id:'google', label:'Google', type:'company', cluster:'companies', size:10, detail:'2018-2021' },
  { id:'stripe', label:'Stripe', type:'company', cluster:'companies', size:10, detail:'2021-2023' },
  { id:'startupx', label:'Startup X', type:'company', cluster:'companies', size:10, detail:'2023-present' },
  { id:'stanford', label:'Stanford', type:'education', cluster:'companies', size:9, detail:'BS CS' },
  { id:'swe', label:'Software Engineer', type:'role', cluster:'titles', size:9, detail:'Google 2018-2021' },
  { id:'senior', label:'Senior Engineer', type:'role', cluster:'titles', size:10, detail:'Stripe 2021-2023' },
  { id:'lead', label:'Tech Lead', type:'role', cluster:'titles', size:10, detail:'Startup X 2023-present' },
  { id:'ts', label:'TypeScript', type:'skill', cluster:'skills', size:7, detail:'Core language' },
  { id:'react', label:'React', type:'skill', cluster:'skills', size:7, detail:'Frontend framework' },
  { id:'node', label:'Node.js', type:'skill', cluster:'skills', size:7, detail:'Runtime' },
  { id:'python', label:'Python', type:'skill', cluster:'skills', size:6, detail:'Secondary language' },
  { id:'graphql', label:'GraphQL', type:'skill', cluster:'skills', size:6, detail:'API layer' },
  { id:'postgres', label:'PostgreSQL', type:'skill', cluster:'skills', size:6, detail:'Database' },
  { id:'aws', label:'AWS', type:'skill', cluster:'skills', size:6, detail:'Cloud platform' },
  { id:'docker', label:'Docker', type:'skill', cluster:'skills', size:6, detail:'Containerization' },
  { id:'k8s', label:'Kubernetes', type:'skill', cluster:'skills', size:6, detail:'Orchestration' },
  { id:'cicd', label:'CI/CD', type:'skill', cluster:'skills', size:5, detail:'Automation' },
  { id:'sysdesign', label:'System Design', type:'skill', cluster:'skills', size:8, detail:'Architecture discipline' },
  { id:'leadership', label:'Team Leadership', type:'skill', cluster:'skills', size:7, detail:'Managing teams' },
  { id:'payments', label:'Payment Platform', type:'project', cluster:'projects', size:8, detail:'Stripe core billing rebuild' },
  { id:'analytics', label:'Analytics Dashboard', type:'project', cluster:'projects', size:7, detail:'Google real-time viz' },
  { id:'cli', label:'Open Source CLI', type:'project', cluster:'projects', size:6, detail:'Developer tool' },
  { id:'apigw', label:'API Gateway', type:'project', cluster:'projects', size:7, detail:'Startup X architecture' },
  { id:'em', label:'Eng Manager', type:'goal', cluster:'trajectory', size:9, detail:'Next career move' },
  { id:'fellow', label:'Technical Fellow', type:'goal', cluster:'trajectory', size:8, detail:'Long-term aspiration' },
  { id:'fintech', label:'Fintech', type:'industry', cluster:'trajectory', size:7, detail:'Payments & banking' },
  { id:'cloud', label:'Cloud Infra', type:'industry', cluster:'trajectory', size:7, detail:'Platform & infrastructure' },
  { id:'devtools', label:'Dev Tools', type:'industry', cluster:'trajectory', size:7, detail:'Developer experience' },
];

const edges = [
  ['alex','google'],['alex','stripe'],['alex','startupx'],['alex','stanford'],
  ['alex','swe'],['alex','senior'],['alex','lead'],
  ['alex','em'],['alex','fellow'],
  ['google','swe'],['stripe','senior'],['startupx','lead'],
  ['google','analytics'],['stripe','payments'],['startupx','apigw'],
  ['swe','python'],['swe','react'],['swe','node'],
  ['senior','ts'],['senior','node'],['senior','graphql'],['senior','postgres'],
  ['lead','ts'],['lead','sysdesign'],['lead','leadership'],['lead','docker'],['lead','k8s'],
  ['ts','react'],['ts','node'],['node','graphql'],['docker','k8s'],['k8s','aws'],['docker','cicd'],
  ['payments','ts'],['payments','graphql'],['payments','postgres'],
  ['analytics','react'],['analytics','python'],
  ['cli','ts'],['cli','node'],
  ['apigw','sysdesign'],['apigw','docker'],['apigw','aws'],
  ['google','cloud'],['stripe','fintech'],['startupx','devtools'],
  ['payments','fintech'],['analytics','cloud'],['cli','devtools'],['apigw','cloud'],
  ['leadership','em'],['sysdesign','fellow'],
  ['stanford','python'],['stanford','sysdesign'],['stanford','google'],
];

// ── State ─────────────────────────────────────────────────────────────────

const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
let W, H, dpr;
let time = 0;
let hoveredNode = null;
let highlightCluster = null;
let zoom = 1, panX = 0, panY = 0;
let panning = false, panSX, panSY;
let activeFilter = 'all';
let searchTerm = '';
let mouseWorldX = 0, mouseWorldY = 0;

// Adjacency map
const adj = {};
nodes.forEach(n => { adj[n.id] = new Set(); n.pulseOffset = Math.random() * Math.PI * 2; });
edges.forEach(([a,b]) => { if(adj[a]) adj[a].add(b); if(adj[b]) adj[b].add(a); });

// ── Field Lines ───────────────────────────────────────────────────────────
// Each field line is a set of control points arcing from center to a cluster pole.

let fieldLines = [];
let fieldParticles = [];

function generateFieldLines() {
  fieldLines = [];
  fieldParticles = [];
  const alex = nodes.find(n => n.id === 'alex');
  if (!alex) return;

  const clusterCenters = {};
  const clusterGroups = {};
  nodes.forEach(n => {
    if (n.cluster === 'center') return;
    if (!clusterGroups[n.cluster]) clusterGroups[n.cluster] = [];
    clusterGroups[n.cluster].push(n);
  });

  // Compute cluster center of mass
  Object.keys(clusterGroups).forEach(cl => {
    let cx = 0, cy = 0;
    clusterGroups[cl].forEach(n => { cx += n.x; cy += n.y; });
    cx /= clusterGroups[cl].length;
    cy /= clusterGroups[cl].length;
    clusterCenters[cl] = { x: cx, y: cy };
  });

  // For each cluster, create multiple field lines
  Object.keys(clusterCenters).forEach(cl => {
    const pole = clusterCenters[cl];
    const dx = pole.x - alex.x;
    const dy = pole.y - alex.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const angle = Math.atan2(dy, dx);
    const numLines = cl === 'skills' ? 8 : 5;
    const spreadAngle = cl === 'skills' ? 0.45 : 0.35;

    for (let i = 0; i < numLines; i++) {
      const t = numLines === 1 ? 0 : (i / (numLines - 1)) - 0.5;
      const lineAngle = angle + t * spreadAngle;
      const perpAngle = lineAngle + Math.PI / 2;

      // Create curved field line with quadratic bezier control points
      const curvature = (t * 0.4 + (Math.random() - 0.5) * 0.15) * dist;
      const startDist = 25; // Start just outside the center node
      const endDist = 30; // End just outside the cluster

      const sx = alex.x + Math.cos(lineAngle) * startDist;
      const sy = alex.y + Math.sin(lineAngle) * startDist;
      const ex = pole.x - Math.cos(angle) * endDist + Math.sin(angle) * curvature * 0.3;
      const ey = pole.y - Math.sin(angle) * endDist - Math.cos(angle) * curvature * 0.3;

      // Control point off to the side for natural curve
      const midX = (alex.x + pole.x) / 2 + Math.cos(perpAngle) * curvature;
      const midY = (alex.y + pole.y) / 2 + Math.sin(perpAngle) * curvature;

      const line = {
        cluster: cl,
        sx, sy, ex, ey, midX, midY,
        baseAlpha: 0.06 + Math.random() * 0.04,
        phaseOffset: Math.random() * Math.PI * 2,
        width: 1 + Math.random() * 0.5,
      };
      fieldLines.push(line);

      // Spawn particles along this field line
      const numParticles = 2 + Math.floor(Math.random() * 2);
      for (let p = 0; p < numParticles; p++) {
        fieldParticles.push({
          line: fieldLines.length - 1,
          t: Math.random(), // position along the bezier [0,1]
          speed: 0.0008 + Math.random() * 0.0012,
          size: 1.2 + Math.random() * 1.5,
          alpha: 0.15 + Math.random() * 0.25,
          cluster: cl,
        });
      }
    }
  });
}

// Evaluate quadratic bezier at parameter t
function bezierPoint(line, t) {
  const mt = 1 - t;
  return {
    x: mt * mt * line.sx + 2 * mt * t * line.midX + t * t * line.ex,
    y: mt * mt * line.sy + 2 * mt * t * line.midY + t * t * line.ey,
  };
}

// ── Hex color utilities ───────────────────────────────────────────────────

function hexToRGB(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

function lerpColor(c1, c2, t) {
  const a = hexToRGB(c1);
  const b = hexToRGB(c2);
  return {
    r: Math.round(a.r + (b.r - a.r) * t),
    g: Math.round(a.g + (b.g - a.g) * t),
    b: Math.round(a.b + (b.b - a.b) * t),
  };
}

// ── Layout ────────────────────────────────────────────────────────────────

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;
  W = rect.width; H = rect.height;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  layoutNodes();
  generateFieldLines();
}

function layoutNodes() {
  const sunX = W * 0.5;
  const sunY = H * 0.5;
  const orbitR = Math.min(W, H) * 0.33;

  const alex = nodes.find(n => n.id === 'alex');
  if (alex) { alex.x = sunX; alex.y = sunY; }

  const clusterAngles = {
    skills:     -Math.PI * 0.5,
    companies:  -Math.PI * 0.9,
    titles:     -Math.PI * 0.1,
    projects:    Math.PI * 0.3,
    trajectory:  Math.PI * 0.7,
  };

  const clusterNodes = {};
  nodes.forEach(n => {
    if (n.cluster === 'center') return;
    if (!clusterNodes[n.cluster]) clusterNodes[n.cluster] = [];
    clusterNodes[n.cluster].push(n);
  });

  Object.keys(clusterNodes).forEach(cluster => {
    const angle = clusterAngles[cluster];
    const centerX = sunX + Math.cos(angle) * orbitR;
    const centerY = sunY + Math.sin(angle) * orbitR;
    const items = clusterNodes[cluster];
    const spread = Math.min(W, H) * 0.16;
    const sorted = [...items].sort((a, b) => b.size - a.size);

    sorted.forEach((n, i) => {
      if (i === 0) {
        n.x = centerX;
        n.y = centerY;
      } else {
        const golden = 2.399963;
        const a = i * golden;
        const r = spread * (0.3 + (i / sorted.length) * 0.7);
        n.x = centerX + Math.cos(a) * r;
        n.y = centerY + Math.sin(a) * r;
      }
    });
  });
}

// ── Coordinate transforms ─────────────────────────────────────────────────

function screenToWorld(sx, sy) {
  return { x: (sx - panX) / zoom, y: (sy - panY) / zoom };
}

function worldToScreen(wx, wy) {
  return { x: wx * zoom + panX, y: wy * zoom + panY };
}

// ── Visibility ────────────────────────────────────────────────────────────

function isVisible(node) {
  if (activeFilter === 'all') {
    if (!searchTerm) return true;
    return node.label.toLowerCase().includes(searchTerm.toLowerCase());
  }
  const filterMap = {
    company: ['company', 'education'],
    role: ['role'],
    skill: ['skill'],
    project: ['project'],
    goal: ['goal', 'industry'],
  };
  const types = filterMap[activeFilter] || [];
  const typeMatch = types.includes(node.type) || node.cluster === 'center';
  if (!searchTerm) return typeMatch;
  return typeMatch && node.label.toLowerCase().includes(searchTerm.toLowerCase());
}

// ── Distance from point to bezier (approximate) ──────────────────────────

function distToFieldLine(line, px, py) {
  let minD = Infinity;
  for (let t = 0; t <= 1; t += 0.05) {
    const pt = bezierPoint(line, t);
    const d = Math.sqrt((pt.x - px) * (pt.x - px) + (pt.y - py) * (pt.y - py));
    if (d < minD) minD = d;
  }
  return minD;
}

// ── Draw ──────────────────────────────────────────────────────────────────

function draw() {
  time += 0.016;
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = '#FAFDFB';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid dots
  const gridSpacing = 24;
  ctx.fillStyle = 'rgba(0,0,0,0.02)';
  for (let gx = gridSpacing; gx < W; gx += gridSpacing) {
    for (let gy = gridSpacing; gy < H; gy += gridSpacing) {
      ctx.beginPath();
      ctx.arc(gx, gy, 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  const connected = new Set();
  if (hoveredNode) {
    connected.add(hoveredNode.id);
    adj[hoveredNode.id].forEach(id => connected.add(id));
  }

  const alex = nodes.find(n => n.id === 'alex');

  // ── Draw magnetic field lines ──────────────────────────────────────────

  fieldLines.forEach((line, li) => {
    const vis = isClusterVisible(line.cluster);
    if (!vis) return;

    const sa = worldToScreen(line.sx, line.sy);
    const sb = worldToScreen(line.ex, line.ey);
    const sm = worldToScreen(line.midX, line.midY);

    // Determine intensity based on hover proximity
    let intensity = 1;
    if (hoveredNode) {
      if (hoveredNode.cluster === line.cluster || hoveredNode.cluster === 'center') {
        intensity = 2.5;
      } else {
        intensity = 0.3;
      }
    }
    if (highlightCluster) {
      intensity = highlightCluster === line.cluster ? 2.5 : 0.3;
    }

    // Breathing animation
    const breath = 1 + 0.3 * Math.sin(time * 0.5 + line.phaseOffset);

    // Gradient along the field line: center color -> cluster color
    const centerColor = hexToRGB(CLUSTER_COLORS.center);
    const clusterColor = hexToRGB(CLUSTER_COLORS[line.cluster]);

    const alpha = line.baseAlpha * intensity * breath;

    // Draw the field line using many small segments for gradient effect
    const segments = 40;
    ctx.lineWidth = line.width * zoom;
    ctx.lineCap = 'round';

    for (let s = 0; s < segments; s++) {
      const t0 = s / segments;
      const t1 = (s + 1) / segments;
      const p0 = bezierPoint(line, t0);
      const p1 = bezierPoint(line, t1);
      const sp0 = worldToScreen(p0.x, p0.y);
      const sp1 = worldToScreen(p1.x, p1.y);

      // Color blend: center -> cluster
      const blend = t0;
      const c = lerpColor(CLUSTER_COLORS.center, CLUSTER_COLORS[line.cluster], blend);

      // Fade at endpoints
      const edgeFade = Math.min(t0 * 4, (1 - t0) * 4, 1);
      const segAlpha = Math.min(alpha * edgeFade, 0.5);

      ctx.beginPath();
      ctx.moveTo(sp0.x, sp0.y);
      ctx.lineTo(sp1.x, sp1.y);
      ctx.strokeStyle = `rgba(${c.r},${c.g},${c.b},${segAlpha})`;
      ctx.stroke();
    }
  });

  // ── Draw field particles ───────────────────────────────────────────────

  fieldParticles.forEach(p => {
    const line = fieldLines[p.line];
    if (!line) return;
    if (!isClusterVisible(line.cluster)) return;

    // Advance particle
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;

    const pt = bezierPoint(line, p.t);
    const sp = worldToScreen(pt.x, pt.y);

    // Intensity from hover
    let intensity = 1;
    if (hoveredNode) {
      if (hoveredNode.cluster === line.cluster || hoveredNode.cluster === 'center') {
        intensity = 2;
      } else {
        intensity = 0.3;
      }
    }
    if (highlightCluster) {
      intensity = highlightCluster === line.cluster ? 2 : 0.3;
    }

    // Color blend along path
    const c = lerpColor(CLUSTER_COLORS.center, CLUSTER_COLORS[line.cluster], p.t);
    const edgeFade = Math.min(p.t * 5, (1 - p.t) * 5, 1);
    const particleAlpha = Math.min(p.alpha * intensity * edgeFade, 0.8);

    // Glow
    const glowR = (p.size + 3) * zoom;
    const glow = ctx.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, glowR);
    glow.addColorStop(0, `rgba(${c.r},${c.g},${c.b},${particleAlpha * 0.6})`);
    glow.addColorStop(1, `rgba(${c.r},${c.g},${c.b},0)`);
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Core dot
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, p.size * zoom * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${particleAlpha})`;
    ctx.fill();
  });

  // ── Draw center magnetic glow ──────────────────────────────────────────

  if (alex) {
    const sa = worldToScreen(alex.x, alex.y);
    const sunR = Math.min(W, H) * 0.2 * zoom;

    // Pulsing field source glow
    const pulse = 1 + 0.08 * Math.sin(time * 0.6);

    // Outermost halo
    const g3 = ctx.createRadialGradient(sa.x, sa.y, 0, sa.x, sa.y, sunR * 1.2 * pulse);
    g3.addColorStop(0, 'rgba(5, 150, 105, 0.05)');
    g3.addColorStop(0.4, 'rgba(5, 150, 105, 0.02)');
    g3.addColorStop(1, 'rgba(5, 150, 105, 0)');
    ctx.beginPath();
    ctx.arc(sa.x, sa.y, sunR * 1.2 * pulse, 0, Math.PI * 2);
    ctx.fillStyle = g3;
    ctx.fill();

    // Inner field core
    const g2 = ctx.createRadialGradient(sa.x, sa.y, 0, sa.x, sa.y, sunR * 0.5);
    g2.addColorStop(0, 'rgba(5, 150, 105, 0.07)');
    g2.addColorStop(0.7, 'rgba(5, 150, 105, 0.02)');
    g2.addColorStop(1, 'rgba(5, 150, 105, 0)');
    ctx.beginPath();
    ctx.arc(sa.x, sa.y, sunR * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = g2;
    ctx.fill();

    // Rotating field indicator rings
    ctx.save();
    ctx.translate(sa.x, sa.y);
    for (let ring = 0; ring < 3; ring++) {
      const ringR = (30 + ring * 18) * zoom * pulse;
      const ringAlpha = 0.04 - ring * 0.01;
      ctx.beginPath();
      ctx.arc(0, 0, ringR, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(5, 150, 105, ${ringAlpha})`;
      ctx.lineWidth = 0.8;
      ctx.setLineDash([3, 8 + ring * 4]);
      ctx.lineDashOffset = -time * (20 + ring * 10);
      ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();
  }

  // ── Draw cluster pole glows ────────────────────────────────────────────

  const clusterCenters = {};
  Object.keys(CLUSTER_COLORS).forEach(cl => {
    if (cl === 'center') return;
    const clNodes = nodes.filter(n => n.cluster === cl);
    if (clNodes.length === 0) return;
    let cx = 0, cy = 0;
    clNodes.forEach(n => { cx += n.x; cy += n.y; });
    cx /= clNodes.length; cy /= clNodes.length;
    clusterCenters[cl] = { x: cx, y: cy };
  });

  Object.keys(clusterCenters).forEach(cl => {
    if (!isClusterVisible(cl)) return;
    const pole = clusterCenters[cl];
    const sp = worldToScreen(pole.x, pole.y);
    const poleR = 50 * zoom;
    const color = hexToRGB(CLUSTER_COLORS[cl]);
    const isHighlighted = highlightCluster === cl || (hoveredNode && hoveredNode.cluster === cl);
    const baseAlpha = isHighlighted ? 0.08 : 0.03;

    const grad = ctx.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, poleR);
    grad.addColorStop(0, `rgba(${color.r},${color.g},${color.b},${baseAlpha})`);
    grad.addColorStop(1, `rgba(${color.r},${color.g},${color.b},0)`);
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, poleR, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Cluster label
    const labelAlpha = isHighlighted ? 0.5 : 0.12;
    ctx.font = '600 9px "SF Mono", "Fira Code", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = CLUSTER_COLORS[cl];
    ctx.globalAlpha = labelAlpha;
    ctx.fillText(cl.toUpperCase(), sp.x, sp.y - poleR - 4);
    ctx.globalAlpha = 1;
  });

  // ── Draw edges ─────────────────────────────────────────────────────────

  edges.forEach(([aId, bId]) => {
    const a = nodes.find(n => n.id === aId);
    const b = nodes.find(n => n.id === bId);
    if (!a || !b) return;
    if (!isVisible(a) && !isVisible(b)) return;

    const sa = worldToScreen(a.x, a.y);
    const sb = worldToScreen(b.x, b.y);

    let alpha, width, color;

    if (hoveredNode) {
      if (connected.has(aId) && connected.has(bId)) {
        color = NODE_COLORS[hoveredNode.type];
        alpha = 0.35;
        width = 1.8;
      } else {
        alpha = 0.02;
        width = 0.5;
        color = '#a8a29e';
      }
    } else if (highlightCluster) {
      const aIn = a.cluster === highlightCluster;
      const bIn = b.cluster === highlightCluster;
      if (aIn && bIn) {
        color = CLUSTER_COLORS[highlightCluster];
        alpha = 0.25;
        width = 1.5;
      } else if (aIn || bIn) {
        color = CLUSTER_COLORS[highlightCluster];
        alpha = 0.08;
        width = 1;
      } else {
        color = '#a8a29e'; alpha = 0.02; width = 0.5;
      }
    } else {
      // Determine edge color from shared cluster or blend
      if (a.cluster === b.cluster && a.cluster !== 'center') {
        color = CLUSTER_COLORS[a.cluster];
        alpha = 0.08;
      } else if (a.cluster === 'center' || b.cluster === 'center') {
        const other = a.cluster === 'center' ? b : a;
        color = CLUSTER_COLORS[other.cluster];
        alpha = 0.06;
      } else {
        color = '#a8a29e';
        alpha = 0.05;
      }
      width = 1;
    }

    if (!isVisible(a) || !isVisible(b)) {
      alpha *= 0.15;
    }

    ctx.beginPath();
    ctx.moveTo(sa.x, sa.y);
    ctx.lineTo(sb.x, sb.y);
    ctx.strokeStyle = color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = width * zoom;
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // ── Compute node screen positions ─────────────────────────────────────

  const nodeScreenData = nodes.map(n => {
    const vis = isVisible(n);
    const sp = worldToScreen(n.x, n.y);
    const r = n.size * zoom;
    const color = NODE_COLORS[n.type];
    const rgb = hexToRGB(color);
    const isHovered = hoveredNode && hoveredNode.id === n.id;
    const isConnected = hoveredNode && connected.has(n.id);
    const isDimmedByCluster = highlightCluster && n.cluster !== highlightCluster && n.cluster !== 'center';
    let nodeAlpha = vis ? 1 : 0.1;
    if (hoveredNode && !isConnected && !isHovered) nodeAlpha *= 0.2;
    if (isDimmedByCluster) nodeAlpha *= 0.25;
    return { n, vis, sp, r, color, rgb, isHovered, isConnected, isDimmedByCluster, nodeAlpha };
  });

  // ── Label placement (collision-aware) ────────────────────────────────

  // Pre-compute label positions to avoid overlaps
  const labelFont = (n) => `${n.size >= 10 ? '600' : '500'} ${Math.max(9, Math.min(13, n.size * zoom * 0.85))}px "Avenir Next", "SF Pro Text", sans-serif`;
  const labelPad = 3;
  const placedLabels = []; // { x, y, w, h } rects

  // Also treat all node circles as occupied space
  const occupiedRects = nodeScreenData.map(d => ({
    x: d.sp.x - d.r, y: d.sp.y - d.r, w: d.r * 2, h: d.r * 2,
  }));

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function overlapScore(rect) {
    let score = 0;
    for (const occ of occupiedRects) {
      if (rectsOverlap(rect, occ)) score += 1;
    }
    for (const pl of placedLabels) {
      if (rectsOverlap(rect, pl)) score += 2; // label-label overlap is worse
    }
    return score;
  }

  // Sort: larger/more important nodes get first pick of label position
  const sortedForLabels = [...nodeScreenData].sort((a, b) => b.n.size - a.n.size);

  const labelPositions = new Map(); // node id → { x, y, align, baseline }

  sortedForLabels.forEach(d => {
    if (!d.vis) return;
    ctx.font = labelFont(d.n);
    const tw = ctx.measureText(d.n.label).width;
    const th = Math.max(9, Math.min(13, d.n.size * zoom * 0.85));
    const gap = 6 * zoom;

    // Candidate positions: below, above, right, left
    const candidates = [
      { x: d.sp.x - tw / 2, y: d.sp.y + d.r + gap, align: 'center', baseline: 'top' },
      { x: d.sp.x - tw / 2, y: d.sp.y - d.r - gap - th, align: 'center', baseline: 'top' },
      { x: d.sp.x + d.r + gap, y: d.sp.y - th / 2, align: 'left', baseline: 'top' },
      { x: d.sp.x - d.r - gap - tw, y: d.sp.y - th / 2, align: 'left', baseline: 'top' },
    ];

    let bestCandidate = candidates[0];
    let bestScore = Infinity;

    for (const cand of candidates) {
      const rect = { x: cand.x - labelPad, y: cand.y - labelPad, w: tw + labelPad * 2, h: th + labelPad * 2 };
      const score = overlapScore(rect);
      if (score < bestScore) {
        bestScore = score;
        bestCandidate = cand;
      }
      if (score === 0) break; // perfect, no need to check more
    }

    const finalRect = { x: bestCandidate.x - labelPad, y: bestCandidate.y - labelPad, w: tw + labelPad * 2, h: th + labelPad * 2 };
    placedLabels.push(finalRect);

    // Store the draw position — use center x for the text
    let drawX;
    if (bestCandidate.align === 'center') {
      drawX = d.sp.x;
    } else {
      drawX = bestCandidate.x;
    }
    labelPositions.set(d.n.id, { x: drawX, y: bestCandidate.y, align: bestCandidate.align });
  });

  // ── Draw nodes ─────────────────────────────────────────────────────────

  nodeScreenData.forEach(({ n, vis, sp, r, color, rgb, isHovered, isConnected, isDimmedByCluster, nodeAlpha }) => {
    // Node glow (magnetic field influence)
    if (vis && (isHovered || isConnected || n.cluster === 'center')) {
      const glowR = r * (isHovered ? 3.5 : 2.5);
      const glowAlpha = isHovered ? 0.12 : 0.05;
      const glow = ctx.createRadialGradient(sp.x, sp.y, r * 0.5, sp.x, sp.y, glowR);
      glow.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},${glowAlpha})`);
      glow.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
    }

    // Magnetic pulse ring on center node
    if (n.id === 'alex') {
      const pulseT = (time * 0.4) % 1;
      const pulseR = r * (1.5 + pulseT * 2);
      const pulseAlpha = 0.12 * (1 - pulseT);
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, pulseR, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(5, 150, 105, ${pulseAlpha})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Node shadow
    ctx.save();
    ctx.globalAlpha = nodeAlpha;
    if (vis) {
      ctx.shadowColor = `rgba(${rgb.r},${rgb.g},${rgb.b},0.15)`;
      ctx.shadowBlur = isHovered ? 16 : 8;
      ctx.shadowOffsetY = 2;
    }

    // Node body
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, r, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // Node border
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = color;
    ctx.lineWidth = isHovered ? 2.5 : (n.cluster === 'center' ? 2.5 : 1.8);
    ctx.stroke();

    // Inner fill accent
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, r * 0.65, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${isHovered ? 0.15 : 0.06})`;
    ctx.fill();

    ctx.restore();

    // Label (using collision-aware position)
    if (vis && labelPositions.has(n.id)) {
      const lp = labelPositions.get(n.id);
      const labelAlpha = (hoveredNode && !isConnected && !isHovered) ? 0.15 :
                          isDimmedByCluster ? 0.2 : 0.85;
      ctx.globalAlpha = labelAlpha;
      ctx.font = labelFont(n);
      ctx.textAlign = lp.align;
      ctx.textBaseline = 'top';
      ctx.fillStyle = '#1c1917';
      ctx.fillText(n.label, lp.x, lp.y);
      ctx.globalAlpha = 1;
    }
  });

  requestAnimationFrame(draw);
}

function isClusterVisible(cl) {
  if (activeFilter === 'all') return true;
  const filterToCluster = {
    company: 'companies',
    role: 'titles',
    skill: 'skills',
    project: 'projects',
    goal: 'trajectory',
  };
  return filterToCluster[activeFilter] === cl;
}

// ── Interaction ───────────────────────────────────────────────────────────

function getNodeAt(sx, sy) {
  const w = screenToWorld(sx, sy);
  let closest = null, minD = Infinity;
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    if (!isVisible(n)) continue;
    const dx = n.x - w.x, dy = n.y - w.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    const hitR = n.size + 6;
    if (d < hitR && d < minD) { minD = d; closest = n; }
  }
  return closest;
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const w = screenToWorld(mx, my);
  mouseWorldX = w.x;
  mouseWorldY = w.y;

  if (panning) {
    panX += mx - panSX;
    panY += my - panSY;
    panSX = mx; panSY = my;
    return;
  }

  const node = getNodeAt(mx, my);
  hoveredNode = node;
  canvas.style.cursor = node ? 'pointer' : 'default';

  // Tooltip
  const tt = document.getElementById('tooltip');
  if (node) {
    document.getElementById('ttCluster').textContent = node.cluster.toUpperCase();
    document.getElementById('ttCluster').style.background = CLUSTER_COLORS[node.cluster] || CLUSTER_COLORS.center;
    document.getElementById('ttCluster').style.color = '#fff';
    document.getElementById('ttName').textContent = node.label;
    document.getElementById('ttDetail').textContent = node.detail;
    const connCount = adj[node.id] ? adj[node.id].size : 0;
    document.getElementById('ttConns').textContent = connCount + ' connections';
    tt.style.left = (mx + 18) + 'px';
    tt.style.top = (my - 10) + 'px';
    tt.classList.add('visible');
  } else {
    tt.classList.remove('visible');
  }
});

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  panning = true;
  panSX = mx; panSY = my;
  canvas.style.cursor = 'move';
});

canvas.addEventListener('mouseup', () => {
  panning = false;
  canvas.style.cursor = hoveredNode ? 'pointer' : 'default';
});

canvas.addEventListener('mouseleave', () => {
  hoveredNode = null;
  document.getElementById('tooltip').classList.remove('visible');
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.92 : 1.08;
  const newZoom = Math.max(0.3, Math.min(4, zoom * delta));

  panX = mx - (mx - panX) * (newZoom / zoom);
  panY = my - (my - panY) * (newZoom / zoom);
  zoom = newZoom;
}, { passive: false });

// Zoom controls
document.getElementById('zoomIn').addEventListener('click', () => {
  const cx = W / 2, cy = H / 2;
  const newZoom = Math.min(4, zoom * 1.2);
  panX = cx - (cx - panX) * (newZoom / zoom);
  panY = cy - (cy - panY) * (newZoom / zoom);
  zoom = newZoom;
});
document.getElementById('zoomOut').addEventListener('click', () => {
  const cx = W / 2, cy = H / 2;
  const newZoom = Math.max(0.3, zoom * 0.83);
  panX = cx - (cx - panX) * (newZoom / zoom);
  panY = cy - (cy - panY) * (newZoom / zoom);
  zoom = newZoom;
});
document.getElementById('zoomReset').addEventListener('click', () => {
  zoom = 1; panX = 0; panY = 0;
});


// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value;
});

// Constellation panel
document.querySelectorAll('.const-item').forEach(item => {
  item.addEventListener('click', () => {
    const cl = item.dataset.cluster;
    if (highlightCluster === cl) {
      highlightCluster = null;
      item.classList.remove('active');
    } else {
      document.querySelectorAll('.const-item').forEach(i => i.classList.remove('active'));
      highlightCluster = cl;
      item.classList.add('active');
    }
  });
});

// Node count
function updateNodeCount() {
  const visible = nodes.filter(n => isVisible(n)).length;
  document.getElementById('nodeCountBottom').textContent = visible + ' of ' + nodes.length + ' nodes';
}
setInterval(updateNodeCount, 300);

// ── Init ──────────────────────────────────────────────────────────────────

window.addEventListener('resize', resize);
resize();
updateNodeCount();
requestAnimationFrame(draw);
</script>
</body>
