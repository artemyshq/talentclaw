  #legend {

</style>

<body>

<div id="title-overlay">
  <h1>Career Neural Network</h1>

</div>

<div id="tooltip">
  <div class="tt-company"></div>

<div id="legend">
  <div class="legend-item"><div class="legend-line" style="background:rgba(240,230,208,0.5);box-shadow:0 0 6px rgba(240,230,208,0.3)"></div> Main timeline</div>

  <div class="legend-item"><div class="legend-dot" style="background:#93C5FD;box-shadow:0 0 6px #93C5FD"></div> Education</div>
</div>

<canvas id="c"></canvas>

<script>
// ── Data ──────────────────────────────────────────────────────────────
const careerData = [
  {
    type: 'education',
    name: 'Stanford University',
    role: 'BS Computer Science',
    startYear: 2015,
    endYear: 2016,
    color: '#93C5FD',
    skills: ['System Design', 'Algorithms'],
    projects: [],
    side: -1,
    offsetY: 65
  },
  {
    type: 'company',
    name: 'Datadog',
    role: 'Backend Engineer',
    startYear: 2017,
    endYear: 2019,
    color: '#A855F7',
    skills: ['PostgreSQL', 'Redis', 'Docker', 'Observability'],
    projects: ['Analytics Dashboard'],
    side: 1,
    offsetY: 75
  },
  {
    type: 'company',
    name: 'Stripe',
    role: 'Staff Engineer',
    startYear: 2019,
    endYear: 2022,
    color: '#EC4899',
    skills: ['TypeScript', 'Node.js', 'GraphQL', 'System Design', 'API Design', 'Payments'],
    projects: ['API Gateway'],
    side: -1,
    offsetY: 80
  },
  {
    type: 'company',
    name: 'Vercel',
    role: 'Senior Frontend Engineer',
    startYear: 2022,
    endYear: 2024,
    color: '#22D3EE',
    skills: ['TypeScript', 'React', 'Next.js', 'Tailwind CSS'],
    projects: ['Design System', 'Developer SDK'],
    side: 1,
    offsetY: 75
  },
  {
    type: 'company',
    name: 'Fly.io',
    role: 'Platform Engineer',
    startYear: 2024,
    endYear: 2026,
    color: '#84CC16',
    skills: ['Docker', 'Edge Computing', 'Rust'],
    projects: [],
    side: -1,
    offsetY: 70
  },
  {
    type: 'consulting',
    name: 'Notion',
    role: 'React Consulting',
    startYear: 2023,
    endYear: 2023.5,
    color: '#F59E0B',
    skills: ['React'],
    projects: [],
    side: 1,
    offsetY: 45
  }
];

const industries = ['SaaS', 'FinTech', 'DevTools', 'Infrastructure', 'Cloud'];

// ── Canvas Setup ──────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;
let mouse = { x: -9999, y: -9999 };
let hoveredBranch = null;
let growthProgress = 0;
let growthStartTime = 0;
const GROWTH_DURATION = 3500;

let axonPoints = [];
let branches = [];
let sharedSkillLinks = [];
let pulses = [];
let yearMarkers = [];
let particles = [];

let seed = 42;
function seededRandom() {
  seed = (seed * 16807 + 0) % 2147483647;
  return (seed - 1) / 2147483646;
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  seed = 42;
  computeLayout();
}

// ── Layout ────────────────────────────────────────────────────────────
function computeLayout() {
  branches = [];
  sharedSkillLinks = [];
  axonPoints = [];
  yearMarkers = [];
  particles = [];

  const padL = 120, padR = 80;
  const axonY = H * 0.5;

  // Derive year range from data
  let dataMinYear = Infinity, dataMaxYear = -Infinity;
  careerData.forEach(e => {
    if (e.startYear < dataMinYear) dataMinYear = e.startYear;
    if (e.endYear > dataMaxYear) dataMaxYear = e.endYear;
  });
  const currentYear = 2026;
  const minYear = dataMinYear - 1;
  const maxYear = Math.max(dataMaxYear, currentYear) + 0.8;
  const yearSpan = maxYear - minYear;

  function yearToX(y) {
    return padL + ((y - minYear) / yearSpan) * (W - padL - padR);
  }

  // Year markers — adapt density based on span
  const totalYears = Math.ceil(maxYear) - Math.floor(minYear);
  let yearStep = 1;
  if (totalYears > 30) yearStep = 5;
  else if (totalYears > 15) yearStep = 2;

  for (let y = Math.ceil(dataMinYear / yearStep) * yearStep; y <= Math.floor(maxYear); y += yearStep) {
    yearMarkers.push({ year: y, x: yearToX(y), y: axonY });
  }

  // Axon path with gentle organic wobble
  const axonSegments = 400;
  for (let i = 0; i <= axonSegments; i++) {
    const t = i / axonSegments;
    const x = padL + t * (W - padL - padR);
    const wobble = Math.sin(t * Math.PI * 3) * 4 + Math.sin(t * Math.PI * 7) * 1.5;
    axonPoints.push({ x, y: axonY + wobble });
  }

  function axonYAtX(targetX) {
    let closest = axonPoints[0];
    let minDist = Infinity;
    for (const ap of axonPoints) {
      const d = Math.abs(ap.x - targetX);
      if (d < minDist) { minDist = d; closest = ap; }
    }
    return closest.y;
  }

  // Adaptive transition width based on timeline density
  const pxPerYear = (W - padL - padR) / yearSpan;
  const transitionYears = Math.min(0.4, pxPerYear > 60 ? 0.4 : 0.2);

  careerData.forEach((entry, idx) => {
    const isConsulting = entry.type === 'consulting';
    const isCurrent = entry.endYear >= currentYear;
    const side = entry.side; // -1 = above, 1 = below
    const offsetY = entry.offsetY * side;

    // Key x positions
    const forkX = yearToX(entry.startYear);
    const forkAxonY = axonYAtX(forkX);
    const mergeX = yearToX(entry.endYear);
    const mergeAxonY = axonYAtX(mergeX);

    // The parallel section starts after the fork curve and ends before the merge curve
    const transitionPx = yearToX(entry.startYear + transitionYears) - forkX;
    const minTransition = 8;
    const actualTransitionPx = Math.max(transitionPx, minTransition);
    const parallelStartX = forkX + actualTransitionPx;
    const parallelEndX = isCurrent ? mergeX : Math.max(mergeX - actualTransitionPx, parallelStartX);
    const parallelY = forkAxonY + offsetY;

    // Build the branch path as a series of points for drawing and hit testing
    // Path: forkPoint -> (bezier curve) -> parallelStart -> parallelEnd -> (bezier curve) -> mergePoint
    const pathPoints = [];
    const pathSegments = 80;

    for (let i = 0; i <= pathSegments; i++) {
      const t = i / pathSegments;
      const totalLen = mergeX - forkX;
      const currentX = forkX + t * totalLen;
      let currentY;

      if (currentX <= parallelStartX) {
        // Fork curve: smooth transition from axon to parallel lane
        const forkT = (currentX - forkX) / (parallelStartX - forkX);
        const eased = forkT * forkT * (3 - 2 * forkT); // smoothstep
        const localAxonY = axonYAtX(currentX);
        currentY = localAxonY + offsetY * eased;
      } else if (currentX >= parallelEndX && !isCurrent) {
        // Merge curve: smooth transition from parallel lane back to axon
        const mergeT = (currentX - parallelEndX) / (mergeX - parallelEndX);
        const eased = mergeT * mergeT * (3 - 2 * mergeT);
        currentY = parallelY + (mergeAxonY - parallelY) * eased;
      } else {
        // Parallel section: slight organic wobble
        const wobbleT = (currentX - parallelStartX) / Math.max(parallelEndX - parallelStartX, 1);
        const wobble = Math.sin(wobbleT * Math.PI * 2 + idx) * 2;
        currentY = parallelY + wobble;
      }

      pathPoints.push({ x: currentX, y: currentY });
    }

    // Skill sub-branches: distributed along the parallel section, growing outward
    const skillBranches = [];
    const skillCount = entry.skills.length;
    const parallelLen = parallelEndX - parallelStartX;

    entry.skills.forEach((skill, si) => {
      // Distribute skills evenly along the parallel section
      const skillT = skillCount === 1 ? 0.5 : si / (skillCount - 1);
      const skillX = parallelStartX + skillT * parallelLen;

      // Find the path Y at this X
      let pathY = parallelY;
      for (const pp of pathPoints) {
        if (Math.abs(pp.x - skillX) < (mergeX - forkX) / pathSegments + 1) {
          pathY = pp.y;
          break;
        }
      }

      // Branch outward (away from axon) at a gentle forward-leaning angle
      const baseAngle = side === -1 ? -Math.PI / 2 : Math.PI / 2;
      const lean = (seededRandom() - 0.3) * 0.4; // slight forward lean
      const angle = baseAngle + lean;
      const len = 28 + seededRandom() * 20;

      const endX = skillX + Math.cos(angle) * len;
      const endY = pathY + Math.sin(angle) * len;

      // Tiny tips
      const tips = [];
      const tipCount = 1 + Math.floor(seededRandom() * 2);
      for (let t = 0; t < tipCount; t++) {
        const tipAngle = angle + (seededRandom() - 0.5) * 0.5;
        const tipLen = 6 + seededRandom() * 10;
        tips.push({
          x: endX + Math.cos(tipAngle) * tipLen,
          y: endY + Math.sin(tipAngle) * tipLen
        });
      }

      skillBranches.push({ skill, skillX, pathY, angle, len, endX, endY, tips });
    });

    // Project sub-branches: grow off the parallel section at an angle
    const projectBranches = [];
    entry.projects.forEach((proj, pi) => {
      const projT = 0.3 + (pi / Math.max(entry.projects.length, 1)) * 0.4;
      const projX = parallelStartX + projT * parallelLen;
      let projPathY = parallelY;
      for (const pp of pathPoints) {
        if (Math.abs(pp.x - projX) < (mergeX - forkX) / pathSegments + 1) {
          projPathY = pp.y;
          break;
        }
      }

      // Projects branch forward-and-outward
      const angle = side === -1
        ? -Math.PI * 0.35 + (pi % 2 === 0 ? -0.2 : 0.2)
        : Math.PI * 0.35 + (pi % 2 === 0 ? 0.2 : -0.2);
      const len = 20 + seededRandom() * 12;

      projectBranches.push({
        name: proj,
        startX: projX,
        startY: projPathY,
        endX: projX + Math.cos(angle) * len,
        endY: projPathY + Math.sin(angle) * len,
        angle
      });
    });

    branches.push({
      ...entry,
      idx,
      forkX, forkAxonY,
      mergeX, mergeAxonY,
      parallelStartX, parallelEndX,
      parallelY,
      pathPoints,
      offsetY: entry.offsetY,
      side,
      isConsulting,
      isCurrent,
      skillBranches,
      projectBranches,
      branchPxWidth: mergeX - forkX,
      growDelay: idx * (0.6 / Math.max(careerData.length, 1)),
    });
  });

  // Shared skill links
  const skillMap = {};
  branches.forEach(br => {
    br.skillBranches.forEach(sb => {
      if (!skillMap[sb.skill]) skillMap[sb.skill] = [];
      skillMap[sb.skill].push({ branch: br, sb });
    });
  });

  Object.keys(skillMap).forEach(skill => {
    const entries = skillMap[skill];
    if (entries.length < 2) return;
    for (let i = 0; i < entries.length - 1; i++) {
      for (let j = i + 1; j < entries.length; j++) {
        sharedSkillLinks.push({
          skill,
          from: entries[i],
          to: entries[j],
          pulseOffset: seededRandom() * Math.PI * 2
        });
      }
    }
  });

  // Axon pulses — evenly spaced, steady flow
  pulses = [];
  const pulseCount = 5;
  for (let i = 0; i < pulseCount; i++) {
    pulses.push({
      t: i / pulseCount,
      speed: 0.00035,
      size: 3,
      brightness: 0.6
    });
  }

  // Particles
  branches.forEach(br => {
    const count = br.isConsulting ? 2 : 4;
    for (let i = 0; i < count; i++) {
      particles.push(createParticle(br));
    }
  });
}

function createParticle(branch) {
  const sb = branch.skillBranches.length > 0
    ? branch.skillBranches[Math.floor(Math.random() * branch.skillBranches.length)]
    : null;
  const cx = sb ? sb.endX : (branch.parallelStartX + branch.parallelEndX) / 2;
  const cy = sb ? sb.endY : branch.parallelY;
  return {
    branch,
    x: cx + (Math.random() - 0.5) * 30,
    y: cy + (Math.random() - 0.5) * 30,
    vx: (Math.random() - 0.5) * 0.2,
    vy: (Math.random() - 0.5) * 0.2,
    life: Math.random(),
    maxLife: 3 + Math.random() * 4,
    size: 1 + Math.random() * 1.5
  };
}

// ── Drawing ───────────────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle = '#08090E';
  ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < 200; i++) {
    ctx.fillStyle = `rgba(80, 50, 120, ${Math.random() * 0.025})`;
    ctx.fillRect(Math.random() * W, Math.random() * H, 1, 1);
  }
}

function drawAxon(time, gp) {
  if (axonPoints.length < 2) return;
  const visibleCount = Math.floor(axonPoints.length * Math.min(gp * 1.3, 1));
  if (visibleCount < 2) return;

  const breathe = 1 + Math.sin(time * 0.0008) * 0.005;

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Wide glow
  ctx.strokeStyle = 'rgba(240, 230, 208, 0.035)';
  ctx.lineWidth = 18 * breathe;
  ctx.beginPath();
  ctx.moveTo(axonPoints[0].x, axonPoints[0].y);
  for (let i = 1; i < visibleCount; i++) ctx.lineTo(axonPoints[i].x, axonPoints[i].y);
  ctx.stroke();

  // Mid glow
  ctx.strokeStyle = 'rgba(240, 230, 208, 0.1)';
  ctx.lineWidth = 5 * breathe;
  ctx.beginPath();
  ctx.moveTo(axonPoints[0].x, axonPoints[0].y);
  for (let i = 1; i < visibleCount; i++) ctx.lineTo(axonPoints[i].x, axonPoints[i].y);
  ctx.stroke();

  // Core
  ctx.strokeStyle = 'rgba(240, 230, 208, 0.35)';
  ctx.lineWidth = 1.8 * breathe;
  ctx.beginPath();
  ctx.moveTo(axonPoints[0].x, axonPoints[0].y);
  for (let i = 1; i < visibleCount; i++) ctx.lineTo(axonPoints[i].x, axonPoints[i].y);
  ctx.stroke();

  ctx.restore();

  // Pulses
  pulses.forEach(pulse => {
    pulse.t += pulse.speed;
    if (pulse.t > 1) pulse.t -= 1;
    const idx = Math.floor(pulse.t * (visibleCount - 1));
    if (idx >= 0 && idx < visibleCount) {
      const pt = axonPoints[idx];
      const alpha = pulse.brightness;
      const grad = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, pulse.size * 5);
      grad.addColorStop(0, `rgba(240, 230, 208, ${alpha})`);
      grad.addColorStop(0.4, `rgba(240, 230, 208, ${alpha * 0.25})`);
      grad.addColorStop(1, 'rgba(240, 230, 208, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pulse.size * 5, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

function drawBranch(branch, time, gp) {
  const brGrow = Math.max(0, Math.min(1, (gp - branch.growDelay) / 0.2));
  if (brGrow <= 0) return;

  const isHovered = hoveredBranch === branch;
  const breathe = 1 + Math.sin(time * 0.001 + branch.idx * 1.5) * 0.015;
  const dimFactor = (hoveredBranch && !isHovered) ? 0.12 : 1;

  const pts = branch.pathPoints;
  const visibleCount = Math.floor(pts.length * Math.min(brGrow * 1.3, 1));
  if (visibleCount < 2) return;

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // ── Fork junction glow ──
  const jR = isHovered ? 16 : 8;
  const jGrad = ctx.createRadialGradient(branch.forkX, branch.forkAxonY, 0, branch.forkX, branch.forkAxonY, jR);
  jGrad.addColorStop(0, hexToRgba(branch.color, 0.35 * dimFactor));
  jGrad.addColorStop(1, hexToRgba(branch.color, 0));
  ctx.fillStyle = jGrad;
  ctx.beginPath();
  ctx.arc(branch.forkX, branch.forkAxonY, jR, 0, Math.PI * 2);
  ctx.fill();

  // Fork dot
  ctx.fillStyle = hexToRgba(branch.color, 0.8 * dimFactor);
  ctx.beginPath();
  ctx.arc(branch.forkX, branch.forkAxonY, 3 * breathe, 0, Math.PI * 2);
  ctx.fill();

  // ── Main branch path: wide glow ──
  ctx.strokeStyle = hexToRgba(branch.color, (isHovered ? 0.1 : 0.035) * dimFactor);
  ctx.lineWidth = (branch.isConsulting ? 8 : 12) * breathe;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < visibleCount; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();

  // Main branch path: core
  ctx.strokeStyle = hexToRgba(branch.color, (isHovered ? 0.6 : 0.28) * dimFactor);
  ctx.lineWidth = (branch.isConsulting ? 1.2 : 2.2) * breathe;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < visibleCount; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();

  // Inner bright core
  ctx.strokeStyle = hexToRgba(branch.color, (isHovered ? 0.8 : 0.45) * dimFactor);
  ctx.lineWidth = (branch.isConsulting ? 0.5 : 0.8) * breathe;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < visibleCount; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();

  // ── Merge junction (if not current) ──
  if (!branch.isCurrent && brGrow > 0.9) {
    const mAlpha = (brGrow - 0.9) / 0.1;
    const mR = isHovered ? 14 : 7;
    const mGrad = ctx.createRadialGradient(branch.mergeX, branch.mergeAxonY, 0, branch.mergeX, branch.mergeAxonY, mR);
    mGrad.addColorStop(0, hexToRgba(branch.color, 0.3 * dimFactor * mAlpha));
    mGrad.addColorStop(1, hexToRgba(branch.color, 0));
    ctx.fillStyle = mGrad;
    ctx.beginPath();
    ctx.arc(branch.mergeX, branch.mergeAxonY, mR, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = hexToRgba(branch.color, 0.6 * dimFactor * mAlpha);
    ctx.beginPath();
    ctx.arc(branch.mergeX, branch.mergeAxonY, 2.5 * breathe, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Labels — adaptive sizing based on branch pixel width ──
  if (brGrow > 0.4) {
    const labelAlpha = (isHovered ? 0.95 : 0.55) * dimFactor;
    const midX = (branch.parallelStartX + branch.parallelEndX) / 2;

    let labelY = branch.parallelY;
    for (const pp of pts) {
      if (Math.abs(pp.x - midX) < 5) { labelY = pp.y; break; }
    }

    const clearance = 10;
    const glowHalf = 7;

    // Scale font size for narrow branches
    const bw = branch.branchPxWidth;
    const nameFontSize = branch.isConsulting ? 11 : Math.max(10, Math.min(13, bw * 0.08));
    const roleFontSize = Math.max(8, Math.min(10, bw * 0.06));
    const nameWeight = branch.isConsulting ? '400' : '600';

    // Truncate text to fit
    function fitText(text, font, maxWidth) {
      ctx.font = font;
      if (ctx.measureText(text).width <= maxWidth) return text;
      let truncated = text;
      while (truncated.length > 1 && ctx.measureText(truncated + '…').width > maxWidth) {
        truncated = truncated.slice(0, -1);
      }
      return truncated + '…';
    }

    const maxLabelWidth = Math.max(bw * 1.4, 80);
    const nameFont = `${nameWeight} ${nameFontSize}px "Outfit", sans-serif`;
    const roleFont = `${roleFontSize}px "Space Mono", monospace`;
    const nameText = fitText(branch.name, nameFont, maxLabelWidth);
    const roleText = fitText(branch.role, roleFont, maxLabelWidth);

    if (branch.side === -1) {
      const baseY = labelY - glowHalf - clearance;

      if (brGrow > 0.6) {
        ctx.font = roleFont;
        ctx.fillStyle = `rgba(240, 230, 208, ${(isHovered ? 0.4 : 0.18) * dimFactor})`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(roleText, midX, baseY);
      }

      ctx.font = nameFont;
      ctx.fillStyle = hexToRgba(branch.color, labelAlpha);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(nameText, midX, baseY - (roleFontSize + 4));
    } else {
      const baseY = labelY + glowHalf + clearance;

      ctx.font = nameFont;
      ctx.fillStyle = hexToRgba(branch.color, labelAlpha);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(nameText, midX, baseY);

      if (brGrow > 0.6) {
        ctx.font = roleFont;
        ctx.fillStyle = `rgba(240, 230, 208, ${(isHovered ? 0.4 : 0.18) * dimFactor})`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(roleText, midX, baseY + nameFontSize + 3);
      }
    }
  }

  ctx.restore();
}

function drawSharedSkillLinks(time, gp) {
  sharedSkillLinks.forEach(link => {
    const fromGrow = Math.max(0, Math.min(1, (gp - link.from.branch.growDelay) / 0.2));
    const toGrow = Math.max(0, Math.min(1, (gp - link.to.branch.growDelay) / 0.2));
    if (fromGrow < 0.8 || toGrow < 0.8) return;

    const fromSB = link.from.sb;
    const toSB = link.to.sb;

    const isHovered = hoveredBranch === link.from.branch || hoveredBranch === link.to.branch;
    const alpha = isHovered ? 0.22 : 0.04;
    const dimFactor = (hoveredBranch && !isHovered) ? 0.15 : 1;

    const midX = (fromSB.endX + toSB.endX) / 2;
    const midY = (fromSB.endY + toSB.endY) / 2;

    ctx.save();
    ctx.strokeStyle = `rgba(253, 230, 138, ${alpha * dimFactor})`;
    ctx.lineWidth = 0.5;
    ctx.setLineDash([2, 5]);
    ctx.beginPath();
    ctx.moveTo(fromSB.endX, fromSB.endY);
    ctx.quadraticCurveTo(midX, midY, toSB.endX, toSB.endY);
    ctx.stroke();
    ctx.setLineDash([]);

    if (isHovered || !hoveredBranch) {
      const pulseT = (Math.sin(time * 0.0015 + link.pulseOffset) + 1) / 2;
      const dotX = fromSB.endX + (toSB.endX - fromSB.endX) * pulseT;
      const dotY = fromSB.endY + (toSB.endY - fromSB.endY) * pulseT;

      const dAlpha = (isHovered ? 0.5 : 0.15) * dimFactor;
      const dGrad = ctx.createRadialGradient(dotX, dotY, 0, dotX, dotY, 4);
      dGrad.addColorStop(0, `rgba(253, 230, 138, ${dAlpha})`);
      dGrad.addColorStop(1, 'rgba(253, 230, 138, 0)');
      ctx.fillStyle = dGrad;
      ctx.beginPath();
      ctx.arc(dotX, dotY, 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  });
}

function drawParticles(time, gp) {
  particles.forEach((p, i) => {
    const brGrow = Math.max(0, Math.min(1, (gp - p.branch.growDelay) / 0.2));
    if (brGrow < 0.7) return;

    p.x += p.vx;
    p.y += p.vy;
    p.life += 0.016 / p.maxLife;

    if (p.life > 1) { particles[i] = createParticle(p.branch); return; }

    const isHovered = hoveredBranch === p.branch;
    const dimFactor = (hoveredBranch && !isHovered) ? 0.12 : 1;
    const alpha = Math.sin(p.life * Math.PI) * (isHovered ? 0.35 : 0.12) * dimFactor;

    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 3);
    grad.addColorStop(0, hexToRgba(p.branch.color, alpha));
    grad.addColorStop(1, hexToRgba(p.branch.color, 0));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawYearMarkers(time, gp) {
  yearMarkers.forEach((ym, i) => {
    const yearIdx = i;
    const yearProgress = Math.max(0, Math.min(1, gp * 14 - yearIdx * 0.8));
    if (yearProgress <= 0) return;

    ctx.save();

    // Tick mark directly on the axon
    const tickLen = 8;
    ctx.strokeStyle = `rgba(240, 230, 208, ${0.1 * yearProgress})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(ym.x, ym.y - tickLen);
    ctx.lineTo(ym.x, ym.y + tickLen);
    ctx.stroke();

    // Small glow dot at intersection
    const dotGrad = ctx.createRadialGradient(ym.x, ym.y, 0, ym.x, ym.y, 3);
    dotGrad.addColorStop(0, `rgba(240, 230, 208, ${0.12 * yearProgress})`);
    dotGrad.addColorStop(1, 'rgba(240, 230, 208, 0)');
    ctx.fillStyle = dotGrad;
    ctx.beginPath();
    ctx.arc(ym.x, ym.y, 3, 0, Math.PI * 2);
    ctx.fill();

    // Year label just below the tick, on the axon
    ctx.font = '9px "Space Mono", monospace';
    ctx.fillStyle = `rgba(240, 230, 208, ${0.22 * yearProgress})`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(ym.year.toString(), ym.x, ym.y + tickLen + 3);

    ctx.restore();
  });
}

function drawIndustryTags(time, gp) {
  if (gp < 0.8) return;
  const tagAlpha = (gp - 0.8) / 0.2;
  ctx.save();
  ctx.font = '9px "Space Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = `rgba(240, 230, 208, ${0.1 * tagAlpha})`;
  const tagY = H - 30;
  const totalWidth = industries.length * 100;
  const startX = (W - totalWidth) / 2 + 50;
  industries.forEach((ind, i) => {
    ctx.fillText(ind, startX + i * 100, tagY + Math.sin(time * 0.001 + i * 0.8) * 1.5);
  });
  ctx.restore();
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

// ── Hit Testing ───────────────────────────────────────────────────────
function updateHover() {
  let found = null;

  for (const br of branches) {
    // Test against the branch path points — check proximity to any point
    for (const pp of br.pathPoints) {
      const dx = mouse.x - pp.x;
      const dy = mouse.y - pp.y;
      if (Math.abs(dx) < 15 && Math.abs(dy) < 20) {
        found = br;
        break;
      }
    }
    if (found) break;
  }

  hoveredBranch = found;

  const tooltip = document.getElementById('tooltip');
  if (found) {
    canvas.style.cursor = 'pointer';
    tooltip.querySelector('.tt-company').textContent = found.name;
    tooltip.querySelector('.tt-company').style.color = found.color;
    tooltip.querySelector('.tt-role').textContent = found.role;
    tooltip.querySelector('.tt-skills').textContent = found.skills.join(' · ');
    tooltip.querySelector('.tt-projects').textContent = found.projects.length
      ? 'Projects: ' + found.projects.join(', ') : '';
    tooltip.classList.add('visible');

    let tx = mouse.x + 20, ty = mouse.y - 10;
    if (tx + 260 > W) tx = mouse.x - 280;
    if (ty + 150 > H) ty = mouse.y - 150;
    if (ty < 10) ty = 10;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  } else {
    canvas.style.cursor = 'default';
    tooltip.classList.remove('visible');
  }
}

// ── Main Loop ─────────────────────────────────────────────────────────
function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }

function draw(time) {
  if (!growthStartTime) growthStartTime = time || performance.now();
  const elapsed = time - growthStartTime;
  const rawGP = Math.min(elapsed / GROWTH_DURATION, 1);
  growthProgress = easeOutQuart(rawGP);

  drawBackground();
  drawAxon(time, growthProgress);
  branches.forEach(br => drawBranch(br, time, growthProgress));
  drawYearMarkers(time, growthProgress);

  if (rawGP > 0.3) {
    document.getElementById('title-overlay').classList.add('visible');
    document.getElementById('legend').classList.add('visible');
  }

  updateHover();
  requestAnimationFrame(draw);
}

canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; hoveredBranch = null; });
window.addEventListener('resize', resize);

resize();
requestAnimationFrame(function start(time) { growthStartTime = time; draw(time); });
document.addEventListener('visibilitychange', () => { if (!document.hidden) requestAnimationFrame(draw); });
</script>
</body>
