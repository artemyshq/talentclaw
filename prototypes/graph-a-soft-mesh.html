<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Orrery — Jordan Blue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Instrument+Sans:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0f1e; }
  canvas { display: block; position: fixed; top: 0; left: 0; cursor: default; }

  #detail-panel {
    position: fixed;
    top: 0;
    right: -340px;
    width: 320px;
    height: 100%;
    background: linear-gradient(135deg, rgba(10, 15, 30, 0.96), rgba(15, 20, 40, 0.96));
    border-left: 1px solid rgba(201, 168, 76, 0.12);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    padding: 48px 32px;
    transition: right 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
    z-index: 10;
    font-family: 'Instrument Sans', sans-serif;
    color: #ede6d6;
    overflow-y: auto;
  }
  #detail-panel.open { right: 0; }
  #detail-panel .panel-type {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(201, 168, 76, 0.7);
    margin-bottom: 8px;
  }
  #detail-panel .panel-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 28px;
    color: #ede6d6;
    margin-bottom: 24px;
    line-height: 1.2;
  }
  #detail-panel .panel-ring {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 12px;
    color: rgba(237, 230, 214, 0.35);
    margin-bottom: 32px;
  }
  #detail-panel .panel-connections-title {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(201, 168, 76, 0.45);
    margin-bottom: 14px;
  }
  #detail-panel .panel-connection {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 16px;
    color: rgba(237, 230, 214, 0.6);
    padding: 7px 0;
    border-bottom: 1px solid rgba(201, 168, 76, 0.06);
  }
  #detail-panel .panel-connection .conn-type {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(201, 168, 76, 0.3);
    margin-left: 10px;
  }
</style>
</head>
<body>
<canvas id="orrery"></canvas>
<div id="detail-panel">
  <div class="panel-type" id="panel-type"></div>
  <div class="panel-name" id="panel-name"></div>
  <div class="panel-ring" id="panel-ring"></div>
  <div class="panel-connections-title">Connections</div>
  <div id="panel-connections"></div>
</div>

<script>
(function () {
  'use strict';

  // ── Data ──────────────────────────────────────────────────────

  const nodes = [
    { id: 'person-jordan', label: 'Jordan Blue', type: 'person', size: 22 },
    { id: 'company-vercel', label: 'Vercel', type: 'company', size: 14 },
    { id: 'company-stripe', label: 'Stripe', type: 'company', size: 13 },
    { id: 'company-datadog', label: 'Datadog', type: 'company', size: 12 },
    { id: 'company-fly', label: 'Fly.io', type: 'company', size: 10 },
    { id: 'company-notion', label: 'Notion', type: 'company', size: 10 },
    { id: 'role-senior-fe', label: 'Senior Frontend Engineer', type: 'role', size: 11 },
    { id: 'role-staff-eng', label: 'Staff Engineer', type: 'role', size: 11 },
    { id: 'role-backend', label: 'Backend Engineer', type: 'role', size: 10 },
    { id: 'skill-typescript', label: 'TypeScript', type: 'skill', size: 9 },
    { id: 'skill-react', label: 'React', type: 'skill', size: 9 },
    { id: 'skill-nodejs', label: 'Node.js', type: 'skill', size: 8 },
    { id: 'skill-nextjs', label: 'Next.js', type: 'skill', size: 8 },
    { id: 'skill-graphql', label: 'GraphQL', type: 'skill', size: 7 },
    { id: 'skill-postgres', label: 'PostgreSQL', type: 'skill', size: 8 },
    { id: 'skill-redis', label: 'Redis', type: 'skill', size: 7 },
    { id: 'skill-docker', label: 'Docker', type: 'skill', size: 7 },
    { id: 'skill-aws', label: 'AWS', type: 'skill', size: 8 },
    { id: 'skill-tailwind', label: 'Tailwind CSS', type: 'skill', size: 7 },
    { id: 'skill-system-design', label: 'System Design', type: 'skill', size: 7 },
    { id: 'skill-api-design', label: 'API Design', type: 'skill', size: 7 },
    { id: 'skill-payments', label: 'Payments', type: 'skill', size: 6 },
    { id: 'skill-monitoring', label: 'Observability', type: 'skill', size: 6 },
    { id: 'skill-edge', label: 'Edge Computing', type: 'skill', size: 6 },
    { id: 'project-design-system', label: 'Design System', type: 'project', size: 10 },
    { id: 'project-api-gateway', label: 'API Gateway', type: 'project', size: 9 },
    { id: 'project-dashboard', label: 'Analytics Dashboard', type: 'project', size: 9 },
    { id: 'project-sdk', label: 'Developer SDK', type: 'project', size: 8 },
    { id: 'edu-stanford', label: 'Stanford University', type: 'education', size: 9 },
    { id: 'industry-saas', label: 'SaaS', type: 'industry', size: 10 },
    { id: 'industry-fintech', label: 'FinTech', type: 'industry', size: 9 },
    { id: 'industry-devtools', label: 'DevTools', type: 'industry', size: 10 },
    { id: 'industry-infra', label: 'Infrastructure', type: 'industry', size: 9 },
    { id: 'industry-cloud', label: 'Cloud', type: 'industry', size: 9 },
  ];

  const edges = [
    { source: 'person-jordan', target: 'company-vercel' },
    { source: 'person-jordan', target: 'company-stripe' },
    { source: 'person-jordan', target: 'company-datadog' },
    { source: 'person-jordan', target: 'company-fly' },
    { source: 'person-jordan', target: 'company-notion' },
    { source: 'person-jordan', target: 'role-senior-fe' },
    { source: 'person-jordan', target: 'role-staff-eng' },
    { source: 'person-jordan', target: 'role-backend' },
    { source: 'person-jordan', target: 'skill-typescript' },
    { source: 'person-jordan', target: 'skill-react' },
    { source: 'person-jordan', target: 'edu-stanford' },
    { source: 'person-jordan', target: 'project-design-system' },
    { source: 'person-jordan', target: 'project-api-gateway' },
    { source: 'company-vercel', target: 'role-senior-fe' },
    { source: 'company-stripe', target: 'role-staff-eng' },
    { source: 'company-datadog', target: 'role-backend' },
    { source: 'company-vercel', target: 'industry-devtools' },
    { source: 'company-vercel', target: 'industry-saas' },
    { source: 'company-stripe', target: 'industry-fintech' },
    { source: 'company-stripe', target: 'industry-saas' },
    { source: 'company-datadog', target: 'industry-infra' },
    { source: 'company-fly', target: 'industry-cloud' },
    { source: 'company-notion', target: 'industry-saas' },
    { source: 'role-senior-fe', target: 'skill-typescript' },
    { source: 'role-senior-fe', target: 'skill-react' },
    { source: 'role-senior-fe', target: 'skill-nextjs' },
    { source: 'role-senior-fe', target: 'skill-tailwind' },
    { source: 'role-staff-eng', target: 'skill-typescript' },
    { source: 'role-staff-eng', target: 'skill-nodejs' },
    { source: 'role-staff-eng', target: 'skill-system-design' },
    { source: 'role-staff-eng', target: 'skill-api-design' },
    { source: 'role-staff-eng', target: 'skill-payments' },
    { source: 'role-backend', target: 'skill-postgres' },
    { source: 'role-backend', target: 'skill-redis' },
    { source: 'role-backend', target: 'skill-docker' },
    { source: 'role-backend', target: 'skill-monitoring' },
    { source: 'company-vercel', target: 'project-design-system' },
    { source: 'company-stripe', target: 'project-api-gateway' },
    { source: 'company-datadog', target: 'project-dashboard' },
    { source: 'company-vercel', target: 'project-sdk' },
    { source: 'project-design-system', target: 'skill-react' },
    { source: 'project-design-system', target: 'skill-tailwind' },
    { source: 'project-api-gateway', target: 'skill-nodejs' },
    { source: 'project-api-gateway', target: 'skill-graphql' },
    { source: 'project-dashboard', target: 'skill-react' },
    { source: 'project-dashboard', target: 'skill-postgres' },
    { source: 'project-sdk', target: 'skill-typescript' },
    { source: 'edu-stanford', target: 'skill-system-design' },
    { source: 'skill-aws', target: 'skill-docker' },
    { source: 'company-notion', target: 'skill-react' },
    { source: 'company-fly', target: 'skill-docker' },
    { source: 'company-fly', target: 'skill-edge' },
  ];

  // ── Adjacency map ─────────────────────────────────────────────

  const adjacency = {};
  nodes.forEach(function (n) { adjacency[n.id] = new Set(); });
  edges.forEach(function (e) {
    adjacency[e.source].add(e.target);
    adjacency[e.target].add(e.source);
  });

  function getConnected(nodeId) {
    return adjacency[nodeId] || new Set();
  }

  // ── Node map ──────────────────────────────────────────────────

  const nodeMap = {};
  nodes.forEach(function (n) { nodeMap[n.id] = n; });

  // ── Canvas setup ──────────────────────────────────────────────

  var canvas = document.getElementById('orrery');
  var ctx = canvas.getContext('2d');
  var W, H, centerX, centerY, dpr;
  var scaleFactor = 1;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    centerX = W / 2;
    centerY = H / 2;

    // Scale rings to fit smaller viewports
    var minDim = Math.min(W, H);
    scaleFactor = Math.min(1, minDim / 1000);

    layoutNodes();
    generateStars();
  }

  // ── Ring configuration ────────────────────────────────────────

  var ringConfig = {
    company:   { radius: 130, order: 1, label: 'Companies', speed: 0.00025 },
    role:      { radius: 215, order: 2, label: 'Roles', speed: 0.00018 },
    project:   { radius: 300, order: 3, label: 'Projects', speed: 0.00013 },
    skill:     { radius: 390, order: 4, label: 'Skills', speed: 0.00008 },
    education: { radius: 465, order: 5, label: 'Context', speed: 0.00005 },
    industry:  { radius: 465, order: 5, label: 'Context', speed: 0.00005 },
  };

  var ringLabels = [
    { radius: 130, label: 'Companies' },
    { radius: 215, label: 'Roles' },
    { radius: 300, label: 'Projects' },
    { radius: 390, label: 'Skills' },
    { radius: 465, label: 'Context' },
  ];

  // ── Layout (deterministic, NO force simulation) ───────────────

  function layoutNodes() {
    var nodesByType = {};

    nodes.forEach(function (n) {
      if (n.type === 'person') {
        n.x = centerX;
        n.y = centerY;
        n.ringRadius = 0;
        n.baseAngle = 0;
        n.orbitSpeed = 0;
        return;
      }
      (nodesByType[n.type] = nodesByType[n.type] || []).push(n);
    });

    // Combine education and industry on the same outermost ring
    var outerRing = (nodesByType['education'] || []).concat(nodesByType['industry'] || []);

    Object.keys(nodesByType).forEach(function (type) {
      if (type === 'education' || type === 'industry') return;
      var typeNodes = nodesByType[type];
      var cfg = ringConfig[type];
      if (!cfg) return;
      var radius = cfg.radius * scaleFactor;
      // Offset each ring's starting angle for visual variety
      var startOffset = cfg.order * 0.618; // golden angle offset
      typeNodes.forEach(function (node, i) {
        var angle = startOffset + (i / typeNodes.length) * Math.PI * 2;
        node.baseAngle = angle;
        node.ringRadius = radius;
        node.orbitSpeed = cfg.speed;
        node.currentAngle = angle;
      });
    });

    // Outer ring: education + industry together
    if (outerRing.length > 0) {
      var radius = ringConfig.education.radius * scaleFactor;
      var speed = ringConfig.education.speed;
      var startOffset = 5 * 0.618;
      outerRing.forEach(function (node, i) {
        var angle = startOffset + (i / outerRing.length) * Math.PI * 2;
        node.baseAngle = angle;
        node.ringRadius = radius;
        node.orbitSpeed = speed;
        node.currentAngle = angle;
      });
    }
  }

  // ── Background stars ──────────────────────────────────────────

  var stars = [];

  function generateStars() {
    stars = [];
    for (var i = 0; i < 38; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.1 + 0.3,
        opacity: Math.random() * 0.2 + 0.04,
        twinkleSpeed: Math.random() * 0.0015 + 0.0008,
        twinkleOffset: Math.random() * Math.PI * 2,
      });
    }
  }

  // ── Colors ────────────────────────────────────────────────────

  var GOLD = '#c9a84c';
  var CREAM = '#ede6d6';
  var COPPER = '#b87333';
  var NAVY = '#0a0f1e';

  var typeNodeColor = {
    company: '#d6bc6a',
    role: '#c8ad58',
    project: '#bfa050',
    skill: '#ddd6c4',
    education: '#d8d0be',
    industry: '#cec6b5',
  };

  var ringTypeLabels = {
    company: 'Company',
    role: 'Role',
    project: 'Project',
    skill: 'Skill',
    education: 'Education',
    industry: 'Industry',
  };

  // ── Interaction state ─────────────────────────────────────────

  var hoveredNode = null;
  var mouseX = -9999, mouseY = -9999;
  var panelNode = null;
  var panel = document.getElementById('detail-panel');

  canvas.addEventListener('mousemove', function (e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  canvas.addEventListener('mouseleave', function () {
    mouseX = -9999;
    mouseY = -9999;
    hoveredNode = null;
    closePanel();
  });

  function openPanel(node) {
    if (panelNode === node) return;
    panelNode = node;

    document.getElementById('panel-type').textContent = ringTypeLabels[node.type] || node.type;
    document.getElementById('panel-name').textContent = node.label;

    var cfg = ringConfig[node.type];
    document.getElementById('panel-ring').textContent = cfg
      ? 'Ring ' + cfg.order + ' \u2014 ' + cfg.label
      : '';

    var connDiv = document.getElementById('panel-connections');
    connDiv.innerHTML = '';
    var connected = getConnected(node.id);
    connected.forEach(function (cid) {
      var cn = nodeMap[cid];
      if (!cn || cn.type === 'person') return;
      var div = document.createElement('div');
      div.className = 'panel-connection';
      div.innerHTML = cn.label + '<span class="conn-type">' + (ringTypeLabels[cn.type] || cn.type) + '</span>';
      connDiv.appendChild(div);
    });

    panel.classList.add('open');
  }

  function closePanel() {
    panelNode = null;
    panel.classList.remove('open');
  }

  // ── Utility ───────────────────────────────────────────────────

  function hexToRgba(hex, alpha) {
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  // ── Drawing: background ───────────────────────────────────────

  function drawBackground(time) {
    // Radial gradient background — lighter at center (sun glow)
    var bgGrad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(W, H) * 0.7);
    bgGrad.addColorStop(0, '#121d38');
    bgGrad.addColorStop(0.25, '#0e1530');
    bgGrad.addColorStop(1, NAVY);
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Stars with twinkle
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      var twinkle = Math.sin(time * s.twinkleSpeed + s.twinkleOffset) * 0.5 + 0.5;
      var op = s.opacity * (0.4 + twinkle * 0.6);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(237, 230, 214, ' + op + ')';
      ctx.fill();
    }

    // Radial crosshair lines — 8 at 45 degree intervals
    var maxR = 500 * scaleFactor;
    ctx.save();
    ctx.strokeStyle = 'rgba(201, 168, 76, 0.025)';
    ctx.lineWidth = 0.5;
    for (var i = 0; i < 8; i++) {
      var angle = (i / 8) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(centerX + Math.cos(angle) * 30 * scaleFactor, centerY + Math.sin(angle) * 30 * scaleFactor);
      ctx.lineTo(centerX + Math.cos(angle) * maxR, centerY + Math.sin(angle) * maxR);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ── Drawing: orbital ring paths ───────────────────────────────

  function drawOrbitalRings() {
    var radii = [130, 215, 300, 390, 465];

    for (var idx = 0; idx < radii.length; idx++) {
      var radius = radii[idx] * scaleFactor;

      // Dashed orbital path
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(201, 168, 76, 0.07)';
      ctx.lineWidth = 0.7;
      ctx.setLineDash([2, 8]);
      ctx.stroke();
      ctx.setLineDash([]);

      // Ring label — positioned at upper-right of ring
      var labelAngle = -Math.PI / 4;
      var lx = centerX + Math.cos(labelAngle) * (radius);
      var ly = centerY + Math.sin(labelAngle) * (radius);

      ctx.save();
      ctx.translate(lx, ly);
      ctx.rotate(labelAngle + Math.PI / 4);
      ctx.font = '400 9px "Instrument Sans", sans-serif';
      ctx.fillStyle = 'rgba(201, 168, 76, 0.14)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(ringLabels[idx].label.toUpperCase(), 0, -6);
      ctx.restore();
    }
  }

  // ── Drawing: the sun (person at center) ───────────────────────

  function drawSun(time) {
    var pulse = Math.sin(time * 0.0008) * 0.15 + 0.85;

    // Outermost atmospheric glow
    var g4 = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 100 * scaleFactor);
    g4.addColorStop(0, 'rgba(201, 168, 76, ' + (0.035 * pulse) + ')');
    g4.addColorStop(1, 'rgba(201, 168, 76, 0)');
    ctx.beginPath();
    ctx.arc(centerX, centerY, 100 * scaleFactor, 0, Math.PI * 2);
    ctx.fillStyle = g4;
    ctx.fill();

    // Mid glow
    var g3 = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 55 * scaleFactor);
    g3.addColorStop(0, 'rgba(201, 168, 76, ' + (0.08 * pulse) + ')');
    g3.addColorStop(1, 'rgba(201, 168, 76, 0)');
    ctx.beginPath();
    ctx.arc(centerX, centerY, 55 * scaleFactor, 0, Math.PI * 2);
    ctx.fillStyle = g3;
    ctx.fill();

    // Inner glow
    var g2 = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 30 * scaleFactor);
    g2.addColorStop(0, 'rgba(218, 190, 100, ' + (0.2 * pulse) + ')');
    g2.addColorStop(0.5, 'rgba(201, 168, 76, ' + (0.06 * pulse) + ')');
    g2.addColorStop(1, 'rgba(201, 168, 76, 0)');
    ctx.beginPath();
    ctx.arc(centerX, centerY, 30 * scaleFactor, 0, Math.PI * 2);
    ctx.fillStyle = g2;
    ctx.fill();

    // Core
    var coreR = 7 * scaleFactor;
    var g1 = ctx.createRadialGradient(centerX - coreR * 0.2, centerY - coreR * 0.2, 0, centerX, centerY, coreR);
    g1.addColorStop(0, '#ecdea0');
    g1.addColorStop(0.5, '#d4b65a');
    g1.addColorStop(1, 'rgba(201, 168, 76, 0.5)');
    ctx.beginPath();
    ctx.arc(centerX, centerY, coreR, 0, Math.PI * 2);
    ctx.fillStyle = g1;
    ctx.fill();

    // Name
    ctx.font = '300 15px "Cormorant Garamond", serif';
    ctx.fillStyle = 'rgba(237, 230, 214, 0.55)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('Jordan Blue', centerX, centerY + coreR + 10);
  }

  // ── Update positions (deterministic orbit) ────────────────────

  function updateNodePositions(time) {
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      if (n.type === 'person') {
        n.x = centerX;
        n.y = centerY;
        continue;
      }

      // If this node is hovered, freeze it at the angle it was at when hover began
      if (hoveredNode && n.id === hoveredNode.id) {
        n.x = centerX + Math.cos(n.frozenAngle) * n.ringRadius;
        n.y = centerY + Math.sin(n.frozenAngle) * n.ringRadius;
        continue;
      }

      var currentAngle = n.baseAngle + time * n.orbitSpeed;
      n.currentAngle = currentAngle;
      n.x = centerX + Math.cos(currentAngle) * n.ringRadius;
      n.y = centerY + Math.sin(currentAngle) * n.ringRadius;
    }
  }

  // ── Drawing: connection lines on hover ────────────────────────

  function drawConnectionLines(hNode) {
    if (!hNode) return;
    var connected = getConnected(hNode.id);

    // Line from hovered to sun (center)
    if (hNode.type !== 'person') {
      ctx.beginPath();
      ctx.moveTo(hNode.x, hNode.y);
      ctx.lineTo(centerX, centerY);

      var lineGrad = ctx.createLinearGradient(hNode.x, hNode.y, centerX, centerY);
      lineGrad.addColorStop(0, 'rgba(201, 168, 76, 0.35)');
      lineGrad.addColorStop(1, 'rgba(201, 168, 76, 0.08)');
      ctx.strokeStyle = lineGrad;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Lines to connected nodes
    connected.forEach(function (cid) {
      var cn = nodeMap[cid];
      if (!cn || cn.type === 'person') return;

      ctx.beginPath();
      ctx.moveTo(hNode.x, hNode.y);
      ctx.lineTo(cn.x, cn.y);

      var lg = ctx.createLinearGradient(hNode.x, hNode.y, cn.x, cn.y);
      lg.addColorStop(0, 'rgba(201, 168, 76, 0.22)');
      lg.addColorStop(1, 'rgba(201, 168, 76, 0.08)');
      ctx.strokeStyle = lg;
      ctx.lineWidth = 0.7;
      ctx.stroke();
    });
  }

  // ── Drawing: nodes ────────────────────────────────────────────

  function drawNodes() {
    var connected = hoveredNode ? getConnected(hoveredNode.id) : null;

    // Draw nodes (non-person)
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      if (n.type === 'person') continue;

      var isHovered = hoveredNode && n.id === hoveredNode.id;
      var isConnected = hoveredNode && connected && connected.has(n.id);
      var isDimmed = hoveredNode && !isHovered && !isConnected;

      // Dot size: scale from node.size
      var baseRadius = (n.size * 0.32 + 1.2) * scaleFactor;
      var dotRadius = baseRadius;
      if (isHovered) dotRadius = baseRadius * 1.5;
      else if (isConnected) dotRadius = baseRadius * 1.15;

      var opacity = isDimmed ? 0.06 : 1;

      // Glow
      if (!isDimmed) {
        var glowR = dotRadius * (isHovered ? 6 : (isConnected ? 4 : 2.5));
        var glowColor = isHovered ? COPPER : GOLD;
        var glowOp = isHovered ? 0.18 : (isConnected ? 0.1 : 0.04);
        var glow = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glowR);
        glow.addColorStop(0, hexToRgba(glowColor, glowOp * opacity));
        glow.addColorStop(1, hexToRgba(glowColor, 0));
        ctx.beginPath();
        ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();
      }

      // Dot
      var color = isHovered ? COPPER : (isConnected ? GOLD : (typeNodeColor[n.type] || CREAM));
      var dg = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, dotRadius);
      dg.addColorStop(0, hexToRgba(color, opacity * 0.95));
      dg.addColorStop(0.75, hexToRgba(color, opacity * 0.7));
      dg.addColorStop(1, hexToRgba(color, opacity * 0.2));
      ctx.beginPath();
      ctx.arc(n.x, n.y, dotRadius, 0, Math.PI * 2);
      ctx.fillStyle = dg;
      ctx.fill();
    }

    // Labels — two passes: ambient labels, then hover/connected labels on top
    if (!hoveredNode) {
      // Ambient: show all labels at low opacity
      for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        if (n.type === 'person') continue;
        var dr = (n.size * 0.32 + 1.2) * scaleFactor;
        var fs = n.type === 'company' ? 12 : 10;
        var lo = n.type === 'company' ? 0.35 : 0.18;
        ctx.font = '300 ' + fs + 'px "Cormorant Garamond", serif';
        ctx.fillStyle = 'rgba(237, 230, 214, ' + lo + ')';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(n.label, n.x, n.y - dr - 5);
      }
    } else {
      // Hover mode: show hovered + connected labels
      for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        if (n.type === 'person') continue;
        var isH = n.id === hoveredNode.id;
        var isC = connected && connected.has(n.id);
        if (!isH && !isC) continue;

        var dr = (n.size * 0.32 + 1.2) * scaleFactor;
        if (isH) dr *= 1.5;
        else if (isC) dr *= 1.15;

        var fs = isH ? 15 : 12;
        var lo = isH ? 0.95 : 0.65;
        ctx.font = (isH ? '400 ' : '300 ') + fs + 'px "Cormorant Garamond", serif';
        ctx.fillStyle = 'rgba(237, 230, 214, ' + lo + ')';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(n.label, n.x, n.y - dr - 5);
      }
    }
  }

  // ── Hit detection ─────────────────────────────────────────────

  function findHoveredNode() {
    var closest = null;
    var closestDist = Infinity;

    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      if (n.type === 'person') continue;
      var dx = mouseX - n.x;
      var dy = mouseY - n.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      var hitR = Math.max(18, (n.size * 0.32 + 1.2) * scaleFactor * 2.5);
      if (dist < hitR && dist < closestDist) {
        closest = n;
        closestDist = dist;
      }
    }

    if (closest !== hoveredNode) {
      if (closest) {
        // Freeze orbital angle at the moment of hover
        closest.frozenAngle = closest.currentAngle || closest.baseAngle;
        openPanel(closest);
        canvas.style.cursor = 'pointer';
      } else {
        closePanel();
        canvas.style.cursor = 'default';
      }
      hoveredNode = closest;
    }
  }

  // ── Title card (bottom-left) ──────────────────────────────────

  function drawTitle() {
    ctx.save();
    ctx.font = '300 20px "Cormorant Garamond", serif';
    ctx.fillStyle = 'rgba(201, 168, 76, 0.3)';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.fillText('Career Orrery', 28, H - 42);

    ctx.font = '400 10px "Instrument Sans", sans-serif';
    ctx.fillStyle = 'rgba(237, 230, 214, 0.16)';
    ctx.letterSpacing = '0.5px';
    ctx.fillText('5 rings  \u00b7  ' + (nodes.length - 1) + ' elements  \u00b7  ' + edges.length + ' connections', 28, H - 24);
    ctx.restore();
  }

  // ── Render loop ───────────────────────────────────────────────

  var startTime = null;

  function render(timestamp) {
    if (!startTime) startTime = timestamp;
    var time = timestamp - startTime;

    ctx.clearRect(0, 0, W, H);

    drawBackground(time);
    drawOrbitalRings();
    drawSun(time);
    updateNodePositions(time);
    findHoveredNode();
    drawConnectionLines(hoveredNode);
    drawNodes();
    drawTitle();

    requestAnimationFrame(render);
  }

  // ── Initialize ────────────────────────────────────────────────

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(render);

})();
</script>
</body>
</html>
