<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Strata — Geological Cross-Section</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,300;0,7..72,400;0,7..72,600;1,7..72,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1A1A2E; }
  canvas { display: block; position: fixed; top: 0; left: 0; }

  #tooltip {
    position: fixed;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
    z-index: 100;
    font-family: 'Literata', serif;
    font-size: 13px;

    background: rgba(20, 20, 38, 0.94);
    border: 1px solid rgba(196, 149, 106, 0.3);
    border-radius: 4px;
    padding: 10px 14px;
    max-width: 260px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  #tooltip.visible { opacity: 1; }
  #tooltip .tip-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(196, 149, 106, 0.7);
    margin-bottom: 4px;
  }
  #tooltip .tip-title {
    font-family: 'Literata', serif;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  #tooltip .tip-detail {
    font-size: 12px;
    color: rgba(237, 230, 214, 0.6);
    line-height: 1.4;
  }

  #legend {
    position: fixed;
    bottom: 24px;
    right: 24px;
    font-family: 'Literata', serif;
    color: #EDE6D6;
    background: rgba(20, 20, 38, 0.88);
    border: 1px solid rgba(196, 149, 106, 0.2);
    border-radius: 6px;
    padding: 18px 22px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 50;
    min-width: 200px;
  }
  #legend .legend-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(196, 149, 106, 0.6);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(196, 149, 106, 0.15);
  }
  #legend .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;

  }
  #legend .legend-swatch {
    width: 28px;

    border-radius: 2px;

    flex-shrink: 0;
  }

  #cross-section-icon {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 50;
  }

  #title-block {
    position: fixed;
    top: 20px;
    left: 76px;
    z-index: 50;
    font-family: 'Literata', serif;
    color: #EDE6D6;
  }
  #title-block h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: rgba(237, 230, 214, 0.9);
  }
  #title-block .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(196, 149, 106, 0.5);
    margin-top: 3px;
  }
</style>

<body>
<canvas id="canvas"></canvas>

<div id="tooltip">
  <div class="tip-label"></div>
  <div class="tip-title"></div>
  <div class="tip-detail"></div>
</div>

<svg id="cross-section-icon" width="48" height="48" viewBox="0 0 48 48">
  <rect x="4" y="4" width="40" height="40" rx="4" fill="none" stroke="rgba(196,149,106,0.3)" stroke-width="1"/>
  <path d="M10 14 Q18 12 24 15 Q30 18 38 13" stroke="rgba(196,149,106,0.5)" stroke-width="1.5" fill="none"/>
  <path d="M10 22 Q16 20 24 23 Q32 26 38 21" stroke="rgba(91,127,164,0.5)" stroke-width="1.5" fill="none"/>
  <path d="M10 30 Q20 28 24 31 Q28 34 38 29" stroke="rgba(106,158,143,0.5)" stroke-width="1.5" fill="none"/>
  <path d="M10 38 Q17 36 24 38 Q31 40 38 37" stroke="rgba(126,107,158,0.5)" stroke-width="1.5" fill="none"/>
</svg>

<div id="title-block">
  <h1>Career Stratigraphy</h1>
  <div class="subtitle">Geological Cross-Section &bull; 2016 &ndash; Present</div>
</div>

<div id="legend">
  <div class="legend-title">Stratigraphic Key</div>
  <div class="legend-item"><div class="legend-swatch" style="background: linear-gradient(90deg, #C4956A, #D4A57A);"></div>Companies</div>
  <div class="legend-item"><div class="legend-swatch" style="background: linear-gradient(90deg, #5B7FA4, #7B9FC4);"></div>Roles</div>
  <div class="legend-item"><div class="legend-swatch" style="background: linear-gradient(90deg, #6A9E8F, #8ABEAF);"></div>Skills</div>
  <div class="legend-item"><div class="legend-swatch" style="background: linear-gradient(90deg, #B87D60, #D89D80);"></div>Projects</div>
  <div class="legend-item"><div class="legend-swatch" style="background: linear-gradient(90deg, #7E6B9E, #9E8BBE);"></div>Education</div>
  <div class="legend-item" style="margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(196,149,106,0.1);"><div style="width:28px; height:0; border-top: 2px dashed rgba(237,200,160,0.5); flex-shrink:0;"></div><span style="font-size:11px;">Fault Lines</span></div>
</div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────
const CAREER = {
  companies: [
    { name: 'Stanford University', start: 2016, end: 2017, type: 'education' },
    { name: 'Datadog', start: 2017, end: 2019 },
    { name: 'Stripe', start: 2019, end: 2022 },
    { name: 'Notion', start: 2023, end: 2024, type: 'consulting' },
    { name: 'Vercel', start: 2022, end: 2024 },
    { name: 'Fly.io', start: 2024, end: 2026.25 },
  ],
  roles: [
    { title: 'BS Computer Science', company: 'Stanford University', start: 2016, end: 2017 },
    { title: 'Backend Engineer', company: 'Datadog', start: 2017, end: 2019 },
    { title: 'Staff Engineer', company: 'Stripe', start: 2019, end: 2022 },
    { title: 'React Consultant', company: 'Notion', start: 2023, end: 2024 },
    { title: 'Senior Frontend Engineer', company: 'Vercel', start: 2022, end: 2024 },
    { title: 'Platform Engineer', company: 'Fly.io', start: 2024, end: 2026.25 },
  ],
  skills: [
    { name: 'System Design', start: 2016, end: 2026.25, color: '#8ABEAF' },
    { name: 'Algorithms', start: 2016, end: 2019, color: '#7BCEAF' },
    { name: 'PostgreSQL', start: 2017, end: 2022, color: '#6A9E8F' },
    { name: 'Redis', start: 2017, end: 2022, color: '#5A8E7F' },
    { name: 'Docker', start: 2017, end: 2019.5, color: '#4A9E7F', resumeAt: 2024 },
    { name: 'Observability', start: 2017, end: 2022, color: '#7AAEA0' },
    { name: 'TypeScript', start: 2019, end: 2026.25, color: '#6ABEAF' },
    { name: 'Node.js', start: 2019, end: 2024, color: '#5AAE9F' },
    { name: 'GraphQL', start: 2019, end: 2022, color: '#8A9E8F' },
    { name: 'API Design', start: 2019, end: 2022, color: '#6A8E7F' },
    { name: 'Payments', start: 2019, end: 2022, color: '#7A9E6F' },
    { name: 'React', start: 2022, end: 2026.25, color: '#5ABEAF' },
    { name: 'Next.js', start: 2022, end: 2024, color: '#6AAE9F' },
    { name: 'Tailwind CSS', start: 2022, end: 2024, color: '#8ABE9F' },
    { name: 'Edge Computing', start: 2024, end: 2026.25, color: '#4ABE9F' },
    { name: 'Rust', start: 2024, end: 2026.25, color: '#7A8E8F' },
  ],
  projects: [
    { name: 'Analytics Dashboard', company: 'Datadog', start: 2017.5, end: 2019 },
    { name: 'API Gateway', company: 'Stripe', start: 2020, end: 2022 },
    { name: 'Design System', company: 'Vercel', start: 2022.5, end: 2023.5 },
    { name: 'Developer SDK', company: 'Vercel', start: 2023, end: 2024 },
  ],
  industries: ['SaaS', 'FinTech', 'DevTools', 'Infrastructure', 'Cloud'],
  faultLines: [2017, 2019, 2022, 2024], // company transitions
};

// ─── COLORS ───────────────────────────────────────────────────────────
const COLORS = {
  bg: '#1A1A2E',
  company: { base: '#C4956A', light: '#D4A57A', dark: '#A47A50' },
  role: { base: '#5B7FA4', light: '#7B9FC4', dark: '#3B5F84' },
  skill: { base: '#6A9E8F', light: '#8ABEAF', dark: '#4A7E6F' },
  project: { base: '#B87D60', light: '#D89D80', dark: '#986040' },
  education: { base: '#7E6B9E', light: '#9E8BBE', dark: '#5E4B7E' },
  text: '#EDE6D6',
  textDim: 'rgba(237, 230, 214, 0.5)',
  fault: 'rgba(237, 200, 160, 0.4)',
};

const COMPANY_COLORS = {
  'Stanford University': { base: '#7E6B9E', light: '#9E8BBE', dark: '#5E4B7E' },
  'Datadog': { base: '#C4956A', light: '#D4A57A', dark: '#A47A50' },
  'Stripe': { base: '#5B7FA4', light: '#7B9FC4', dark: '#3B5F84' },
  'Notion': { base: '#998A72', light: '#B9AA92', dark: '#796A52' },
  'Vercel': { base: '#B87D60', light: '#D89D80', dark: '#986040' },
  'Fly.io': { base: '#7E8B6E', light: '#9EAB8E', dark: '#5E6B4E' },
};

// ─── CANVAS SETUP ─────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
let dpr = window.devicePixelRatio || 1;

// Grain texture (generated once)
let grainCanvas, grainCtx;

function createGrainTexture() {
  grainCanvas = document.createElement('canvas');
  grainCanvas.width = 256;
  grainCanvas.height = 256;
  grainCtx = grainCanvas.getContext('2d');
  const imageData = grainCtx.createImageData(256, 256);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const v = Math.random() * 25;
    data[i] = v;
    data[i + 1] = v;
    data[i + 2] = v;
    data[i + 3] = 18;
  }
  grainCtx.putImageData(imageData, 0, 0);
}

// Layer-specific noise patterns (for rock texture)
let rockTextures = {};
function createRockTexture(key, baseR, baseG, baseB, intensity) {
  const c = document.createElement('canvas');
  c.width = 128;
  c.height = 128;
  const cx = c.getContext('2d');
  const imageData = cx.createImageData(128, 128);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const noise = (Math.random() - 0.5) * intensity;
    data[i] = Math.max(0, Math.min(255, baseR + noise));
    data[i + 1] = Math.max(0, Math.min(255, baseG + noise));
    data[i + 2] = Math.max(0, Math.min(255, baseB + noise));
    data[i + 3] = 30;
  }
  cx.putImageData(imageData, 0, 0);
  rockTextures[key] = c;
}

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ─── LAYOUT ───────────────────────────────────────────────────────────
const TIMELINE_START = 2015.5;
const TIMELINE_END = 2026.5;
const MARGIN = { top: 80, bottom: 80, left: 80, right: 260 };

// Layer definitions (top to bottom)
const LAYERS = [
  { id: 'industry',  label: 'Industries',  height: 0.06, color: COLORS.education },
  { id: 'education', label: 'Education',    height: 0.08, color: COLORS.education },
  { id: 'company',   label: 'Companies',    height: 0.22, color: COLORS.company },
  { id: 'role',      label: 'Roles',        height: 0.14, color: COLORS.role },
  { id: 'project',   label: 'Projects',     height: 0.12, color: COLORS.project },
  { id: 'skill',     label: 'Skills',       height: 0.20, color: COLORS.skill },
];

function timeToX(year) {
  const drawW = W - MARGIN.left - MARGIN.right;
  return MARGIN.left + ((year - TIMELINE_START) / (TIMELINE_END - TIMELINE_START)) * drawW;
}

function getLayerBounds() {
  const drawH = H - MARGIN.top - MARGIN.bottom;
  const bounds = [];
  let y = MARGIN.top;
  for (const layer of LAYERS) {
    const h = layer.height * drawH / LAYERS.reduce((s, l) => s + l.height, 0) * LAYERS.reduce((s, l) => s + l.height, 0);
    // Normalize
    const totalWeight = LAYERS.reduce((s, l) => s + l.height, 0);
    const layerH = (layer.height / totalWeight) * drawH;
    bounds.push({ ...layer, y, h: layerH });
    y += layerH;
  }
  return bounds;
}

// ─── WAVE GENERATION ──────────────────────────────────────────────────
// Each boundary between layers has a unique wavy line
const waveSeed = [];
for (let i = 0; i < 20; i++) {
  waveSeed.push({
    amp: 3 + Math.random() * 8,
    freq: 0.003 + Math.random() * 0.006,
    phase: Math.random() * Math.PI * 2,
  });
}

function waveOffset(x, boundaryIndex) {
  const s = waveSeed[boundaryIndex % waveSeed.length];
  const s2 = waveSeed[(boundaryIndex + 7) % waveSeed.length];
  return Math.sin(x * s.freq + s.phase) * s.amp
       + Math.sin(x * s2.freq * 1.7 + s2.phase * 0.5) * s2.amp * 0.4;
}

// ─── HITMAP ───────────────────────────────────────────────────────────
let hitZones = [];
let hoveredZone = null;

function addHitZone(x, y, w, h, data) {
  hitZones.push({ x, y, w, h, ...data });
}

// ─── ANIMATION STATE ──────────────────────────────────────────────────
let revealProgress = 0; // 0 to 1
let animStartTime = null;
const ANIM_DURATION = 2200; // ms

// ─── DRAWING ──────────────────────────────────────────────────────────
function drawFrame(timestamp) {
  if (!animStartTime) animStartTime = timestamp;
  const elapsed = timestamp - animStartTime;
  revealProgress = Math.min(1, elapsed / ANIM_DURATION);
  // Ease out cubic
  const t = 1 - Math.pow(1 - revealProgress, 3);
  const revealX = MARGIN.left + t * (W - MARGIN.left - MARGIN.right);

  ctx.clearRect(0, 0, W, H);
  hitZones = [];

  // Background
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);

  // Subtle radial gradient overlay
  const bgGrad = ctx.createRadialGradient(W * 0.4, H * 0.4, 0, W * 0.4, H * 0.4, W * 0.7);
  bgGrad.addColorStop(0, 'rgba(40, 35, 55, 0.3)');
  bgGrad.addColorStop(1, 'rgba(26, 26, 46, 0)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  const layers = getLayerBounds();
  const drawW = W - MARGIN.left - MARGIN.right;

  // Clip to reveal area
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, revealX, H);
  ctx.clip();

  // ─── Draw each stratum layer ─────────────────────────────
  layers.forEach((layer, li) => {
    drawStratum(layer, li, layers, revealX);
  });

  // ─── Fault lines ─────────────────────────────────────────
  CAREER.faultLines.forEach(year => {
    const fx = timeToX(year);
    if (fx > revealX) return;
    ctx.save();
    ctx.beginPath();
    const topLayer = layers[0];
    const bottomLayer = layers[layers.length - 1];
    const faultTop = topLayer.y - 5;
    const faultBottom = bottomLayer.y + bottomLayer.h + 5;

    // Jagged fault line
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = COLORS.fault;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    let fy = faultTop;
    ctx.moveTo(fx + waveOffset(fy, li + 10) * 0.3, fy);
    while (fy < faultBottom) {
      fy += 4;
      const jitter = (Math.random() - 0.5) * 3 + waveOffset(fy, li + 10) * 0.3;
      ctx.lineTo(fx + jitter, fy);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Small offset markers at top
    ctx.fillStyle = 'rgba(237, 200, 160, 0.35)';
    ctx.font = '300 9px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('▼', fx, faultTop - 2);
    ctx.restore();
  });

  ctx.restore(); // End reveal clip

  // ─── Timeline axis ───────────────────────────────────────
  drawTimeline(layers, revealX);

  // ─── Layer labels (right side) ───────────────────────────
  drawLayerLabels(layers);

  // ─── Grain overlay ───────────────────────────────────────
  if (grainCanvas) {
    ctx.save();
    ctx.globalAlpha = 0.35;
    const pat = ctx.createPattern(grainCanvas, 'repeat');
    ctx.fillStyle = pat;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // ─── Hover highlight ────────────────────────────────────
  if (hoveredZone) {
    drawHoverHighlight(layers, revealX);
  }

  // ─── Excavation edge glow ───────────────────────────────
  if (revealProgress < 1) {
    const edgeGrad = ctx.createLinearGradient(revealX - 40, 0, revealX + 10, 0);
    edgeGrad.addColorStop(0, 'rgba(196, 149, 106, 0)');
    edgeGrad.addColorStop(0.7, 'rgba(196, 149, 106, 0.15)');
    edgeGrad.addColorStop(1, 'rgba(196, 149, 106, 0.02)');
    ctx.fillStyle = edgeGrad;
    ctx.fillRect(revealX - 40, MARGIN.top - 20, 50, H - MARGIN.top - MARGIN.bottom + 40);
  }

  requestAnimationFrame(drawFrame);
}

function drawStratum(layer, li, allLayers, revealX) {
  const { id, y, h } = layer;

  // Wavy top and bottom boundaries
  const topWave = (x) => y + waveOffset(x, li);
  const botWave = (x) => y + h + waveOffset(x, li + 1);

  switch (id) {
    case 'industry': drawIndustryLayer(layer, li, topWave, botWave, revealX); break;
    case 'education': drawEducationLayer(layer, li, topWave, botWave, revealX); break;
    case 'company': drawCompanyLayer(layer, li, topWave, botWave, revealX); break;
    case 'role': drawRoleLayer(layer, li, topWave, botWave, revealX); break;
    case 'project': drawProjectLayer(layer, li, topWave, botWave, revealX); break;
    case 'skill': drawSkillLayer(layer, li, topWave, botWave, revealX); break;
  }
}

function fillWavyRect(topWave, botWave, x1, x2, fillStyle, extraClip) {
  ctx.save();
  ctx.beginPath();
  // Top boundary (left to right)
  for (let x = x1; x <= x2; x += 3) {
    if (x === x1) ctx.moveTo(x, topWave(x));
    else ctx.lineTo(x, topWave(x));
  }
  ctx.lineTo(x2, topWave(x2));
  // Bottom boundary (right to left)
  for (let x = x2; x >= x1; x -= 3) {
    ctx.lineTo(x, botWave(x));
  }
  ctx.lineTo(x1, botWave(x1));
  ctx.closePath();
  if (extraClip) {
    ctx.clip();
    extraClip();
  } else {
    ctx.fillStyle = fillStyle;
    ctx.fill();
  }
  ctx.restore();
}

// ─── INDUSTRY LAYER (thin band at top) ────────────────────────────────
function drawIndustryLayer(layer, li, topWave, botWave, revealX) {
  const grad = ctx.createLinearGradient(0, layer.y, 0, layer.y + layer.h);
  grad.addColorStop(0, 'rgba(126, 107, 158, 0.2)');
  grad.addColorStop(1, 'rgba(126, 107, 158, 0.35)');
  fillWavyRect(topWave, botWave, MARGIN.left, Math.min(revealX, W - MARGIN.right), grad);

  // Industry labels as small text
  const industries = [
    { name: 'SaaS', x: 2017 },
    { name: 'FinTech', x: 2020 },
    { name: 'DevTools', x: 2023 },
    { name: 'Infrastructure', x: 2025 },
  ];

  ctx.save();
  ctx.font = '300 9px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(158, 139, 190, 0.6)';
  industries.forEach(ind => {
    const ix = timeToX(ind.x);
    if (ix < revealX) {
      const iy = layer.y + layer.h * 0.55 + waveOffset(ix, li) * 0.5;
      ctx.fillText(ind.name, ix, iy);
    }
  });
  ctx.restore();
}

// ─── EDUCATION LAYER ──────────────────────────────────────────────────
function drawEducationLayer(layer, li, topWave, botWave, revealX) {
  const edu = CAREER.companies.find(c => c.type === 'education');
  const x1 = Math.max(MARGIN.left, timeToX(edu.start));
  const x2 = Math.min(revealX, timeToX(edu.end));

  // Full band background (thin)
  const bgGrad = ctx.createLinearGradient(0, layer.y, 0, layer.y + layer.h);
  bgGrad.addColorStop(0, 'rgba(126, 107, 158, 0.1)');
  bgGrad.addColorStop(1, 'rgba(126, 107, 158, 0.15)');
  fillWavyRect(topWave, botWave, MARGIN.left, Math.min(revealX, W - MARGIN.right), bgGrad);

  if (x1 < revealX) {
    // Education segment
    const eduGrad = ctx.createLinearGradient(0, layer.y, 0, layer.y + layer.h);
    eduGrad.addColorStop(0, 'rgba(126, 107, 158, 0.55)');
    eduGrad.addColorStop(0.5, 'rgba(142, 123, 174, 0.65)');
    eduGrad.addColorStop(1, 'rgba(110, 91, 142, 0.55)');

    fillWavyRect(topWave, botWave, x1, x2, null, () => {
      ctx.fillStyle = eduGrad;
      ctx.fillRect(x1, layer.y - 15, x2 - x1, layer.h + 30);

      // Rock texture
      applyRockTexture(ctx, x1, layer.y, x2 - x1, layer.h, 'education');
    });

    // Label
    const mx = (x1 + x2) / 2;
    const my = layer.y + layer.h * 0.5 + waveOffset(mx, li) * 0.5;
    ctx.save();
    ctx.font = '400 11px "Literata", serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(220, 210, 240, 0.85)';
    ctx.fillText('Stanford University — BS Computer Science', mx, my);
    ctx.restore();

    addHitZone(x1, layer.y, x2 - x1, layer.h, {
      type: 'education',
      label: 'Education',
      title: 'Stanford University',
      detail: 'BS Computer Science, 2016\nSkills: System Design, Algorithms',
      company: 'Stanford University',
    });
  }
}

// ─── COMPANY LAYER (thickest) ─────────────────────────────────────────
function drawCompanyLayer(layer, li, topWave, botWave, revealX) {
  // Background
  const bgGrad = ctx.createLinearGradient(0, layer.y, 0, layer.y + layer.h);
  bgGrad.addColorStop(0, 'rgba(160, 130, 90, 0.08)');
  bgGrad.addColorStop(1, 'rgba(160, 130, 90, 0.12)');
  fillWavyRect(topWave, botWave, MARGIN.left, Math.min(revealX, W - MARGIN.right), bgGrad);

  // Company segments (exclude education)
  const companies = CAREER.companies.filter(c => c.type !== 'education');

  companies.forEach(comp => {
    const x1 = Math.max(MARGIN.left, timeToX(comp.start));
    const x2 = Math.min(revealX, timeToX(comp.end), W - MARGIN.right);
    if (x1 >= x2) return;

    const cc = COMPANY_COLORS[comp.name] || COLORS.company;
    const isHovered = hoveredZone && (hoveredZone.company === comp.name || hoveredZone.title === comp.name);
    const alpha = hoveredZone ? (isHovered ? 0.85 : 0.3) : 0.65;

    fillWavyRect(topWave, botWave, x1, x2, null, () => {
      // Gradient fill
      const segGrad = ctx.createLinearGradient(0, layer.y, 0, layer.y + layer.h);
      segGrad.addColorStop(0, hexToRgba(cc.light, alpha * 0.8));
      segGrad.addColorStop(0.3, hexToRgba(cc.base, alpha));
      segGrad.addColorStop(0.7, hexToRgba(cc.base, alpha * 0.9));
      segGrad.addColorStop(1, hexToRgba(cc.dark, alpha * 0.8));
      ctx.fillStyle = segGrad;
      ctx.fillRect(x1, layer.y - 15, x2 - x1, layer.h + 30);

      // Horizontal sedimentary lines
      ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.08})`;
      ctx.lineWidth = 0.5;
      for (let sy = layer.y + 8; sy < layer.y + layer.h; sy += 6 + Math.random() * 4) {
        ctx.beginPath();
        for (let sx = x1; sx <= x2; sx += 4) {
          const soff = Math.sin(sx * 0.01 + sy * 0.3) * 1.5;
          if (sx === x1) ctx.moveTo(sx, sy + soff);
          else ctx.lineTo(sx, sy + soff);
        }
        ctx.stroke();
      }

      // Rock texture overlay
      applyRockTexture(ctx, x1, layer.y, x2 - x1, layer.h, comp.name);
    });

    // Company name (centered, serif)
    const mx = (x1 + x2) / 2;
    const my = layer.y + layer.h * 0.45 + waveOffset(mx, li) * 0.3;
    ctx.save();
    ctx.font = '600 16px "Literata", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const textAlpha = hoveredZone ? (isHovered ? 1 : 0.25) : 0.9;
    ctx.fillStyle = `rgba(237, 230, 214, ${textAlpha})`;

    // Only draw if segment is wide enough
    const textWidth = ctx.measureText(comp.name).width;
    if (x2 - x1 > textWidth + 20) {
      ctx.fillText(comp.name, mx, my);
    } else if (x2 - x1 > 40) {
      ctx.font = '600 11px "Literata", serif';
      ctx.fillText(comp.name, mx, my);
    }

    // Duration subtitle
    const durText = comp.end >= 2026 ? `${comp.start} – present` :
      comp.type === 'consulting' ? `${comp.start} (consulting)` :
      `${comp.start} – ${comp.end}`;
    ctx.font = '300 10px "JetBrains Mono", monospace';
    ctx.fillStyle = `rgba(237, 230, 214, ${textAlpha * 0.5})`;
    if (x2 - x1 > 60) {
      ctx.fillText(durText, mx, my + 18);
    }
    ctx.restore();

    addHitZone(x1, layer.y, x2 - x1, layer.h, {
      type: 'company',
      label: 'Company',
      title: comp.name,
      detail: durText + (comp.type === 'consulting' ? '\nReact consulting engagement' : ''),
      company: comp.name,
    });
  });
}

// ─── ROLE LAYER (fossils) ─────────────────────────────────────────────
function drawRoleLayer(layer, li, topWave, botWave, revealX) {
  // Background
  const bgGrad = ctx.createLinearGradient(0, layer.y, 0, layer.y + layer.h);
  bgGrad.addColorStop(0, 'rgba(91, 127, 164, 0.12)');
  bgGrad.addColorStop(1, 'rgba(91, 127, 164, 0.18)');
  fillWavyRect(topWave, botWave, MARGIN.left, Math.min(revealX, W - MARGIN.right), bgGrad);

  // Sedimentary lines
  ctx.save();
  ctx.beginPath();
  for (let x = MARGIN.left; x <= Math.min(revealX, W - MARGIN.right); x += 3) {
    if (x === MARGIN.left) ctx.moveTo(x, topWave(x));
    else ctx.lineTo(x, topWave(x));
  }
  for (let x = Math.min(revealX, W - MARGIN.right); x >= MARGIN.left; x -= 3) {
    ctx.lineTo(x, botWave(x));
  }
  ctx.closePath();
  ctx.clip();

  // Thin horizontal lines
  ctx.strokeStyle = 'rgba(91, 127, 164, 0.08)';
  ctx.lineWidth = 0.5;
  for (let sy = layer.y; sy < layer.y + layer.h; sy += 5) {
    ctx.beginPath();
    ctx.moveTo(MARGIN.left, sy + Math.sin(sy * 0.1) * 2);
    ctx.lineTo(W - MARGIN.right, sy + Math.sin(sy * 0.1 + 1) * 2);
    ctx.stroke();
  }
  ctx.restore();

  // Roles as "fossils" — bordered shapes embedded in the rock
  CAREER.roles.forEach(role => {
    if (role.title === 'BS Computer Science') return; // shown in education layer
    const x1 = Math.max(MARGIN.left + 5, timeToX(role.start));
    const x2 = Math.min(revealX, timeToX(role.end), W - MARGIN.right - 5);
    if (x1 >= x2 || x2 - x1 < 30) return;

    const mx = (x1 + x2) / 2;
    const my = layer.y + layer.h * 0.5 + waveOffset(mx, li) * 0.5;

    const isHovered = hoveredZone && (hoveredZone.company === role.company || hoveredZone.title === role.title);
    const alpha = hoveredZone ? (isHovered ? 1 : 0.25) : 0.8;

    // Fossil shape (rounded rect)
    const fw = Math.min(x2 - x1 - 10, ctx.measureText(role.title).width + 30, 220);
    const fh = 26;
    const fx = mx - fw / 2;
    const fy = my - fh / 2;

    ctx.save();
    ctx.beginPath();
    roundedRect(ctx, fx, fy, fw, fh, 4);
    ctx.fillStyle = `rgba(91, 127, 164, ${alpha * 0.25})`;
    ctx.fill();
    ctx.strokeStyle = `rgba(123, 159, 196, ${alpha * 0.45})`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Role title
    ctx.font = '400 11px "Literata", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = `rgba(200, 220, 240, ${alpha})`;
    ctx.fillText(role.title, mx, my);
    ctx.restore();

    addHitZone(fx, fy, fw, fh, {
      type: 'role',
      label: 'Role',
      title: role.title,
      detail: `${role.company}\n${role.start} – ${role.end >= 2026 ? 'present' : role.end}`,
      company: role.company,
    });
  });
}

// ─── PROJECT LAYER ────────────────────────────────────────────────────
function drawProjectLayer(layer, li, topWave, botWave, revealX) {
  // Background
  const bgGrad = ctx.createLinearGradient(0, layer.y, 0, layer.y + layer.h);
  bgGrad.addColorStop(0, 'rgba(184, 125, 96, 0.1)');
  bgGrad.addColorStop(1, 'rgba(184, 125, 96, 0.16)');
  fillWavyRect(topWave, botWave, MARGIN.left, Math.min(revealX, W - MARGIN.right), bgGrad);

  // Sedimentary lines
  ctx.save();
  ctx.beginPath();
  for (let x = MARGIN.left; x <= Math.min(revealX, W - MARGIN.right); x += 3) {
    if (x === MARGIN.left) ctx.moveTo(x, topWave(x));
    else ctx.lineTo(x, topWave(x));
  }
  for (let x = Math.min(revealX, W - MARGIN.right); x >= MARGIN.left; x -= 3) {
    ctx.lineTo(x, botWave(x));
  }
  ctx.closePath();
  ctx.clip();
  ctx.strokeStyle = 'rgba(184, 125, 96, 0.07)';
  ctx.lineWidth = 0.5;
  for (let sy = layer.y; sy < layer.y + layer.h; sy += 7) {
    ctx.beginPath();
    ctx.moveTo(MARGIN.left, sy + Math.sin(sy * 0.08) * 2);
    ctx.lineTo(W - MARGIN.right, sy + Math.sin(sy * 0.08 + 2) * 2);
    ctx.stroke();
  }
  ctx.restore();

  // Projects as embedded mineral deposits
  CAREER.projects.forEach((proj, pi) => {
    const x1 = Math.max(MARGIN.left, timeToX(proj.start));
    const x2 = Math.min(revealX, timeToX(proj.end), W - MARGIN.right);
    if (x1 >= x2) return;

    const mx = (x1 + x2) / 2;
    const yOffset = (pi % 2 === 0) ? 0.35 : 0.65;
    const my = layer.y + layer.h * yOffset + waveOffset(mx, li) * 0.4;

    const isHovered = hoveredZone && (hoveredZone.company === proj.company || hoveredZone.title === proj.name);
    const alpha = hoveredZone ? (isHovered ? 1 : 0.2) : 0.75;

    // Crystal/deposit shape
    ctx.save();
    ctx.beginPath();
    const pw = Math.min(x2 - x1, 160);
    const ph = 20;
    // Slightly irregular hexagon shape
    ctx.moveTo(mx - pw / 2 + 6, my);
    ctx.lineTo(mx - pw / 2, my + ph * 0.4);
    ctx.lineTo(mx - pw / 2 + 8, my + ph * 0.8);
    ctx.lineTo(mx + pw / 2 - 8, my + ph * 0.8);
    ctx.lineTo(mx + pw / 2, my + ph * 0.4);
    ctx.lineTo(mx + pw / 2 - 6, my);
    ctx.closePath();

    const projGrad = ctx.createLinearGradient(mx - pw / 2, my, mx + pw / 2, my + ph);
    projGrad.addColorStop(0, `rgba(216, 157, 128, ${alpha * 0.4})`);
    projGrad.addColorStop(0.5, `rgba(184, 125, 96, ${alpha * 0.55})`);
    projGrad.addColorStop(1, `rgba(152, 96, 64, ${alpha * 0.4})`);
    ctx.fillStyle = projGrad;
    ctx.fill();
    ctx.strokeStyle = `rgba(216, 157, 128, ${alpha * 0.5})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Project name
    ctx.font = '300 10px "Literata", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = `rgba(237, 220, 200, ${alpha})`;
    if (pw > 50) {
      ctx.fillText(proj.name, mx, my + ph * 0.4);
    }
    ctx.restore();

    addHitZone(mx - pw / 2, my, pw, ph, {
      type: 'project',
      label: 'Project',
      title: proj.name,
      detail: `${proj.company}\n${proj.start} – ${proj.end}`,
      company: proj.company,
    });
  });
}

// ─── SKILL LAYER (veins / mineral streaks) ────────────────────────────
function drawSkillLayer(layer, li, topWave, botWave, revealX) {
  // Background
  const bgGrad = ctx.createLinearGradient(0, layer.y, 0, layer.y + layer.h);
  bgGrad.addColorStop(0, 'rgba(106, 158, 143, 0.08)');
  bgGrad.addColorStop(1, 'rgba(106, 158, 143, 0.15)');
  fillWavyRect(topWave, botWave, MARGIN.left, Math.min(revealX, W - MARGIN.right), bgGrad);

  // Clip to layer shape
  ctx.save();
  ctx.beginPath();
  for (let x = MARGIN.left; x <= Math.min(revealX, W - MARGIN.right); x += 3) {
    if (x === MARGIN.left) ctx.moveTo(x, topWave(x));
    else ctx.lineTo(x, topWave(x));
  }
  for (let x = Math.min(revealX, W - MARGIN.right); x >= MARGIN.left; x -= 3) {
    ctx.lineTo(x, botWave(x));
  }
  ctx.closePath();
  ctx.clip();

  // Sedimentary background lines
  ctx.strokeStyle = 'rgba(106, 158, 143, 0.05)';
  ctx.lineWidth = 0.5;
  for (let sy = layer.y; sy < layer.y + layer.h; sy += 4) {
    ctx.beginPath();
    ctx.moveTo(MARGIN.left, sy + Math.sin(sy * 0.12) * 1.5);
    ctx.lineTo(W - MARGIN.right, sy + Math.sin(sy * 0.12 + 3) * 1.5);
    ctx.stroke();
  }

  // Draw each skill as a vein/streak
  const skillCount = CAREER.skills.length;
  CAREER.skills.forEach((skill, si) => {
    const x1 = Math.max(MARGIN.left, timeToX(skill.start));
    const x2End = skill.resumeAt ? timeToX(skill.resumeAt - 0.3) : timeToX(skill.end);
    const x2 = Math.min(revealX, x2End, W - MARGIN.right);
    if (x1 >= x2) return;

    // Find which company this skill is associated with (for hover)
    const skillCompanies = CAREER.companies.filter(c =>
      c.start < skill.end && c.end > skill.start
    ).map(c => c.name);

    const isHovered = hoveredZone && (
      hoveredZone.title === skill.name ||
      skillCompanies.includes(hoveredZone.company) ||
      (hoveredZone.type === 'skill' && hoveredZone.title === skill.name)
    );
    const alpha = hoveredZone ? (isHovered ? 0.9 : 0.12) : 0.55;

    // Y position: distribute skills vertically within layer
    const yPos = layer.y + 8 + ((si / skillCount) * (layer.h - 16));
    const veinHeight = Math.max(3, (layer.h - 16) / skillCount * 0.7);

    // Vein path (wavy)
    ctx.beginPath();
    for (let x = x1; x <= x2; x += 2) {
      const wOff = Math.sin(x * 0.015 + si * 2) * 2.5 + Math.sin(x * 0.007 + si) * 1.5;
      const vy = yPos + wOff;
      if (x === x1) ctx.moveTo(x, vy);
      else ctx.lineTo(x, vy);
    }
    // Return path (slightly offset for thickness)
    for (let x = x2; x >= x1; x -= 2) {
      const wOff = Math.sin(x * 0.015 + si * 2) * 2.5 + Math.sin(x * 0.007 + si) * 1.5;
      ctx.lineTo(x, yPos + wOff + veinHeight);
    }
    ctx.closePath();

    const veinColor = skill.color || COLORS.skill.base;
    const veinGrad = ctx.createLinearGradient(x1, yPos, x2, yPos);
    veinGrad.addColorStop(0, hexToRgba(veinColor, alpha * 0.3));
    veinGrad.addColorStop(0.1, hexToRgba(veinColor, alpha));
    veinGrad.addColorStop(0.9, hexToRgba(veinColor, alpha));
    veinGrad.addColorStop(1, hexToRgba(veinColor, alpha * 0.3));
    ctx.fillStyle = veinGrad;
    ctx.fill();

    // Skill label at the start of the vein
    if (x2 - x1 > 30) {
      const labelX = x1 + 8;
      const labelY = yPos + veinHeight / 2 + Math.sin(labelX * 0.015 + si * 2) * 2.5;
      ctx.font = `300 ${Math.max(8, Math.min(10, veinHeight + 4))}px "JetBrains Mono", monospace`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = `rgba(237, 230, 214, ${alpha * 1.2})`;
      ctx.fillText(skill.name, labelX, labelY);
    }

    // Second segment if skill resumes (e.g., Docker)
    if (skill.resumeAt) {
      const rx1 = Math.max(MARGIN.left, timeToX(skill.resumeAt));
      const rx2 = Math.min(revealX, timeToX(skill.end), W - MARGIN.right);
      if (rx1 < rx2) {
        ctx.beginPath();
        for (let x = rx1; x <= rx2; x += 2) {
          const wOff = Math.sin(x * 0.015 + si * 2) * 2.5 + Math.sin(x * 0.007 + si) * 1.5;
          if (x === rx1) ctx.moveTo(x, yPos + wOff);
          else ctx.lineTo(x, yPos + wOff);
        }
        for (let x = rx2; x >= rx1; x -= 2) {
          const wOff = Math.sin(x * 0.015 + si * 2) * 2.5 + Math.sin(x * 0.007 + si) * 1.5;
          ctx.lineTo(x, yPos + wOff + veinHeight);
        }
        ctx.closePath();
        ctx.fillStyle = veinGrad;
        ctx.fill();
      }
    }

    // Hit zone for skill
    addHitZone(x1, yPos - 2, x2 - x1, veinHeight + 4, {
      type: 'skill',
      label: 'Skill',
      title: skill.name,
      detail: `${skill.start} – ${skill.end >= 2026 ? 'present' : skill.end}${skill.resumeAt ? ' (resumed ' + skill.resumeAt + ')' : ''}`,
      company: null, // Skills span companies
      skillCompanies: skillCompanies,
    });
  });

  ctx.restore(); // End clip
}

// ─── TIMELINE AXIS ────────────────────────────────────────────────────
function drawTimeline(layers, revealX) {
  const bottomLayer = layers[layers.length - 1];
  const axisY = bottomLayer.y + bottomLayer.h + 30;

  // Axis line
  ctx.strokeStyle = 'rgba(196, 149, 106, 0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(MARGIN.left, axisY);
  ctx.lineTo(Math.min(revealX, W - MARGIN.right), axisY);
  ctx.stroke();

  // Year ticks
  for (let year = 2016; year <= 2026; year++) {
    const tx = timeToX(year);
    if (tx > revealX) continue;

    ctx.strokeStyle = 'rgba(196, 149, 106, 0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(tx, axisY - 4);
    ctx.lineTo(tx, axisY + 4);
    ctx.stroke();

    // Vertical guide lines (subtle)
    ctx.strokeStyle = 'rgba(196, 149, 106, 0.04)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(tx, layers[0].y);
    ctx.lineTo(tx, bottomLayer.y + bottomLayer.h);
    ctx.stroke();

    // Year label
    ctx.font = '400 11px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(196, 149, 106, 0.6)';
    ctx.fillText(year.toString(), tx, axisY + 18);
  }

  // "Ma" style geological label
  ctx.font = '300 italic 10px "Literata", serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(196, 149, 106, 0.35)';
  ctx.fillText('Career Years (CY)', MARGIN.left, axisY + 34);

  // Arrow at right end
  const arrowX = Math.min(revealX, W - MARGIN.right);
  ctx.beginPath();
  ctx.moveTo(arrowX, axisY);
  ctx.lineTo(arrowX - 6, axisY - 3);
  ctx.lineTo(arrowX - 6, axisY + 3);
  ctx.closePath();
  ctx.fillStyle = 'rgba(196, 149, 106, 0.3)';
  ctx.fill();
}

// ─── LAYER LABELS (right side) ────────────────────────────────────────
function drawLayerLabels(layers) {
  const labelX = W - MARGIN.right + 20;

  layers.forEach(layer => {
    const ly = layer.y + layer.h / 2;

    // Small line connecting to layer
    ctx.strokeStyle = 'rgba(196, 149, 106, 0.15)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(W - MARGIN.right + 2, ly);
    ctx.lineTo(labelX - 4, ly);
    ctx.stroke();

    // Dot
    ctx.beginPath();
    ctx.arc(labelX - 4, ly, 2, 0, Math.PI * 2);
    ctx.fillStyle = hexToRgba(layer.color.base, 0.5);
    ctx.fill();

    // Label
    ctx.font = '300 10px "JetBrains Mono", monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(237, 230, 214, 0.4)';
    ctx.fillText(layer.label, labelX + 2, ly);
  });
}

function drawHoverHighlight(layers, revealX) {
  // Cross-layer highlighting is handled by adjusting alpha in each layer's draw function
  // Here we just add a subtle glow around the hovered zone
  if (!hoveredZone) return;
  // Glow is implicit via alpha changes
}

// ─── ROCK TEXTURE ─────────────────────────────────────────────────────
function applyRockTexture(ctx, x, y, w, h, key) {
  if (!rockTextures[key]) {
    const color = COMPANY_COLORS[key] || COLORS.company;
    const base = color.base || color;
    const rgb = hexToRgbArr(base);
    createRockTexture(key, rgb[0], rgb[1], rgb[2], 40);
  }
  const tex = rockTextures[key];
  if (tex) {
    ctx.save();
    ctx.globalAlpha = 0.4;
    const pat = ctx.createPattern(tex, 'repeat');
    ctx.fillStyle = pat;
    ctx.fillRect(x, y - 15, w, h + 30);
    ctx.restore();
  }
}

// ─── UTILITIES ────────────────────────────────────────────────────────
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function hexToRgbArr(hex) {
  return [
    parseInt(hex.slice(1, 3), 16),
    parseInt(hex.slice(3, 5), 16),
    parseInt(hex.slice(5, 7), 16),
  ];
}

function roundedRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
}

// ─── MOUSE INTERACTION ────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
const tipLabel = tooltip.querySelector('.tip-label');
const tipTitle = tooltip.querySelector('.tip-title');
const tipDetail = tooltip.querySelector('.tip-detail');

canvas.addEventListener('mousemove', (e) => {
  const mx = e.clientX;
  const my = e.clientY;

  let found = null;
  // Check hit zones in reverse (topmost first)
  for (let i = hitZones.length - 1; i >= 0; i--) {
    const z = hitZones[i];
    if (mx >= z.x && mx <= z.x + z.w && my >= z.y && my <= z.y + z.h) {
      found = z;
      break;
    }
  }

  if (found) {
    hoveredZone = found;
    canvas.style.cursor = 'pointer';
    tipLabel.textContent = found.label;
    tipTitle.textContent = found.title;
    tipDetail.textContent = found.detail;
    tooltip.classList.add('visible');

    // Position tooltip
    let tx = mx + 16;
    let ty = my - 10;
    if (tx + 270 > W) tx = mx - 270;
    if (ty + 80 > H) ty = my - 80;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  } else {
    hoveredZone = null;
    canvas.style.cursor = 'default';
    tooltip.classList.remove('visible');
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredZone = null;
  tooltip.classList.remove('visible');
  canvas.style.cursor = 'default';
});

// ─── INIT ─────────────────────────────────────────────────────────────
function init() {
  createGrainTexture();
  // Pre-create rock textures
  createRockTexture('education', 126, 107, 158, 35);
  Object.keys(COMPANY_COLORS).forEach(name => {
    const rgb = hexToRgbArr(COMPANY_COLORS[name].base);
    createRockTexture(name, rgb[0], rgb[1], rgb[2], 40);
  });

  resize();
  window.addEventListener('resize', resize);
  requestAnimationFrame(drawFrame);
}

init();
</script>
