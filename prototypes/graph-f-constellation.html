<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Constellation Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #06080F; }
  canvas { display: block; position: fixed; top: 0; left: 0; }

  #tooltip {
    position: fixed;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 20;
    background: linear-gradient(135deg, rgba(6, 8, 15, 0.95), rgba(12, 16, 28, 0.95));
    border: 1px solid rgba(201, 168, 76, 0.25);
    border-radius: 2px;
    padding: 20px 24px;
    min-width: 220px;
    max-width: 300px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  #tooltip.visible { opacity: 1; }
  #tooltip .tt-company {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 22px;
    color: #EDE6D6;
    margin-bottom: 4px;
    line-height: 1.2;
  }
  #tooltip .tt-role {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 300;
    color: rgba(201, 168, 76, 0.8);
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  #tooltip .tt-years {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    color: rgba(237, 230, 214, 0.4);
    margin-bottom: 14px;
    letter-spacing: 1px;
  }
  #tooltip .tt-skills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  #tooltip .tt-skill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    color: rgba(237, 230, 214, 0.6);
    background: rgba(201, 168, 76, 0.08);
    border: 1px solid rgba(201, 168, 76, 0.15);
    padding: 3px 8px;
    border-radius: 1px;
  }
  #tooltip .tt-projects {
    margin-top: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    color: rgba(212, 160, 41, 0.6);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tooltip">
  <div class="tt-company"></div>
  <div class="tt-role"></div>
  <div class="tt-years"></div>
  <div class="tt-skills"></div>
  <div class="tt-projects"></div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const careerData = [
  {
    company: 'Stanford University',
    role: 'BS Computer Science',
    years: '2016',
    yearStart: 2016,
    yearEnd: 2016.8,
    tint: [140, 160, 220],
    skills: [
      { name: 'System Design', magnitude: 2 },
      { name: 'Algorithms', magnitude: 2 },
    ],
    projects: [],
    side: -1, // above ecliptic
  },
  {
    company: 'Datadog',
    role: 'Backend Engineer',
    years: '2017 – 2019',
    yearStart: 2017,
    yearEnd: 2019,
    tint: [130, 80, 200],
    skills: [
      { name: 'PostgreSQL', magnitude: 2 },
      { name: 'Redis', magnitude: 3 },
      { name: 'Docker', magnitude: 2 },
      { name: 'Observability', magnitude: 1 },
    ],
    projects: ['Analytics Dashboard'],
    side: 1, // below ecliptic
  },
  {
    company: 'Stripe',
    role: 'Staff Engineer',
    years: '2019 – 2022',
    yearStart: 2019,
    yearEnd: 2022,
    tint: [100, 120, 255],
    skills: [
      { name: 'TypeScript', magnitude: 1 },
      { name: 'Node.js', magnitude: 1 },
      { name: 'GraphQL', magnitude: 2 },
      { name: 'System Design', magnitude: 1 },
      { name: 'API Design', magnitude: 1 },
      { name: 'Payments', magnitude: 2 },
    ],
    projects: ['API Gateway'],
    side: -1,
  },
  {
    company: 'Vercel',
    role: 'Senior Frontend Engineer',
    years: '2022 – 2024',
    yearStart: 2022,
    yearEnd: 2024,
    tint: [220, 200, 120],
    skills: [
      { name: 'TypeScript', magnitude: 1 },
      { name: 'React', magnitude: 1 },
      { name: 'Next.js', magnitude: 1 },
      { name: 'Tailwind CSS', magnitude: 2 },
    ],
    projects: ['Design System', 'Developer SDK'],
    side: 1,
  },
  {
    company: 'Fly.io',
    role: 'Platform Engineer',
    years: '2024 – present',
    yearStart: 2024,
    yearEnd: 2026.3,
    tint: [160, 120, 255],
    skills: [
      { name: 'Docker', magnitude: 2 },
      { name: 'Edge Computing', magnitude: 1 },
      { name: 'Rust', magnitude: 1 },
    ],
    projects: [],
    side: -1,
  },
  {
    company: 'Notion',
    role: 'React Consulting',
    years: '2023',
    yearStart: 2023,
    yearEnd: 2023.5,
    tint: [200, 180, 160],
    skills: [
      { name: 'React', magnitude: 2 },
    ],
    projects: [],
    side: 1,
    minor: true, // smaller constellation
    extraVertical: 0.08, // push further from ecliptic to avoid Vercel overlap
  },
];

const industries = ['SaaS', 'FinTech', 'DevTools', 'Infrastructure', 'Cloud'];
const personName = 'Alexandra Chen';
const personTitle = 'Platform Engineer & System Architect';

// ─── CANVAS SETUP ───────────────────────────────────────────────────────────

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
let W, H, dpr;
let eclipticY;
let time = 0;
let animProgress = 0; // 0..1 entrance animation
let hoveredConstellation = null;
let mouseX = 0, mouseY = 0;

// Layout computed data
let constellations = []; // { ...data, cx, cy, stars: [{x,y,name,mag,radius,shared}], lines: [[i,j]] }
let backgroundStars = [];
let sharedStarLinks = []; // links between same-skill stars across constellations

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  eclipticY = H * 0.5;
  layoutConstellations();
  generateBackgroundStars();
}

// ─── LAYOUT ─────────────────────────────────────────────────────────────────

const yearMin = 2015.5;
const yearMax = 2026.8;

function yearToX(year) {
  const margin = W * 0.12;
  return margin + (year - yearMin) / (yearMax - yearMin) * (W - margin * 2);
}

function generateBackgroundStars() {
  backgroundStars = [];
  for (let i = 0; i < 120; i++) {
    backgroundStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.3,
      twinkleSpeed: Math.random() * 0.8 + 0.3,
      twinkleOffset: Math.random() * Math.PI * 2,
      brightness: Math.random() * 0.3 + 0.05,
    });
  }
}

function layoutConstellations() {
  constellations = [];
  const skillPositions = {}; // track first occurrence for shared stars

  careerData.forEach((data, ci) => {
    const cx = yearToX((data.yearStart + data.yearEnd) / 2);
    const spread = Math.max(yearToX(data.yearEnd) - yearToX(data.yearStart), 80);
    const extra = data.extraVertical ? H * data.extraVertical : 0;
    const verticalOffset = data.side * (H * 0.16 + (data.minor ? H * 0.06 : H * 0.08) + extra);
    const cy = eclipticY + verticalOffset;

    const stars = [];
    const numStars = data.skills.length;
    const isMinor = data.minor;

    // Place stars in a constellation-like pattern
    data.skills.forEach((skill, si) => {
      const angle = (si / numStars) * Math.PI * 1.6 - Math.PI * 0.8;
      const dist = (isMinor ? 25 : 40) + Math.sin(si * 2.3 + ci) * (isMinor ? 12 : 22);
      const jitterX = Math.sin(si * 7.1 + ci * 3.7) * (isMinor ? 8 : 15);
      const jitterY = Math.cos(si * 5.3 + ci * 2.1) * (isMinor ? 8 : 15);

      const sx = cx + Math.cos(angle) * dist * (spread / 120) + jitterX;
      const sy = cy + Math.sin(angle) * dist + jitterY;

      // Magnitude: 1 = brightest/biggest, 3 = dimmest/smallest
      const radius = skill.magnitude === 1 ? (isMinor ? 3 : 4.5) :
                     skill.magnitude === 2 ? (isMinor ? 2 : 3) :
                     (isMinor ? 1.5 : 2);

      const shared = skillPositions[skill.name] !== undefined;

      stars.push({
        x: sx, y: sy,
        name: skill.name,
        magnitude: skill.magnitude,
        radius: radius,
        shared: shared,
        twinkleSpeed: Math.random() * 1.2 + 0.4,
        twinkleOffset: Math.random() * Math.PI * 2,
      });

      if (!skillPositions[skill.name]) {
        skillPositions[skill.name] = [];
      }
      skillPositions[skill.name].push({ ci, si, x: sx, y: sy });
    });

    // Generate constellation lines — connect stars in a path-like manner
    const lines = [];
    if (stars.length > 1) {
      // Connect sequentially with some branches
      for (let i = 0; i < stars.length - 1; i++) {
        lines.push([i, i + 1]);
      }
      // Add a branch if enough stars
      if (stars.length >= 4) {
        lines.push([0, Math.floor(stars.length / 2)]);
      }
      if (stars.length >= 6) {
        lines.push([2, stars.length - 1]);
      }
    }

    constellations.push({
      ...data,
      cx, cy, stars, lines,
      index: ci,
    });
  });

  // Build shared star links
  sharedStarLinks = [];
  Object.keys(skillPositions).forEach(skillName => {
    const positions = skillPositions[skillName];
    if (positions.length > 1) {
      for (let i = 0; i < positions.length - 1; i++) {
        for (let j = i + 1; j < positions.length; j++) {
          sharedStarLinks.push({
            from: positions[i],
            to: positions[j],
            name: skillName,
          });
        }
      }
    }
  });
}

// ─── DRAWING ────────────────────────────────────────────────────────────────

function drawCoordinateGrid() {
  ctx.save();
  const gridColor = 'rgba(74, 85, 104, 0.05)';

  // Concentric circles from center
  const centerX = W / 2;
  const centerY = H / 2;
  for (let r = 80; r < Math.max(W, H); r += 120) {
    ctx.beginPath();
    ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Radial lines
  for (let a = 0; a < Math.PI * 2; a += Math.PI / 8) {
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(
      centerX + Math.cos(a) * Math.max(W, H),
      centerY + Math.sin(a) * Math.max(W, H)
    );
    ctx.strokeStyle = 'rgba(74, 85, 104, 0.025)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  ctx.restore();
}

function drawBackgroundStars() {
  backgroundStars.forEach(star => {
    const twinkle = 0.5 + 0.5 * Math.sin(time * star.twinkleSpeed + star.twinkleOffset);
    const alpha = star.brightness * (0.4 + 0.6 * twinkle);
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(237, 230, 214, ${alpha})`;
    ctx.fill();
  });
}

function drawEcliptic() {
  const progress = Math.min(animProgress * 1.5, 1);
  if (progress <= 0) return;

  const y = eclipticY;
  const startX = yearToX(yearMin + 0.5);
  const endX = yearToX(yearMax - 0.5);
  const drawEndX = startX + (endX - startX) * progress;

  // Main ecliptic line
  ctx.save();
  const grad = ctx.createLinearGradient(startX, 0, endX, 0);
  grad.addColorStop(0, 'rgba(212, 160, 41, 0)');
  grad.addColorStop(0.05, 'rgba(212, 160, 41, 0.35)');
  grad.addColorStop(0.95, 'rgba(212, 160, 41, 0.35)');
  grad.addColorStop(1, 'rgba(212, 160, 41, 0)');

  ctx.beginPath();
  ctx.moveTo(startX, y);
  ctx.lineTo(drawEndX, y);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Faint glow
  ctx.beginPath();
  ctx.moveTo(startX, y);
  ctx.lineTo(drawEndX, y);
  ctx.strokeStyle = 'rgba(212, 160, 41, 0.06)';
  ctx.lineWidth = 6;
  ctx.stroke();

  // Year markers
  for (let year = 2016; year <= 2026; year++) {
    const x = yearToX(year);
    if (x > drawEndX) break;

    const markerAlpha = Math.min(1, (drawEndX - x) / 40);

    // Tick mark
    ctx.beginPath();
    ctx.moveTo(x, y - 6);
    ctx.lineTo(x, y + 6);
    ctx.strokeStyle = `rgba(212, 160, 41, ${0.3 * markerAlpha})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Year label
    ctx.font = '300 10px "IBM Plex Mono", monospace';
    ctx.fillStyle = `rgba(237, 230, 214, ${0.3 * markerAlpha})`;
    ctx.textAlign = 'center';
    ctx.fillText(year.toString(), x, y + 22);
  }

  ctx.restore();
}

function drawConstellation(constellation, globalAlpha) {
  const ci = constellation.index;
  const numConstellations = careerData.length;
  // Each constellation appears in sequence
  const constellationDuration = 0.6;
  const constellationDelay = ci / (numConstellations + 1);
  const localProgress = Math.max(0, Math.min(1,
    (animProgress - constellationDelay) / constellationDuration
  ));

  if (localProgress <= 0) return;

  const isHovered = hoveredConstellation === ci;
  const dimmed = hoveredConstellation !== null && !isHovered;
  const alpha = globalAlpha * (dimmed ? 0.15 : 1) * localProgress;
  const tint = constellation.tint;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Draw constellation lines
  const lineProgress = Math.max(0, Math.min(1, (localProgress - 0.2) / 0.6));
  if (lineProgress > 0) {
    constellation.lines.forEach((line, li) => {
      const lp = Math.max(0, Math.min(1, (lineProgress - li * 0.1) / 0.5));
      if (lp <= 0) return;

      const s1 = constellation.stars[line[0]];
      const s2 = constellation.stars[line[1]];
      const ex = s1.x + (s2.x - s1.x) * lp;
      const ey = s1.y + (s2.y - s1.y) * lp;

      ctx.beginPath();
      ctx.moveTo(s1.x, s1.y);
      ctx.lineTo(ex, ey);
      ctx.strokeStyle = `rgba(201, 168, 76, ${0.2 * (isHovered ? 1.8 : 1)})`;
      ctx.lineWidth = 0.8;
      ctx.stroke();
    });
  }

  // Draw stars
  constellation.stars.forEach((star, si) => {
    const starProgress = Math.max(0, Math.min(1, (localProgress - si * 0.06) / 0.4));
    if (starProgress <= 0) return;

    const twinkle = 0.7 + 0.3 * Math.sin(time * star.twinkleSpeed + star.twinkleOffset);
    const r = star.radius * starProgress * (isHovered ? 1.2 : 1);

    // Star glow
    const glowRadius = r * (isHovered ? 5 : 3.5);
    const glow = ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, glowRadius);
    const tintStr = `${tint[0]}, ${tint[1]}, ${tint[2]}`;
    glow.addColorStop(0, `rgba(${tintStr}, ${0.15 * twinkle * (isHovered ? 1.5 : 1)})`);
    glow.addColorStop(0.5, `rgba(${tintStr}, ${0.04 * twinkle})`);
    glow.addColorStop(1, `rgba(${tintStr}, 0)`);
    ctx.beginPath();
    ctx.arc(star.x, star.y, glowRadius, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Outer glow haze for bright stars
    if (star.magnitude === 1) {
      const haze = ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, r * 8);
      haze.addColorStop(0, `rgba(237, 230, 214, ${0.04 * twinkle})`);
      haze.addColorStop(1, 'rgba(237, 230, 214, 0)');
      ctx.beginPath();
      ctx.arc(star.x, star.y, r * 8, 0, Math.PI * 2);
      ctx.fillStyle = haze;
      ctx.fill();
    }

    if (star.shared) {
      // Double-ring symbol for shared stars
      ctx.beginPath();
      ctx.arc(star.x, star.y, r * 1.1, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(237, 230, 214, ${0.9 * twinkle})`;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(star.x, star.y, r * 1.8, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(201, 168, 76, ${0.4 * twinkle})`;
      ctx.lineWidth = 0.7;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(star.x, star.y, r * 2.6, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(201, 168, 76, ${0.2 * twinkle})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    } else {
      // Regular star — four-point diffraction spike + core
      // Diffraction spikes
      const spikeLen = r * (star.magnitude === 1 ? 4 : 2.5);
      const spikeAlpha = 0.15 * twinkle * (isHovered ? 1.3 : 1);
      ctx.strokeStyle = `rgba(237, 230, 214, ${spikeAlpha})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(star.x - spikeLen, star.y);
      ctx.lineTo(star.x + spikeLen, star.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(star.x, star.y - spikeLen);
      ctx.lineTo(star.x, star.y + spikeLen);
      ctx.stroke();

      // Star core
      ctx.beginPath();
      ctx.arc(star.x, star.y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(237, 230, 214, ${(star.magnitude === 1 ? 0.95 : star.magnitude === 2 ? 0.75 : 0.55) * twinkle})`;
      ctx.fill();
    }

    // Star name label (on hover or always for bright stars)
    if (isHovered || star.magnitude === 1) {
      const labelAlpha = isHovered ? 0.8 : 0.3;
      ctx.font = '300 9px "IBM Plex Mono", monospace';
      ctx.fillStyle = `rgba(237, 230, 214, ${labelAlpha * starProgress})`;
      ctx.textAlign = 'center';
      ctx.fillText(star.name, star.x, star.y + r + 14);
    }
  });

  // Constellation name
  const nameProgress = Math.max(0, Math.min(1, (localProgress - 0.3) / 0.5));
  if (nameProgress > 0) {
    const nameAlpha = (isHovered ? 0.95 : 0.55) * nameProgress;
    const fontSize = constellation.minor ? 14 : 18;
    ctx.font = `italic 400 ${fontSize}px "Cormorant Garamond", serif`;
    ctx.fillStyle = `rgba(237, 230, 214, ${nameAlpha})`;
    ctx.textAlign = 'center';

    // Position name above or below the constellation
    // Avoid cartouche overlap for leftmost constellations
    const cartoucheRight = 330;
    const cartoucheBottom = 180;
    const defaultNameY = constellation.side === -1 ?
      Math.min(...constellation.stars.map(s => s.y)) - 22 :
      Math.max(...constellation.stars.map(s => s.y)) + 28;

    let nameX = constellation.cx;
    let nameY = defaultNameY;

    // If the name would overlap the cartouche, push it below the constellation instead
    if (nameX < cartoucheRight && nameY < cartoucheBottom && constellation.side === -1) {
      nameY = Math.max(...constellation.stars.map(s => s.y)) + 28;
    }

    ctx.fillText(constellation.company, nameX, nameY);

    // Role subtitle
    if (isHovered) {
      ctx.font = '300 10px "IBM Plex Mono", monospace';
      ctx.fillStyle = `rgba(201, 168, 76, ${0.5 * nameProgress})`;
      const subtitleOffset = (nameY > eclipticY) ? 18 : -16;
      ctx.fillText(constellation.role, nameX, nameY + subtitleOffset);
    }
  }

  // Connection line to ecliptic (thin dashed)
  if (nameProgress > 0) {
    const eclipticX = yearToX((constellation.yearStart + constellation.yearEnd) / 2);
    const nearestStarY = constellation.side === -1 ?
      Math.max(...constellation.stars.map(s => s.y)) :
      Math.min(...constellation.stars.map(s => s.y));

    ctx.beginPath();
    ctx.setLineDash([3, 6]);
    ctx.moveTo(eclipticX, eclipticY);
    ctx.lineTo(constellation.cx, nearestStarY);
    ctx.strokeStyle = `rgba(201, 168, 76, ${0.08 * nameProgress * (isHovered ? 2.5 : 1)})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.setLineDash([]);

    // Small dot on ecliptic
    ctx.beginPath();
    ctx.arc(eclipticX, eclipticY, 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(212, 160, 41, ${0.4 * nameProgress})`;
    ctx.fill();
  }

  ctx.restore();
}

function drawSharedStarLinks() {
  if (animProgress < 0.5) return;
  const linkAlpha = Math.min(1, (animProgress - 0.5) * 2);
  const dimmed = hoveredConstellation !== null;

  sharedStarLinks.forEach(link => {
    const s1 = constellations[link.from.ci].stars[link.from.si];
    const s2 = constellations[link.to.ci].stars[link.to.si];

    const isRelevant = hoveredConstellation === link.from.ci || hoveredConstellation === link.to.ci;
    const alpha = linkAlpha * (dimmed ? (isRelevant ? 0.35 : 0.04) : 0.12);

    // Curved dashed line between shared stars
    const midX = (s1.x + s2.x) / 2;
    const midY = (s1.y + s2.y) / 2 + (s2.x - s1.x) * 0.15;

    ctx.save();
    ctx.beginPath();
    ctx.setLineDash([2, 5]);
    ctx.moveTo(s1.x, s1.y);
    ctx.quadraticCurveTo(midX, midY, s2.x, s2.y);
    ctx.strokeStyle = `rgba(201, 168, 76, ${alpha})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  });
}

function drawTitleCartouche() {
  if (animProgress < 0.1) return;
  const alpha = Math.min(1, (animProgress - 0.1) * 2);

  const x = 36;
  const y = 36;
  const w = 280;
  const h = 130;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Ornamental border (double line rectangle)
  ctx.strokeStyle = 'rgba(201, 168, 76, 0.15)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(x, y, w, h);
  ctx.strokeRect(x + 4, y + 4, w - 8, h - 8);

  // Corner ornaments
  const corners = [[x, y], [x + w, y], [x, y + h], [x + w, y + h]];
  corners.forEach(([cx, cy]) => {
    ctx.beginPath();
    ctx.arc(cx, cy, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(201, 168, 76, 0.2)';
    ctx.fill();
  });

  // Fill
  ctx.fillStyle = 'rgba(6, 8, 15, 0.7)';
  ctx.fillRect(x + 5, y + 5, w - 10, h - 10);

  // Title text
  ctx.font = 'italic 300 11px "IBM Plex Mono", monospace';
  ctx.fillStyle = 'rgba(201, 168, 76, 0.5)';
  ctx.textAlign = 'left';
  ctx.fillText('CELESTIAL CAREER CHART', x + 18, y + 28);

  // Decorative line
  ctx.beginPath();
  ctx.moveTo(x + 18, y + 35);
  ctx.lineTo(x + w - 18, y + 35);
  ctx.strokeStyle = 'rgba(201, 168, 76, 0.12)';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Person name
  ctx.font = 'italic 400 24px "Cormorant Garamond", serif';
  ctx.fillStyle = 'rgba(237, 230, 214, 0.85)';
  ctx.fillText(personName, x + 18, y + 64);

  // Person title
  ctx.font = '300 10px "IBM Plex Mono", monospace';
  ctx.fillStyle = 'rgba(237, 230, 214, 0.35)';
  ctx.fillText(personTitle, x + 18, y + 82);

  // Industries
  ctx.font = '300 9px "IBM Plex Mono", monospace';
  ctx.fillStyle = 'rgba(201, 168, 76, 0.3)';
  ctx.fillText(industries.join('  ·  '), x + 18, y + 102);

  // Year range
  ctx.fillStyle = 'rgba(237, 230, 214, 0.2)';
  ctx.fillText('2016 — PRESENT', x + 18, y + 118);

  ctx.restore();
}

function drawMagnitudeKey() {
  if (animProgress < 0.3) return;
  const alpha = Math.min(1, (animProgress - 0.3) * 2);

  const x = W - 180;
  const y = H - 120;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Border
  ctx.strokeStyle = 'rgba(201, 168, 76, 0.12)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(x, y, 150, 90);

  // Title
  ctx.font = '300 9px "IBM Plex Mono", monospace';
  ctx.fillStyle = 'rgba(201, 168, 76, 0.45)';
  ctx.textAlign = 'left';
  ctx.fillText('STAR MAGNITUDE', x + 12, y + 18);

  // Magnitude entries
  const entries = [
    { label: 'Primary skill', mag: 1, r: 4.5 },
    { label: 'Core skill', mag: 2, r: 3 },
    { label: 'Supporting skill', mag: 3, r: 2 },
  ];

  entries.forEach((entry, i) => {
    const ey = y + 38 + i * 18;
    const twinkle = 0.7 + 0.3 * Math.sin(time * 0.8 + i);

    // Star dot
    ctx.beginPath();
    ctx.arc(x + 20, ey, entry.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(237, 230, 214, ${(entry.mag === 1 ? 0.9 : entry.mag === 2 ? 0.7 : 0.5) * twinkle})`;
    ctx.fill();

    // Label
    ctx.font = '300 9px "IBM Plex Mono", monospace';
    ctx.fillStyle = 'rgba(237, 230, 214, 0.35)';
    ctx.textAlign = 'left';
    ctx.fillText(entry.label, x + 36, ey + 3);
  });

  // Shared star symbol
  ctx.beginPath();
  ctx.arc(x + 110, y + 42, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(237, 230, 214, 0.7)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 110, y + 42, 5.5, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(201, 168, 76, 0.35)';
  ctx.lineWidth = 0.6;
  ctx.stroke();

  ctx.font = '300 8px "IBM Plex Mono", monospace';
  ctx.fillStyle = 'rgba(237, 230, 214, 0.3)';
  ctx.textAlign = 'center';
  ctx.fillText('Shared', x + 110, y + 56);

  ctx.restore();
}

// ─── INTERACTION ────────────────────────────────────────────────────────────

function hitTest(mx, my) {
  for (let i = constellations.length - 1; i >= 0; i--) {
    const c = constellations[i];
    const stars = c.stars;
    // Check bounding box with padding
    const minX = Math.min(...stars.map(s => s.x)) - 30;
    const maxX = Math.max(...stars.map(s => s.x)) + 30;
    const minY = Math.min(...stars.map(s => s.y)) - 30;
    const maxY = Math.max(...stars.map(s => s.y)) + 30;

    if (mx >= minX && mx <= maxX && my >= minY && my <= maxY) {
      return i;
    }
  }
  return null;
}

function updateTooltip(ci) {
  if (ci === null) {
    tooltip.classList.remove('visible');
    return;
  }

  const c = constellations[ci];
  tooltip.querySelector('.tt-company').textContent = c.company;
  tooltip.querySelector('.tt-role').textContent = c.role;
  tooltip.querySelector('.tt-years').textContent = c.years;

  const skillsEl = tooltip.querySelector('.tt-skills');
  skillsEl.innerHTML = '';
  c.skills.forEach(star => {
    const tag = document.createElement('span');
    tag.className = 'tt-skill';
    tag.textContent = star.name;
    skillsEl.appendChild(tag);
  });

  const projEl = tooltip.querySelector('.tt-projects');
  if (c.projects.length > 0) {
    projEl.textContent = 'Projects: ' + c.projects.join(', ');
    projEl.style.display = 'block';
  } else {
    projEl.style.display = 'none';
  }

  tooltip.classList.add('visible');

  // Position tooltip near cursor but keep on screen
  let tx = mouseX + 20;
  let ty = mouseY - 20;
  const rect = tooltip.getBoundingClientRect();
  if (tx + 300 > W) tx = mouseX - 300 - 20;
  if (ty + 200 > H) ty = H - 200;
  if (ty < 10) ty = 10;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
}

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  const hit = hitTest(mouseX, mouseY);
  if (hit !== hoveredConstellation) {
    hoveredConstellation = hit;
    canvas.style.cursor = hit !== null ? 'pointer' : 'default';
    updateTooltip(hit);
  } else if (hit !== null) {
    // Update tooltip position
    updateTooltip(hit);
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredConstellation = null;
  canvas.style.cursor = 'default';
  updateTooltip(null);
});

// ─── ANIMATION LOOP ─────────────────────────────────────────────────────────

function draw() {
  time += 0.016;
  animProgress = Math.min(1, animProgress + 0.012);

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#06080F';
  ctx.fillRect(0, 0, W, H);

  // Subtle radial vignette
  const vignette = ctx.createRadialGradient(W / 2, H / 2, H * 0.2, W / 2, H / 2, H * 0.9);
  vignette.addColorStop(0, 'rgba(12, 16, 30, 0.2)');
  vignette.addColorStop(1, 'rgba(0, 0, 0, 0.4)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  drawCoordinateGrid();
  drawBackgroundStars();
  drawEcliptic();

  // Draw constellations
  constellations.forEach(c => drawConstellation(c, 1));

  drawSharedStarLinks();
  drawTitleCartouche();
  drawMagnitudeKey();

  requestAnimationFrame(draw);
}

// ─── INIT ───────────────────────────────────────────────────────────────────

window.addEventListener('resize', resize);
resize();
draw();
</script>
