  project: 'Project', education: 'Education', goal: 'Goal',
  industry: 'Industry', contact: 'Contact',
};

// ── Build Legend ─────────────────────────────────────────────────────────────

const legendEl = document.getElementById('legend');
for (const [type, color] of Object.entries(TYPE_COLORS)) {
  const count = nodes.filter(n => n.type === type).length;

  legendEl.appendChild(item);
}

// ── Sphere Layout ───────────────────────────────────────────────────────────

const SPHERE_RADIUS = 6;

// Assign latitude bands per type (polar angle theta from 0 to PI)
const TYPE_BANDS = {
  goal:      { thetaMin: 0.15, thetaMax: 0.4 },
  education: { thetaMin: 0.3,  thetaMax: 0.55 },
  industry:  { thetaMin: 0.45, thetaMax: 0.7 },
  company:   { thetaMin: 0.55, thetaMax: 0.85 },
  contact:   { thetaMin: 0.6,  thetaMax: 0.9 },
  role:      { thetaMin: 0.75, thetaMax: 1.05 },
  project:   { thetaMin: 1.1,  thetaMax: 1.45 },
  skill:     { thetaMin: 1.5,  thetaMax: 2.0 },
  person:    { thetaMin: 0, thetaMax: 0 }, // center
};

// Build adjacency
const adjacency = new Map();
nodes.forEach(n => adjacency.set(n.id, []));
edges.forEach(e => {
  adjacency.get(e.source)?.push(e.target);
  adjacency.get(e.target)?.push(e.source);
});

// Position nodes on sphere using Fibonacci spiral within their band
function layoutNodes() {
  const byType = {};
  nodes.forEach(n => {
    if (!byType[n.type]) byType[n.type] = [];
    byType[n.type].push(n);
  });

  const nodePositions = new Map();

  for (const [type, list] of Object.entries(byType)) {
    if (type === 'person') {
      nodePositions.set(list[0].id, new THREE.Vector3(0, 0, 0));
      continue;
    }
    const band = TYPE_BANDS[type];
    const count = list.length;
    const goldenAngle = Math.PI * (3 - Math.sqrt(5));

    list.forEach((node, i) => {
      // Distribute theta within band
      const t = count === 1 ? 0.5 : i / (count - 1);
      const theta = band.thetaMin + t * (band.thetaMax - band.thetaMin);
      // Spread phi using golden angle
      const phi = goldenAngle * (i + Object.keys(byType).indexOf(type) * 7);

      const r = SPHERE_RADIUS * (0.9 + Math.random() * 0.2);
      const x = r * Math.sin(theta) * Math.cos(phi);
      const y = r * Math.cos(theta);
      const z = r * Math.sin(theta) * Math.sin(phi);
      nodePositions.set(node.id, new THREE.Vector3(x, y, z));
    });
  }

  return nodePositions;
}

// Force relaxation to improve spacing
function relaxPositions(positions, iterations = 80) {
  const ids = nodes.filter(n => n.type !== 'person').map(n => n.id);
  const repulsion = 1.8;
  const attraction = 0.008;
  const spherePull = 0.02;

  for (let iter = 0; iter < iterations; iter++) {
    const forces = new Map();
    ids.forEach(id => forces.set(id, new THREE.Vector3()));

    // Repulsion between all non-person nodes
    for (let i = 0; i < ids.length; i++) {
      for (let j = i + 1; j < ids.length; j++) {
        const a = positions.get(ids[i]);
        const b = positions.get(ids[j]);
        const diff = new THREE.Vector3().subVectors(a, b);
        const dist = diff.length();
        if (dist < 0.01) { diff.set(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5); }
        const minDist = Math.max(dist, 0.3);
        const force = repulsion / (minDist * minDist);
        const f = diff.normalize().multiplyScalar(force);
        forces.get(ids[i]).add(f);
        forces.get(ids[j]).sub(f);
      }
    }

    // Attraction along edges (gentle)
    edges.forEach(e => {
      const sPos = positions.get(e.source);
      const tPos = positions.get(e.target);
      if (!sPos || !tPos) return;
      const diff = new THREE.Vector3().subVectors(tPos, sPos);
      const dist = diff.length();
      if (dist > SPHERE_RADIUS * 0.5) {
        const f = diff.normalize().multiplyScalar((dist - SPHERE_RADIUS * 0.4) * attraction);
        if (e.source !== 'person-jordan-blue') forces.get(e.source)?.add(f);
        if (e.target !== 'person-jordan-blue') forces.get(e.target)?.sub(f);
      }
    });

    // Pull back to sphere surface
    ids.forEach(id => {
      const pos = positions.get(id);
      const dist = pos.length();
      const target = SPHERE_RADIUS;
      const diff = (target - dist) * spherePull;
      forces.get(id).add(pos.clone().normalize().multiplyScalar(diff));
    });

    // Apply damped forces
    const damping = 1 - (iter / iterations) * 0.7;
    ids.forEach(id => {
      const f = forces.get(id);
      positions.get(id).add(f.multiplyScalar(0.15 * damping));
    });
  }

  return positions;
}

let nodePositions = relaxPositions(layoutNodes());

// ── Three.js Setup ──────────────────────────────────────────────────────────

  0.8,   // strength
  0.4,   // radius
  0.3    // threshold
);
composer.addPass(bloomPass);

// ── Sphere wireframe (faint) ────────────────────────────────────────────────

const sphereGeo = new THREE.IcosahedronGeometry(SPHERE_RADIUS, 2);
const sphereWire = new THREE.LineSegments(
  new THREE.WireframeGeometry(sphereGeo),
  new THREE.LineBasicMaterial({ color: 0x1a2040, transparent: true, opacity: 0.08 })

scene.add(sphereWire);

// ── Create Node Meshes ──────────────────────────────────────────────────────

const nodeMeshes = [];          // for raycasting
const pivotGroup = new THREE.Group();

// Shared geometries
const sphereNodeGeo = new THREE.SphereGeometry(1, 24, 24);
const glowGeo = new THREE.SphereGeometry(1, 16, 16);

nodes.forEach(node => {
  const pos = nodePositions.get(node.id);
  const color = new THREE.Color(TYPE_COLORS[node.type]);
  const radius = node.type === 'person' ? 0.55 : 0.12 + node.size * 0.028;

  // Core sphere
  const mat = new THREE.MeshStandardMaterial({
    color,
    emissive: color,
    emissiveIntensity: node.type === 'person' ? 1.2 : 0.5,
    roughness: 0.3,
    metalness: 0.2,
  });
  const mesh = new THREE.Mesh(sphereNodeGeo, mat);
  mesh.scale.setScalar(radius);
  mesh.position.copy(pos);
  mesh.userData = { nodeId: node.id };
  pivotGroup.add(mesh);
  nodeMeshes.push(mesh);

  // Outer glow
  const glowMat = new THREE.MeshBasicMaterial({
    color,
    transparent: true,
    opacity: node.type === 'person' ? 0.2 : 0.08,
    side: THREE.BackSide,
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.scale.setScalar(radius * (node.type === 'person' ? 3.5 : 2.2));
  glow.position.copy(pos);
  pivotGroup.add(glow);

  nodeMap.set(node.id, { mesh, glowMesh: glow, data: node, position: pos, baseMat: mat, glowMat });
});

// ── Create Labels (sprite) ──────────────────────────────────────────────────

function createTextSprite(text, color, scale) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const fontSize = 48;
  ctx.font = `600 ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
  const metrics = ctx.measureText(text);
  const w = metrics.width + 24;
  const h = fontSize + 20;
  canvas.width = w;
  canvas.height = h;

  ctx.font = `600 ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.fillStyle = color;
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 12, h / 2);

  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.85, depthWrite: false });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set((w / h) * scale, scale, 1);
  return sprite;
}

nodes.forEach(node => {
  const entry = nodeMap.get(node.id);
  const pos = entry.position;
  const color = TYPE_COLORS[node.type];
  const labelScale = node.type === 'person' ? 1.0 : 0.45;
  const sprite = createTextSprite(node.label, color, labelScale);

  const radius = node.type === 'person' ? 0.55 : 0.12 + node.size * 0.028;
  sprite.position.set(pos.x, pos.y + radius + labelScale * 0.4, pos.z);
  sprite.userData = { isLabel: true };
  pivotGroup.add(sprite);
  entry.labelSprite = sprite;
});

// ── Create Edges ────────────────────────────────────────────────────────────

const edgeGroup = new THREE.Group();
pivotGroup.add(edgeGroup);

const edgeObjects = [];

function createCurvedEdge(srcPos, tgtPos, color, edgeIndex) {
  // Create a quadratic bezier curve that bows outward from the sphere center
  const mid = new THREE.Vector3().addVectors(srcPos, tgtPos).multiplyScalar(0.5);

  // Push the midpoint outward (away from center) for a curved arc feel
  const midDist = mid.length();
  if (midDist > 0.01) {
    const bowAmount = srcPos.distanceTo(tgtPos) * 0.15;
    mid.normalize().multiplyScalar(midDist + bowAmount);
  }

  const curve = new THREE.QuadraticBezierCurve3(srcPos.clone(), mid, tgtPos.clone());
  const points = curve.getPoints(32);
  const geometry = new THREE.BufferGeometry().setFromPoints(points);

  // Add a custom attribute for pulse animation
  const alphas = new Float32Array(33);
  for (let i = 0; i < 33; i++) alphas[i] = 1.0;
  geometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

  const material = new THREE.LineBasicMaterial({
    color: new THREE.Color(color),
    transparent: true,
    opacity: 0.08,
    linewidth: 1,
  });

  const line = new THREE.Line(geometry, material);
  edgeGroup.add(line);

  return {
    line,
    material,
    curve,
    geometry,
    baseOpacity: 0.08,
    pulsePhase: Math.random() * Math.PI * 2 + edgeIndex * 0.3,
  };
}

edges.forEach((edge, i) => {
  const srcEntry = nodeMap.get(edge.source);
  const tgtEntry = nodeMap.get(edge.target);
  if (!srcEntry || !tgtEntry) return;

  // Blend colors between source and target
  const srcColor = new THREE.Color(TYPE_COLORS[srcEntry.data.type]);
  const tgtColor = new THREE.Color(TYPE_COLORS[tgtEntry.data.type]);
  const blended = srcColor.clone().lerp(tgtColor, 0.5);

  const edgeObj = createCurvedEdge(srcEntry.position, tgtEntry.position, blended, i);
  edgeObj.sourceId = edge.source;
  edgeObj.targetId = edge.target;
  edgeObjects.push(edgeObj);
});

// ── Particle trails along edges ─────────────────────────────────────────────

const PARTICLE_COUNT = 120;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
const particleColors = new Float32Array(PARTICLE_COUNT * 3);
const particleSizes = new Float32Array(PARTICLE_COUNT);

// Each particle travels along a random edge
const particleData = [];
for (let i = 0; i < PARTICLE_COUNT; i++) {
  const edgeIdx = Math.floor(Math.random() * edgeObjects.length);
  particleData.push({
    edgeIdx,
    t: Math.random(),
    speed: 0.002 + Math.random() * 0.006,
    direction: Math.random() > 0.5 ? 1 : -1,
  });
  const edge = edgeObjects[edgeIdx];
  const point = edge.curve.getPoint(particleData[i].t);
  particlePositions[i * 3] = point.x;
  particlePositions[i * 3 + 1] = point.y;
  particlePositions[i * 3 + 2] = point.z;

  const srcEntry = nodeMap.get(edge.sourceId);
  const color = new THREE.Color(TYPE_COLORS[srcEntry.data.type]);
  particleColors[i * 3] = color.r;
  particleColors[i * 3 + 1] = color.g;
  particleColors[i * 3 + 2] = color.b;

  particleSizes[i] = 1.5 + Math.random() * 2;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

const particleMat = new THREE.PointsMaterial({
  size: 0.06,
  vertexColors: true,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});

const particleSystem = new THREE.Points(particleGeo, particleMat);
pivotGroup.add(particleSystem);

// ── Ambient floating dust ───────────────────────────────────────────────────

const DUST_COUNT = 300;
const dustGeo = new THREE.BufferGeometry();
const dustPositions = new Float32Array(DUST_COUNT * 3);
const dustVelocities = [];
for (let i = 0; i < DUST_COUNT; i++) {
  const r = SPHERE_RADIUS * (0.5 + Math.random() * 1.2);
  const theta = Math.random() * Math.PI;
  const phi = Math.random() * Math.PI * 2;
  dustPositions[i * 3] = r * Math.sin(theta) * Math.cos(phi);
  dustPositions[i * 3 + 1] = r * Math.cos(theta);
  dustPositions[i * 3 + 2] = r * Math.sin(theta) * Math.sin(phi);
  dustVelocities.push({
    x: (Math.random() - 0.5) * 0.002,
    y: (Math.random() - 0.5) * 0.002,
    z: (Math.random() - 0.5) * 0.002,
  });
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
const dustMat = new THREE.PointsMaterial({
  size: 0.025,
  color: 0x4466aa,
  transparent: true,
  opacity: 0.25,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});
const dustSystem = new THREE.Points(dustGeo, dustMat);
pivotGroup.add(dustSystem);

// ── Raycasting & Interaction ────────────────────────────────────────────────

const raycaster = new THREE.Raycaster();
raycaster.params.Points = { threshold: 0.3 };
const mouse = new THREE.Vector2(-999, -999);
let hoveredNodeId = null;
let hoverTransition = 0;

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
}
window.addEventListener('mousemove', onMouseMove, false);

function updateHover() {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeMeshes, false);

  let newHoveredId = null;
  if (intersects.length > 0) {
    newHoveredId = intersects[0].object.userData.nodeId;
  }

  if (newHoveredId !== hoveredNodeId) {
    hoveredNodeId = newHoveredId;
    hoverTransition = 0;
    updateDetailPanel(hoveredNodeId);
  }

  if (hoveredNodeId) {
    hoverTransition = Math.min(1, hoverTransition + 0.06);
  }
}

function updateDetailPanel(nodeId) {
  const panel = document.getElementById('detail-panel');
  if (!nodeId) {
    panel.classList.remove('visible');
    return;
  }

  const entry = nodeMap.get(nodeId);
  if (!entry) return;
  const node = entry.data;

  document.getElementById('dp-type').textContent = TYPE_LABELS[node.type];
  document.getElementById('dp-type').style.color = TYPE_COLORS[node.type];
  document.getElementById('dp-label').textContent = node.label;
  document.getElementById('dp-detail').textContent = node.detail || '';

  const connIds = adjacency.get(node.id) || [];
  const connEl = document.getElementById('dp-connections');
  connEl.innerHTML = '';
  connIds.slice(0, 12).forEach(cid => {
    const cn = nodes.find(n => n.id === cid);
    if (!cn) return;
    const div = document.createElement('div');
    div.className = 'connection-item';
    div.innerHTML = `<span class="connection-dot" style="background:${TYPE_COLORS[cn.type]}"></span>${cn.label}`;
    connEl.appendChild(div);
  });
  if (connIds.length > 12) {
    const div = document.createElement('div');
    div.className = 'connection-item';
    div.style.color = 'rgba(255,255,255,0.3)';
    div.textContent = `+ ${connIds.length - 12} more`;
    connEl.appendChild(div);
  }

  panel.classList.add('visible');
}

// ── Animation Loop ──────────────────────────────────────────────────────────

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  controls.update();
  updateHover();

  // Connected IDs for hover highlight
  const connectedIds = new Set();
  const connectedEdgeIndices = new Set();
  if (hoveredNodeId) {
    connectedIds.add(hoveredNodeId);
    (adjacency.get(hoveredNodeId) || []).forEach(id => connectedIds.add(id));
    edgeObjects.forEach((eo, idx) => {
      if (eo.sourceId === hoveredNodeId || eo.targetId === hoveredNodeId) {
        connectedEdgeIndices.add(idx);
      }
    });
  }

  // Animate nodes
  nodeMap.forEach((entry, id) => {
    const node = entry.data;
    const isHovered = id === hoveredNodeId;
    const isConnected = connectedIds.has(id);
    const dimmed = hoveredNodeId && !isConnected;

    // Breathing pulse for the person node
    if (node.type === 'person') {
      const pulse = 1 + Math.sin(t * 1.5) * 0.06;
      entry.mesh.scale.setScalar(0.55 * pulse);
      entry.glowMesh.scale.setScalar(0.55 * 3.5 * (1 + Math.sin(t * 1.2) * 0.15));
      entry.glowMesh.material.opacity = 0.15 + Math.sin(t * 1.8) * 0.08;
    } else {
      const baseRadius = 0.12 + node.size * 0.028;
      // Subtle individual breathing
      const breathe = 1 + Math.sin(t * 0.8 + entry.position.x * 2) * 0.03;

      if (isHovered) {
        entry.mesh.scale.setScalar(baseRadius * 1.6 * breathe);
        entry.baseMat.emissiveIntensity = 1.5;
        entry.glowMesh.material.opacity = 0.3;
        entry.glowMesh.scale.setScalar(baseRadius * 4.0);
      } else if (isConnected) {
        const cPulse = 1 + Math.sin(t * 3) * 0.08;
        entry.mesh.scale.setScalar(baseRadius * 1.2 * breathe * cPulse);
        entry.baseMat.emissiveIntensity = 1.0;
        entry.glowMesh.material.opacity = 0.18;
        entry.glowMesh.scale.setScalar(baseRadius * 3.0);
      } else if (dimmed) {
        entry.mesh.scale.setScalar(baseRadius * 0.85 * breathe);
        entry.baseMat.emissiveIntensity = 0.15;
        entry.baseMat.opacity = 0.4;
        entry.glowMesh.material.opacity = 0.02;
      } else {
        entry.mesh.scale.setScalar(baseRadius * breathe);
        entry.baseMat.emissiveIntensity = 0.5;
        entry.glowMesh.material.opacity = 0.08;
        entry.glowMesh.scale.setScalar(baseRadius * 2.2);
      }
    }

    // Label opacity
    if (entry.labelSprite) {
      if (node.type === 'person') {
        entry.labelSprite.material.opacity = 0.9;
      } else if (isHovered) {
        entry.labelSprite.material.opacity = 1.0;
      } else if (isConnected) {
        entry.labelSprite.material.opacity = 0.85;
      } else if (dimmed) {
        entry.labelSprite.material.opacity = 0.08;
      } else {
        entry.labelSprite.material.opacity = 0.55;
      }
    }
  });

  // Animate edges — subtle base pulse + hover highlight
  edgeObjects.forEach((eo, idx) => {
    const isHighlighted = connectedEdgeIndices.has(idx);
    const dimmed = hoveredNodeId && !isHighlighted;

    // Synaptic pulse: a wave that travels along the edge over time
    const basePulse = 0.08 + Math.sin(t * 0.7 + eo.pulsePhase) * 0.03;

    if (isHighlighted) {
      // Bright pulsing highlight with traveling wave
      const wave = 0.6 + Math.sin(t * 4 + eo.pulsePhase) * 0.2;
      eo.material.opacity = wave;

      // Update per-vertex alpha for ripple effect
      const alphas = eo.geometry.attributes.alpha;
      for (let i = 0; i < alphas.count; i++) {
        const frac = i / (alphas.count - 1);
        const ripple = Math.sin(t * 6 - frac * Math.PI * 3 + eo.pulsePhase);
        alphas.array[i] = 0.5 + ripple * 0.3;
      }
      alphas.needsUpdate = true;
    } else if (dimmed) {
      eo.material.opacity = 0.015;
    } else {
      eo.material.opacity = basePulse;
    }
  });

  // Animate particles along edges
  const posAttr = particleSystem.geometry.attributes.position;
  const colAttr = particleSystem.geometry.attributes.color;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const pd = particleData[i];
    pd.t += pd.speed * pd.direction;

    // Wrap or bounce
    if (pd.t > 1 || pd.t < 0) {
      // Jump to a new random edge
      pd.edgeIdx = Math.floor(Math.random() * edgeObjects.length);
      pd.t = pd.direction > 0 ? 0 : 1;
      pd.speed = 0.002 + Math.random() * 0.006;

      // Update color to match new edge
      const edge = edgeObjects[pd.edgeIdx];
      const srcEntry = nodeMap.get(edge.sourceId);
      const color = new THREE.Color(TYPE_COLORS[srcEntry.data.type]);
      colAttr.array[i * 3] = color.r;
      colAttr.array[i * 3 + 1] = color.g;
      colAttr.array[i * 3 + 2] = color.b;
    }

    const edge = edgeObjects[pd.edgeIdx];
    const point = edge.curve.getPoint(pd.t);
    posAttr.array[i * 3] = point.x;
    posAttr.array[i * 3 + 1] = point.y;
    posAttr.array[i * 3 + 2] = point.z;

    // Brighten particles on highlighted edges
    const isHighlighted = connectedEdgeIndices.has(pd.edgeIdx);
    // Adjust size/opacity later if needed
  }
  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;

  // Make particles brighter when their edge is highlighted
  particleMat.opacity = hoveredNodeId ? 0.35 : 0.5;

  // Animate dust
  const dustPos = dustSystem.geometry.attributes.position;
  for (let i = 0; i < DUST_COUNT; i++) {
    dustPos.array[i * 3] += dustVelocities[i].x;
    dustPos.array[i * 3 + 1] += dustVelocities[i].y;
    dustPos.array[i * 3 + 2] += dustVelocities[i].z;

    // Gentle pull back toward sphere volume
    const dx = dustPos.array[i * 3];
    const dy = dustPos.array[i * 3 + 1];
    const dz = dustPos.array[i * 3 + 2];
    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
    if (dist > SPHERE_RADIUS * 1.5) {
      const pull = 0.001;
      dustPos.array[i * 3] -= dx * pull;
      dustPos.array[i * 3 + 1] -= dy * pull;
      dustPos.array[i * 3 + 2] -= dz * pull;
    }
  }
  dustPos.needsUpdate = true;

  // Sphere wireframe subtle pulse
  sphereWire.material.opacity = 0.04 + Math.sin(t * 0.3) * 0.02;
  sphereWire.rotation.y = t * 0.02;

  // Bloom adjustments on hover
  if (hoveredNodeId) {
    bloomPass.strength = THREE.MathUtils.lerp(bloomPass.strength, 1.2, 0.05);
  } else {
    bloomPass.strength = THREE.MathUtils.lerp(bloomPass.strength, 0.8, 0.05);
  }

  composer.render();
}

animate();

// ── Resize ──────────────────────────────────────────────────────────────────

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
