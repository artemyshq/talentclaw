<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Context Graph — Orbital</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #030712;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #e2e8f0;
    cursor: default;
  }
  canvas { display: block; }

  /* Legend */
  #legend {
    position: fixed;
    bottom: 24px;
    left: 24px;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(148, 163, 184, 0.12);
    border-radius: 14px;
    padding: 16px 20px;
    z-index: 10;
    min-width: 160px;
  }
  #legend h3 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #94a3b8;
    margin-bottom: 10px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    font-size: 12px;
    color: #cbd5e1;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .legend-item:hover { opacity: 0.7; }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Detail panel */
  #detail {
    position: fixed;
    top: 24px;
    right: 24px;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(148, 163, 184, 0.15);
    border-radius: 16px;
    padding: 24px 28px;
    z-index: 10;
    min-width: 260px;
    max-width: 320px;
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
  }
  #detail.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  #detail-close {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    color: #64748b;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  #detail-close:hover { color: #cbd5e1; background: rgba(148,163,184,0.1); }
  #detail-type {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  #detail-label {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
    line-height: 1.2;
  }
  #detail-info {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 14px;
    line-height: 1.4;
  }
  #detail-connections {
    border-top: 1px solid rgba(148,163,184,0.1);
    padding-top: 12px;
  }
  #detail-connections h4 {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #64748b;
    margin-bottom: 8px;
  }
  .conn-item {
    font-size: 12px;
    color: #94a3b8;
    padding: 2px 0;
  }
  .conn-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }

  /* Title */
  #title {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 10;
  }
  #title h1 {
    font-size: 16px;
    font-weight: 700;
    color: #e2e8f0;
    letter-spacing: -0.02em;
  }
  #title p {
    font-size: 12px;
    color: #64748b;
    margin-top: 2px;
  }
</style>
</head>
<body>

  <h1>Career Context</h1>

</div>

<div id="legend">
  <h3>Node Types</h3>
</div>

<div id="detail">
  <button id="detail-close">&times;</button>
  <div id="detail-type"></div>
  <div id="detail-label"></div>
  <div id="detail-info"></div>
  <div id="detail-connections">
    <h4>Connections</h4>
    <div id="detail-conn-list"></div>
  </div>
</div>

  { id: "industry-developer-tools", label: "Developer Tools", type: "industry", cluster: "industries", detail: "Industry", size: 7 },
  { id: "contact-sarah-chen", label: "Sarah Chen", type: "contact", cluster: "companies", detail: "VP Eng at Google", size: 7 },
  { id: "contact-mike-ross", label: "Mike Ross", type: "contact", cluster: "companies", detail: "CTO at Stripe", size: 7 },

const edges = [
  { source: "person-jordan-blue", target: "company-artemys" },
  { source: "person-jordan-blue", target: "company-google" },
  { source: "person-jordan-blue", target: "company-stripe" },
  { source: "person-jordan-blue", target: "company-acme-corp" },
  { source: "person-jordan-blue", target: "role-founder-ceo" },

  { source: "person-jordan-blue", target: "role-backend-engineer" },
  { source: "person-jordan-blue", target: "role-junior-dev" },
  { source: "company-artemys", target: "role-founder-ceo" },
  { source: "company-google", target: "role-senior-engineer" },
  { source: "company-stripe", target: "role-backend-engineer" },
  { source: "company-acme-corp", target: "role-junior-dev" },
  { source: "person-jordan-blue", target: "skill-typescript" },
  { source: "person-jordan-blue", target: "skill-react" },
  { source: "person-jordan-blue", target: "skill-nodejs" },
  { source: "person-jordan-blue", target: "skill-python" },
  { source: "person-jordan-blue", target: "skill-product-strategy" },
  { source: "person-jordan-blue", target: "skill-ai-ml" },
  { source: "role-founder-ceo", target: "skill-typescript" },
  { source: "role-founder-ceo", target: "skill-product-strategy" },
  { source: "role-senior-engineer", target: "skill-graphql" },
  { source: "role-senior-engineer", target: "skill-kubernetes" },
  { source: "role-senior-engineer", target: "skill-system-design" },
  { source: "role-backend-engineer", target: "skill-python" },
  { source: "role-backend-engineer", target: "skill-nodejs" },
  { source: "role-junior-dev", target: "skill-react" },
  { source: "person-jordan-blue", target: "project-openclaw" },
  { source: "person-jordan-blue", target: "project-coffee-shop" },
  { source: "person-jordan-blue", target: "project-talentclaw" },
  { source: "person-jordan-blue", target: "project-search-infra" },
  { source: "company-artemys", target: "project-openclaw" },
  { source: "company-artemys", target: "project-coffee-shop" },
  { source: "company-artemys", target: "project-talentclaw" },
  { source: "company-google", target: "project-search-infra" },
  { source: "project-openclaw", target: "skill-typescript" },
  { source: "project-openclaw", target: "skill-rust" },
  { source: "project-coffee-shop", target: "skill-nodejs" },
  { source: "project-talentclaw", target: "skill-react" },
  { source: "project-search-infra", target: "skill-python" },
  { source: "project-search-infra", target: "skill-kubernetes" },
  { source: "person-jordan-blue", target: "edu-mit" },
  { source: "edu-mit", target: "skill-python" },
  { source: "edu-mit", target: "skill-ai-ml" },
  { source: "person-jordan-blue", target: "goal-target-cto" },
  { source: "person-jordan-blue", target: "goal-target-vp-engineering" },
  { source: "person-jordan-blue", target: "goal-build-agent-ecosystem" },
  { source: "company-artemys", target: "industry-ai" },
  { source: "company-stripe", target: "industry-fintech" },
  { source: "company-google", target: "industry-developer-tools" },
  { source: "industry-ai", target: "industry-developer-tools" },
  { source: "person-jordan-blue", target: "contact-sarah-chen" },
  { source: "person-jordan-blue", target: "contact-mike-ross" },
  { source: "contact-sarah-chen", target: "company-google" },
  { source: "contact-mike-ross", target: "company-stripe" },
];

// ── Config ──────────────────────────────────────────────────────
const COLORS = {
  person:    '#059669',
  company:   '#3b82f6',
  role:      '#8b5cf6',
  skill:     '#f59e0b',
  project:   '#ec4899',
  education: '#06b6d4',
  goal:      '#10b981',
  industry:  '#f97316',
  contact:   '#6366f1',
};

const TYPE_LABELS = {
  person: 'Person', company: 'Company', role: 'Role', skill: 'Skill',
  project: 'Project', education: 'Education', goal: 'Goal',
  industry: 'Industry', contact: 'Contact',
};

// Ring order — types mapped to orbital rings (1 = innermost)
const RING_ORDER = {
  company:   1,
  contact:   1,
  role:      2,
  project:   3,
  skill:     4,
  education: 5,
  industry:  5,
  goal:      6,
};

const RING_COUNT = 6;

// ── Canvas Setup ────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, baseRadius, ringGap;
let dpr = window.devicePixelRatio || 1;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cx = W / 2;
  cy = H / 2;
  const minDim = Math.min(W, H);
  baseRadius = minDim * 0.1;
  ringGap = (minDim * 0.42 - baseRadius) / RING_COUNT;
}
resize();
window.addEventListener('resize', resize);

// ── Build node lookup + adjacency ───────────────────────────────
const nodeMap = {};
nodes.forEach(n => { nodeMap[n.id] = n; });

const adjacency = {};
nodes.forEach(n => { adjacency[n.id] = new Set(); });
edges.forEach(e => {
  adjacency[e.source].add(e.target);
  adjacency[e.target].add(e.source);
});

// ── Assign orbital positions ────────────────────────────────────
// Group non-person nodes by ring
const ringNodes = {};
for (let i = 1; i <= RING_COUNT; i++) ringNodes[i] = [];

nodes.forEach(n => {
  if (n.type === 'person') {
    n._ring = 0;
    n._angle = 0;
    n._speed = 0;
    n._x = 0; n._y = 0;
    return;
  }
  const ring = RING_ORDER[n.type] || 4;
  n._ring = ring;
  ringNodes[ring].push(n);
});

// Distribute nodes evenly around each ring with random phase offsets
for (let r = 1; r <= RING_COUNT; r++) {
  const group = ringNodes[r];
  const count = group.length;
  if (!count) continue;
  const angleStep = (Math.PI * 2) / count;
  // Slight random jitter in starting position for organic feel
  const phaseOffset = Math.random() * Math.PI * 2;
  group.forEach((n, i) => {
    n._baseAngle = phaseOffset + i * angleStep;
    n._angle = n._baseAngle;
    // Outer rings orbit slower — feels more natural
    n._speed = (0.08 + Math.random() * 0.04) / (r * 0.7 + 0.5);
    // Alternate direction for visual interest
    if (r % 2 === 0) n._speed *= -1;
    // Slight radial wobble
    n._radialOffset = (Math.random() - 0.5) * ringGap * 0.15;
  });
}

// ── Trail system ────────────────────────────────────────────────
const TRAIL_LENGTH = 12;
nodes.forEach(n => { n._trail = []; });

// ── Interaction state ───────────────────────────────────────────
let hoverNode = null;
let selectedNode = null;
let mouseX = -9999, mouseY = -9999;
let isPaused = false;

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('click', e => {
  if (hoverNode) {
    selectedNode = hoverNode;
    showDetail(selectedNode);
  } else {
    selectedNode = null;
    hideDetail();
  }
});

canvas.addEventListener('mouseleave', () => {
  mouseX = -9999;
  mouseY = -9999;
  hoverNode = null;
  isPaused = false;
  canvas.style.cursor = 'default';
});

// ── Detail panel ────────────────────────────────────────────────
const detailEl = document.getElementById('detail');
const detailType = document.getElementById('detail-type');
const detailLabel = document.getElementById('detail-label');
const detailInfo = document.getElementById('detail-info');
const detailConnList = document.getElementById('detail-conn-list');

document.getElementById('detail-close').addEventListener('click', () => {
  selectedNode = null;
  hideDetail();
});

function showDetail(node) {
  const color = COLORS[node.type];
  detailType.textContent = TYPE_LABELS[node.type];
  detailType.style.color = color;
  detailLabel.textContent = node.label;
  detailInfo.textContent = node.detail || '';

  // Connections
  const conns = [...adjacency[node.id]];
  detailConnList.innerHTML = '';
  conns.slice(0, 12).forEach(id => {
    const cn = nodeMap[id];
    if (!cn) return;
    const div = document.createElement('div');
    div.className = 'conn-item';
    div.innerHTML = `<span class="conn-dot" style="background:${COLORS[cn.type]}"></span>${cn.label}`;
    detailConnList.appendChild(div);
  });
  if (conns.length > 12) {
    const more = document.createElement('div');
    more.className = 'conn-item';
    more.style.color = '#475569';
    more.textContent = `+ ${conns.length - 12} more`;
    detailConnList.appendChild(more);
  }
  detailEl.classList.add('visible');
}

function hideDetail() {
  detailEl.classList.remove('visible');
}

// ── Legend ───────────────────────────────────────────────────────
const legendEl = document.getElementById('legend');
Object.entries(TYPE_LABELS).forEach(([type, label]) => {
  const div = document.createElement('div');
  div.className = 'legend-item';
  div.innerHTML = `<span class="legend-dot" style="background:${COLORS[type]}"></span>${label}`;
  legendEl.appendChild(div);
});

// ── Stars background (static, drawn once per resize) ────────────
let starCanvas;
function generateStars() {
  starCanvas = document.createElement('canvas');
  starCanvas.width = W * dpr;
  starCanvas.height = H * dpr;
  const sctx = starCanvas.getContext('2d');
  sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const starCount = Math.floor((W * H) / 2000);
  for (let i = 0; i < starCount; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = Math.random() * 1.2;
    const a = 0.2 + Math.random() * 0.5;
    sctx.beginPath();
    sctx.arc(x, y, r, 0, Math.PI * 2);
    sctx.fillStyle = `rgba(148, 163, 184, ${a})`;
    sctx.fill();
  }
}
generateStars();
window.addEventListener('resize', () => { resize(); generateStars(); });

// ── Helper: hex to rgba ─────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return [r, g, b];
}

// ── Render loop ─────────────────────────────────────────────────
let lastTime = 0;

function update(time) {
  const dt = lastTime ? (time - lastTime) / 1000 : 0.016;
  lastTime = time;

  // ── Hit test for hover ──────────────────────────────────────
  hoverNode = null;
  let closestDist = Infinity;
  nodes.forEach(n => {
    const dx = mouseX - (cx + n._x);
    const dy = mouseY - (cy + n._y);
    const dist = Math.sqrt(dx * dx + dy * dy);
    const hitR = Math.max(n.size * 1.6, 18);
    if (dist < hitR && dist < closestDist) {
      closestDist = dist;
      hoverNode = n;
    }
  });

  const activeNode = hoverNode || selectedNode;
  const activeSet = new Set();
  if (activeNode) {
    activeSet.add(activeNode.id);
    adjacency[activeNode.id].forEach(id => activeSet.add(id));
  }

  isPaused = !!hoverNode;
  canvas.style.cursor = hoverNode ? 'pointer' : 'default';

  // ── Update positions ────────────────────────────────────────
  nodes.forEach(n => {
    if (n.type === 'person') {
      n._x = 0;
      n._y = 0;
      return;
    }
    // Pause orbiting node (and its connections) on hover
    const shouldPause = isPaused && activeSet.has(n.id);
    if (!shouldPause) {
      n._angle += n._speed * dt;
    }
    const radius = baseRadius + (n._ring) * ringGap + (n._radialOffset || 0);
    n._x = Math.cos(n._angle) * radius;
    n._y = Math.sin(n._angle) * radius;

    // Trail
    n._trail.push({ x: n._x, y: n._y, t: time });
    if (n._trail.length > TRAIL_LENGTH) n._trail.shift();
  });

  // ── Draw ────────────────────────────────────────────────────
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#030712';
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.drawImage(starCanvas, 0, 0, W, H);

  // Subtle radial gradient behind center
  const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseRadius + RING_COUNT * ringGap + 40);
  bgGrad.addColorStop(0, 'rgba(5, 150, 105, 0.06)');
  bgGrad.addColorStop(0.3, 'rgba(5, 150, 105, 0.02)');
  bgGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // ── Ring tracks ─────────────────────────────────────────────
  for (let r = 1; r <= RING_COUNT; r++) {
    const radius = baseRadius + r * ringGap;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(148, 163, 184, 0.06)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // ── Edges ───────────────────────────────────────────────────
  edges.forEach(e => {
    const src = nodeMap[e.source];
    const tgt = nodeMap[e.target];
    if (!src || !tgt) return;

    const isActive = activeNode && (activeSet.has(src.id) && activeSet.has(tgt.id));
    const dimmed = activeNode && !isActive;

    const x1 = cx + src._x;
    const y1 = cy + src._y;
    const x2 = cx + tgt._x;
    const y2 = cy + tgt._y;

    // Curved edges — control point pulled toward center for inner connections,
    // or midpoint offset for ring-to-ring
    const mx = (x1 + x2) / 2;
    const my = (y1 + y2) / 2;
    // Pull control point slightly toward center for cosmic curve effect
    const pullFactor = 0.15;
    const cpx = mx + (cx - mx) * pullFactor;
    const cpy = my + (cy - my) * pullFactor;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(cpx, cpy, x2, y2);

    if (isActive) {
      const [r, g, b] = hexToRgb(COLORS[tgt.type]);
      ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, 0.35)`;
      ctx.lineWidth = 1.5;
    } else {
      ctx.strokeStyle = dimmed ? 'rgba(148, 163, 184, 0.02)' : 'rgba(148, 163, 184, 0.06)';
      ctx.lineWidth = 0.5;
    }
    ctx.stroke();
  });

  // ── Node trails (afterglow) ─────────────────────────────────
  nodes.forEach(n => {
    if (n.type === 'person') return;
    const trail = n._trail;
    if (trail.length < 2) return;

    const dimmed = activeNode && !activeSet.has(n.id);
    if (dimmed) return;

    const [r, g, b] = hexToRgb(COLORS[n.type]);
    for (let i = 0; i < trail.length - 1; i++) {
      const alpha = (i / trail.length) * 0.15;
      const p = trail[i];
      ctx.beginPath();
      ctx.arc(cx + p.x, cy + p.y, n.size * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
      ctx.fill();
    }
  });

  // ── Nodes ───────────────────────────────────────────────────
  // Sort: draw dimmed first, active on top
  const sortedNodes = [...nodes].sort((a, b) => {
    const aActive = activeNode ? (activeSet.has(a.id) ? 1 : 0) : 0;
    const bActive = activeNode ? (activeSet.has(b.id) ? 1 : 0) : 0;
    return aActive - bActive;
  });

  sortedNodes.forEach(n => {
    const x = cx + n._x;
    const y = cy + n._y;
    const color = COLORS[n.type];
    const [r, g, b] = hexToRgb(color);
    const isActive = activeNode && activeSet.has(n.id);
    const isHovered = n === hoverNode;
    const isSelected = n === selectedNode;
    const dimmed = activeNode && !isActive;
    const baseSize = n.size;
    const drawSize = isHovered ? baseSize * 1.3 : baseSize;

    // Person node: big radial sun glow
    if (n.type === 'person') {
      // Outer glow
      const sunGlow = ctx.createRadialGradient(x, y, 0, x, y, drawSize * 4);
      sunGlow.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0.25)`);
      sunGlow.addColorStop(0.4, `rgba(${r}, ${g}, ${b}, 0.08)`);
      sunGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = sunGlow;
      ctx.beginPath();
      ctx.arc(x, y, drawSize * 4, 0, Math.PI * 2);
      ctx.fill();

      // Inner glow
      const innerGlow = ctx.createRadialGradient(x, y, 0, x, y, drawSize * 2);
      innerGlow.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0.5)`);
      innerGlow.addColorStop(0.6, `rgba(${r}, ${g}, ${b}, 0.15)`);
      innerGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = innerGlow;
      ctx.beginPath();
      ctx.arc(x, y, drawSize * 2, 0, Math.PI * 2);
      ctx.fill();

      // Core
      ctx.beginPath();
      ctx.arc(x, y, drawSize, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();

      // Bright center
      const coreGrad = ctx.createRadialGradient(x - drawSize * 0.2, y - drawSize * 0.2, 0, x, y, drawSize);
      coreGrad.addColorStop(0, 'rgba(255,255,255,0.4)');
      coreGrad.addColorStop(0.5, 'rgba(255,255,255,0.05)');
      coreGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = coreGrad;
      ctx.beginPath();
      ctx.arc(x, y, drawSize, 0, Math.PI * 2);
      ctx.fill();

      // Label
      ctx.fillStyle = '#f8fafc';
      ctx.font = 'bold 14px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.label, x, y + drawSize + 18);
      return;
    }

    const alpha = dimmed ? 0.12 : 1;

    // Glow
    if (!dimmed) {
      const glowSize = isHovered ? drawSize * 3.5 : drawSize * 2.5;
      const glowAlpha = isHovered ? 0.35 : 0.18;
      const glow = ctx.createRadialGradient(x, y, 0, x, y, glowSize);
      glow.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${glowAlpha})`);
      glow.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${glowAlpha * 0.3})`);
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(x, y, glowSize, 0, Math.PI * 2);
      ctx.fill();
    }

    // Node body
    ctx.beginPath();
    ctx.arc(x, y, drawSize, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
    ctx.fill();

    // Highlight ring
    if (isHovered || isSelected) {
      ctx.beginPath();
      ctx.arc(x, y, drawSize + 3, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, 0.6)`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Specular highlight on node
    if (!dimmed) {
      const spec = ctx.createRadialGradient(x - drawSize * 0.25, y - drawSize * 0.25, 0, x, y, drawSize);
      spec.addColorStop(0, 'rgba(255,255,255,0.2)');
      spec.addColorStop(0.6, 'rgba(255,255,255,0.02)');
      spec.addColorStop(1, 'transparent');
      ctx.fillStyle = spec;
      ctx.beginPath();
      ctx.arc(x, y, drawSize, 0, Math.PI * 2);
      ctx.fill();
    }

    // Label
    const showLabel = !dimmed && (isActive || !activeNode);
    if (showLabel) {
      ctx.fillStyle = dimmed ? `rgba(148, 163, 184, 0.2)` : `rgba(226, 232, 240, ${isHovered ? 1 : 0.8})`;
      ctx.font = `${isHovered ? '600' : '500'} ${isHovered ? 12 : 11}px -apple-system, BlinkMacSystemFont, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Text shadow for readability
      if (!dimmed) {
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.shadowBlur = 6;
        ctx.fillText(n.label, x, y + drawSize + 14);
        ctx.restore();
      } else {
        ctx.fillText(n.label, x, y + drawSize + 14);
      }
    }
  });

  requestAnimationFrame(update);
}

requestAnimationFrame(update);
</script>
</body>
</html>
