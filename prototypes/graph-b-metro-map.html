<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Metro Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #f5f0e8; }
  canvas { display: block; position: fixed; top: 0; left: 0; }

  #tooltip {
    position: fixed;
    pointer-events: none;
    background: #2a2520;
    color: #f5f0e8;
    padding: 14px 18px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    max-width: 280px;
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 20;
    box-shadow: 0 6px 24px rgba(0,0,0,0.25);
    border: 1px solid rgba(245,240,232,0.1);
  }
  #tooltip.visible { opacity: 1; }
  #tooltip .tt-label {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 6px;
  }
  #tooltip .tt-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 3px;
  }
  #tooltip .tt-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  #tooltip .tt-meta {
    color: rgba(245,240,232,0.55); font-size: 11px; margin-top: 2px;
  }

  #legend {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(245,240,232,0.97);
    border: 2.5px solid #2a2520;
    border-radius: 10px;
    padding: 16px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    z-index: 15;
    box-shadow: 0 3px 16px rgba(0,0,0,0.08);
  }
  #legend .lg-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 10px; color: #2a2520;
  }
  #legend .lg-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 5px; cursor: pointer;
    padding: 3px 5px; border-radius: 4px;
    transition: background 0.12s;
  }
  #legend .lg-row:hover { background: rgba(42,37,32,0.06); }
  #legend .lg-row.on { background: rgba(42,37,32,0.1); }
  #legend .lg-bar {
    width: 26px; height: 5px; border-radius: 3px; flex-shrink: 0;
  }
  #legend .lg-name { color: #2a2520; font-size: 11px; }
  #legend .lg-sep { height: 1px; background: rgba(42,37,32,0.1); margin: 8px 0; }
  #legend .lg-sym {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 4px; font-size: 10px; color: #888;
  }

  #hdr {
    position: fixed; top: 20px; left: 24px; z-index: 15;
  }
  #hdr h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 20px;
    color: #2a2520; letter-spacing: 2px;
  }
  #hdr .sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: #aaa; margin-top: 2px; font-weight: 300;
  }
  #hint {
    position: fixed; top: 22px; right: 24px; z-index: 15;
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: #ccc; text-align: right; line-height: 1.8;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tooltip"></div>
<div id="hdr">
  <h1>CAREER TRANSIT MAP</h1>
  <div class="sub">Professional Experience Network &middot; 2016 &ndash; Present</div>
</div>
<div id="hint">hover for details<br>click to highlight a line<br>click background to reset</div>
<div id="legend">
  <div class="lg-title">Route Map</div>
  <div id="lg-lines"></div>
  <div class="lg-sep"></div>
  <div class="lg-sym"><svg width="16" height="16"><circle cx="8" cy="8" r="5.5" fill="#f5f0e8" stroke="#2a2520" stroke-width="2.5"/><circle cx="8" cy="8" r="2.5" fill="#2a2520"/></svg> Company Station</div>
  <div class="lg-sym"><svg width="16" height="16"><circle cx="8" cy="8" r="6.5" fill="#f5f0e8" stroke="#2B5EA7" stroke-width="2"/><circle cx="8" cy="8" r="3.5" fill="none" stroke="#2B5EA7" stroke-width="1.5"/></svg> Interchange (multi-co)</div>
  <div class="lg-sym"><svg width="16" height="16"><circle cx="8" cy="8" r="4" fill="#f5f0e8" stroke="#2B5EA7" stroke-width="2"/></svg> Skill Stop</div>
  <div class="lg-sym"><svg width="16" height="16"><line x1="1" y1="8" x2="15" y2="8" stroke="#E84D3D" stroke-width="2.5" stroke-dasharray="4,3"/></svg> Consulting</div>
</div>

<script>
// ===== DATA =====
const COLORS = {
  company:   '#E84D3D',
  skills:    '#2B5EA7',
  roles:     '#1B8A6B',
  projects:  '#D4A029',
  education: '#7B4FA0',
};
const LINE_NAMES = {
  company: 'Company Line', roles: 'Roles Line',
  skills: 'Skills Line', projects: 'Projects Line',
  education: 'Education Line',
};

const companies = [
  { id:'stanford', name:'Stanford University', y0:2016, y1:2016, role:'BS Computer Science', type:'education',
    skills:['System Design','Algorithms'], projects:[], industry:'Education' },
  { id:'datadog', name:'Datadog', y0:2017, y1:2019, role:'Backend Engineer', type:'company',
    skills:['PostgreSQL','Redis','Docker','Observability'], projects:['Analytics Dashboard'], industry:'SaaS' },
  { id:'stripe', name:'Stripe', y0:2019, y1:2022, role:'Staff Engineer', type:'company',
    skills:['TypeScript','Node.js','GraphQL','System Design','API Design','Payments'], projects:['API Gateway'], industry:'FinTech' },
  { id:'vercel', name:'Vercel', y0:2022, y1:2024, role:'Sr. Frontend Engineer', type:'company',
    skills:['TypeScript','React','Next.js','Tailwind CSS'], projects:['Design System','Developer SDK'], industry:'DevTools' },
  { id:'notion', name:'Notion', y0:2023, y1:2023, role:'React Consulting', type:'consulting',
    skills:['React'], projects:[], industry:'SaaS' },
  { id:'flyio', name:'Fly.io', y0:2024, y1:2026, role:'Platform Engineer', type:'company',
    skills:['Docker','Edge Computing','Rust'], projects:[], industry:'Infrastructure' },
];

// Skill index
const skillList = []; // unique ordered
const skillIdx = {}; // skill -> [{ company obj }]
companies.forEach(c => c.skills.forEach(s => {
  if (!skillIdx[s]) { skillIdx[s] = []; skillList.push(s); }
  skillIdx[s].push(c);
}));
const isTransfer = s => skillIdx[s].length > 1;

// ===== CANVAS =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR, animT = 0, hovered = null, activeLine = null, hits = [];

function resize() {
  DPR = devicePixelRatio || 1;
  W = innerWidth; H = innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

// ===== LAYOUT =====
const YR0 = 2015, YR1 = 2027, PL = 170, PR = 80;
function xOf(yr) { return PL + ((yr - YR0) / (YR1 - YR0)) * (W - PL - PR); }
function ease(t) { return 1 - (1 - t) ** 3; }
function sP(mid, p) { return Math.min(1, Math.max(0, (p - (mid - YR0) / (YR1 - YR0) + 0.12) / 0.12)); }
function lA(id) { return !activeLine ? 1 : activeLine === id ? 1 : 0.08; }

// ===== RENDER =====
function render() {
  ctx.clearRect(0, 0, W, H);
  hits = [];
  const p = ease(Math.min(animT, 1));

  // --- Layout zones ---
  // Trunk (company line) at vertical center-ish
  const trunkY = Math.round(H * 0.52);
  const rolesY = trunkY - 42;
  // Skills above: from top to rolesY - gap
  const skillTop = 80;
  const skillBot = rolesY - 28;
  // Projects below trunk
  const projTop = trunkY + 65;

  // Company positions on the trunk
  const mainCos = companies.filter(c => c.id !== 'notion');
  const coPos = {}; // id -> {x, y}
  mainCos.forEach(c => {
    const mid = (c.y0 + c.y1) / 2;
    coPos[c.id] = { x: xOf(mid), y: trunkY, mid };
  });
  coPos['notion'] = { x: xOf(2023), y: trunkY + 72, mid: 2023 };

  // Skill lane Y positions — evenly distribute
  const nSkills = skillList.length;
  const laneGap = Math.min(24, (skillBot - skillTop) / Math.max(nSkills - 1, 1));
  const totalSkillH = laneGap * (nSkills - 1);
  const skillStartY = skillTop + (skillBot - skillTop - totalSkillH) / 2;
  const skillY = {}; // skill -> y
  skillList.forEach((s, i) => { skillY[s] = Math.round(skillStartY + i * laneGap); });

  // ===== BACKGROUND =====
  ctx.fillStyle = '#f5f0e8';
  ctx.fillRect(0, 0, W, H);
  // Grid
  ctx.strokeStyle = 'rgba(42,37,32,0.03)';
  ctx.lineWidth = 1;
  for (let yr = YR0; yr <= YR1; yr++) {
    const x = xOf(yr);
    ctx.beginPath(); ctx.moveTo(x, 50); ctx.lineTo(x, H - 50); ctx.stroke();
  }
  for (let y = 50; y < H - 50; y += 36) {
    ctx.beginPath(); ctx.moveTo(PL - 30, y); ctx.lineTo(W - PR + 30, y); ctx.stroke();
  }
  // Zone tints
  ctx.fillStyle = 'rgba(43,94,167,0.015)';
  ctx.fillRect(PL - 10, skillTop - 10, W - PL - PR + 20, skillBot - skillTop + 20);
  ctx.fillStyle = 'rgba(212,160,41,0.015)';
  ctx.fillRect(PL - 10, projTop - 10, W - PL - PR + 20, 80);

  // ===== YEAR MARKERS =====
  {
    const by = H - 52;
    ctx.font = '500 11px "DM Mono", monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    for (let yr = 2016; yr <= 2026; yr++) {
      const x = xOf(yr);
      const a = Math.min(1, Math.max(0, (p * (YR1 - YR0) - (yr - YR0) + 2) / 2));
      if (a <= 0) continue;
      ctx.globalAlpha = a * 0.55;
      ctx.strokeStyle = 'rgba(42,37,32,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, by - 6); ctx.lineTo(x, by); ctx.stroke();
      ctx.fillStyle = '#aaa';
      ctx.fillText(String(yr), x, by + 4);
    }
    ctx.globalAlpha = 1;
  }

  // ===== EDUCATION LINE (purple diagonal) =====
  const stanPos = coPos['stanford'];
  if (stanPos) {
    const sp = sP(stanPos.mid, p);
    if (sp > 0) {
      ctx.globalAlpha = sp * lA('education');
      const ex = xOf(2014.6), ey = trunkY - 90;
      ctx.strokeStyle = COLORS.education;
      ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.arcTo(ex + 20, trunkY, stanPos.x, trunkY, 22);
      ctx.lineTo(stanPos.x, trunkY);
      ctx.stroke();
      // Label
      ctx.save();
      ctx.font = '500 9px "DM Mono", monospace';
      ctx.fillStyle = COLORS.education;
      ctx.translate(ex + 4, ey + 8);
      ctx.rotate(Math.atan2(trunkY - ey, 40));
      ctx.textBaseline = 'bottom'; ctx.textAlign = 'left';
      ctx.fillText('EDUCATION', 2, -4);
      ctx.restore();
      ctx.globalAlpha = 1;
    }
  }

  // ===== TRUNK LINE (red) =====
  {
    const x0 = xOf(2015.5), x1 = xOf(2026.5);
    const dx = x0 + (x1 - x0) * p;
    ctx.globalAlpha = lA('company');
    ctx.strokeStyle = COLORS.company;
    ctx.lineWidth = 6; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x0, trunkY); ctx.lineTo(dx, trunkY); ctx.stroke();
    if (p > 0.01) {
      ctx.fillStyle = COLORS.company;
      ctx.beginPath(); ctx.arc(x0, trunkY, 4, 0, Math.PI * 2); ctx.fill();
    }
    if (p >= 0.99) {
      ctx.fillStyle = COLORS.company;
      ctx.beginPath();
      ctx.moveTo(x1 + 10, trunkY); ctx.lineTo(x1 - 1, trunkY - 7); ctx.lineTo(x1 - 1, trunkY + 7);
      ctx.closePath(); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ===== ROLES LINE (green) =====
  {
    const x0 = xOf(2015.5), x1 = xOf(2026.5);
    const dx = x0 + (x1 - x0) * p;
    ctx.globalAlpha = lA('roles');
    ctx.strokeStyle = COLORS.roles;
    ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x0, rolesY); ctx.lineTo(dx, rolesY); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // ===== NOTION BRANCH (dashed spur) =====
  {
    const np = sP(2023, p);
    const nPos = coPos['notion'];
    if (np > 0) {
      ctx.globalAlpha = np * lA('company');
      const bx = xOf(2022.6);
      ctx.strokeStyle = COLORS.company;
      ctx.lineWidth = 3.5; ctx.lineCap = 'round';
      ctx.setLineDash([6, 5]);
      ctx.beginPath();
      ctx.moveTo(bx, trunkY);
      ctx.arcTo(bx, nPos.y, nPos.x, nPos.y, 16);
      ctx.lineTo(nPos.x, nPos.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.font = '300 8px "DM Mono", monospace';
      ctx.fillStyle = 'rgba(232,77,61,0.45)';
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillText('consulting', bx + 5, trunkY + 6);
      ctx.globalAlpha = 1;
    }
  }

  // ===== SKILL LANES (blue) =====
  // Each skill gets a horizontal lane. Where a company uses that skill,
  // we draw a vertical connector from the lane down to the trunk.
  // Transfer skills get a continuous horizontal line across their company span.
  // Non-transfer skills just get a dot at the company X.

  skillList.forEach(skill => {
    const sy = skillY[skill];
    const occs = skillIdx[skill];
    const transfer = isTransfer(skill);

    // Sort occurrences by start year
    const sorted = occs.slice().sort((a, b) => a.y0 - b.y0);
    const firstCo = sorted[0];
    const lastCo = sorted[sorted.length - 1];
    const firstPos = coPos[firstCo.id];
    const lastPos = coPos[lastCo.id];
    if (!firstPos || !lastPos) return;

    const fp = sP(firstPos.mid, p);
    if (fp <= 0) return;

    ctx.globalAlpha = fp * lA('skills');

    if (transfer) {
      // Draw horizontal line spanning all companies that use this skill
      const lp = sP(lastPos.mid, p);
      const drawAlpha = Math.min(fp, lp > 0 ? lp : fp);
      ctx.globalAlpha = drawAlpha * lA('skills');

      ctx.strokeStyle = COLORS.skills;
      ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(firstPos.x, sy);
      ctx.lineTo(lastPos.x, sy);
      ctx.stroke();

      // Vertical connectors from skill lane down to rolesY zone (stopping just above the roles line)
      sorted.forEach(co => {
        const cp = coPos[co.id];
        if (!cp) return;
        const csp = sP(cp.mid, p);
        if (csp <= 0) return;
        ctx.globalAlpha = csp * lA('skills') * 0.35;
        ctx.strokeStyle = COLORS.skills;
        ctx.lineWidth = 1; ctx.setLineDash([2, 3]);
        ctx.beginPath();
        ctx.moveTo(cp.x, sy + 8);
        ctx.lineTo(cp.x, rolesY - 14);
        ctx.stroke();
        ctx.setLineDash([]);
      });

      // Transfer nodes at each company
      sorted.forEach(co => {
        const cp = coPos[co.id];
        if (!cp) return;
        const csp = sP(cp.mid, p);
        if (csp <= 0) return;
        ctx.globalAlpha = csp * lA('skills');
        // Double ring
        ctx.fillStyle = '#f5f0e8';
        ctx.beginPath(); ctx.arc(cp.x, sy, 8, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = COLORS.skills; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cp.x, sy, 7, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cp.x, sy, 3.5, 0, Math.PI * 2); ctx.stroke();

        hits.push({
          x: cp.x, y: sy, r: 10, type: 'skill', line: 'skills',
          label: skill, company: co.name, isTransfer: true,
          companies: skillIdx[skill].map(o => o.name).join(', '),
        });
      });
    } else {
      // Single company skill: small dot + vertical connector
      const co = firstCo;
      const cp = coPos[co.id];
      if (!cp) return;
      const csp = sP(cp.mid, p);
      if (csp <= 0) return;
      ctx.globalAlpha = csp * lA('skills');

      // Vertical connector
      ctx.strokeStyle = COLORS.skills;
      ctx.lineWidth = 1.5; ctx.lineCap = 'round';
      ctx.globalAlpha = csp * lA('skills') * 0.3;
      ctx.setLineDash([2, 3]);
      ctx.beginPath();
      ctx.moveTo(cp.x, sy + 6);
      ctx.lineTo(cp.x, rolesY - 14);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.globalAlpha = csp * lA('skills');
      // Simple circle node
      ctx.fillStyle = '#f5f0e8';
      ctx.beginPath(); ctx.arc(cp.x, sy, 5.5, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = COLORS.skills; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cp.x, sy, 4.5, 0, Math.PI * 2); ctx.stroke();

      hits.push({
        x: cp.x, y: sy, r: 8, type: 'skill', line: 'skills',
        label: skill, company: co.name, isTransfer: false,
        companies: co.name,
      });
    }

    // Skill label on the left margin
    ctx.globalAlpha = fp * lA('skills');
    ctx.font = transfer ? '500 9px "DM Mono", monospace' : '300 9px "DM Mono", monospace';
    ctx.fillStyle = transfer ? 'rgba(43,94,167,0.9)' : 'rgba(43,94,167,0.6)';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(skill, PL - 16, sy);
  });
  ctx.globalAlpha = 1;

  // ===== PROJECT BRANCHES (amber, below trunk) =====
  mainCos.forEach(co => {
    if (!co.projects.length) return;
    const cp = coPos[co.id];
    const sp = sP(cp.mid, p);
    if (sp <= 0) return;

    co.projects.forEach((proj, pi) => {
      const py = projTop + pi * 30;
      const px = cp.x + (pi - (co.projects.length - 1) / 2) * 24;

      ctx.globalAlpha = sp * lA('projects');
      ctx.strokeStyle = COLORS.projects;
      ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(cp.x, trunkY);
      ctx.lineTo(cp.x, trunkY + 14);
      ctx.arcTo(cp.x, py - 6, px, py - 6, 10);
      ctx.lineTo(px, py);
      ctx.stroke();

      // Node
      ctx.fillStyle = COLORS.projects;
      ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#f5f0e8';
      ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI * 2); ctx.fill();

      // Label
      ctx.font = '400 9px "DM Mono", monospace';
      ctx.fillStyle = COLORS.projects;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(proj, px, py + 8);

      hits.push({
        x: px, y: py, r: 10, type: 'project', line: 'projects',
        label: proj, company: co.name,
        years: co.y0 + '\u2013' + (co.y1 >= 2026 ? 'Present' : co.y1),
      });
    });
  });
  ctx.globalAlpha = 1;

  // ===== ROLE STOPS (on green line) =====
  mainCos.forEach(co => {
    const cp = coPos[co.id];
    const sp = sP(cp.mid, p);
    if (sp <= 0) return;
    ctx.globalAlpha = sp * lA('roles');

    // Faint connector to trunk
    ctx.strokeStyle = 'rgba(27,138,107,0.15)';
    ctx.lineWidth = 1; ctx.setLineDash([2, 3]);
    ctx.beginPath(); ctx.moveTo(cp.x, rolesY + 5); ctx.lineTo(cp.x, trunkY - 12); ctx.stroke();
    ctx.setLineDash([]);

    // Dot
    ctx.fillStyle = '#f5f0e8';
    ctx.beginPath(); ctx.arc(cp.x, rolesY, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = COLORS.roles;
    ctx.beginPath(); ctx.arc(cp.x, rolesY, 3.5, 0, Math.PI * 2); ctx.fill();

    // Role text
    ctx.font = '400 9px "DM Mono", monospace';
    ctx.fillStyle = COLORS.roles;
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(co.role, cp.x, rolesY - 8);

    hits.push({
      x: cp.x, y: rolesY, r: 12, type: 'role', line: 'roles',
      label: co.role, company: co.name,
      years: co.y0 + '\u2013' + (co.y1 >= 2026 ? 'Present' : co.y1),
    });
    ctx.globalAlpha = 1;
  });

  // ===== COMPANY STATIONS (on top) =====
  const allCos = [...mainCos, companies.find(c => c.id === 'notion')];
  allCos.forEach(co => {
    const cp = coPos[co.id];
    if (!cp) return;
    const sp = sP(cp.mid, p);
    if (sp <= 0) return;

    const isHov = hovered && hovered.label === co.name && hovered.type === 'company';
    const lineId = co.type === 'education' ? 'education' : 'company';
    const alpha = lineId === 'education' ? Math.max(lA('education'), lA('company')) : lA('company');
    ctx.globalAlpha = sp * alpha;

    const r = isHov ? 12 : 10;
    const color = co.type === 'education' ? COLORS.education : COLORS.company;

    // White knockout
    ctx.fillStyle = '#f5f0e8';
    ctx.beginPath(); ctx.arc(cp.x, cp.y, r + 4, 0, Math.PI * 2); ctx.fill();
    // Outer ring
    ctx.strokeStyle = color; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(cp.x, cp.y, r, 0, Math.PI * 2); ctx.stroke();
    // Inner dot
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(cp.x, cp.y, r * 0.38, 0, Math.PI * 2); ctx.fill();

    // Company name
    ctx.font = '700 13px "Syne", sans-serif';
    ctx.fillStyle = '#2a2520';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(co.name, cp.x, cp.y + r + 7);
    // Year
    ctx.font = '300 10px "DM Mono", monospace';
    ctx.fillStyle = '#b0a898';
    const yl = co.y0 === co.y1 ? String(co.y0) : co.y0 + '\u2013' + (co.y1 >= 2026 ? 'Present' : co.y1);
    ctx.fillText(yl, cp.x, cp.y + r + 23);
    // Industry
    ctx.font = '400 8px "DM Mono", monospace';
    ctx.fillStyle = 'rgba(42,37,32,0.3)';
    ctx.fillText(co.industry, cp.x, cp.y + r + 36);

    hits.push({
      x: cp.x, y: cp.y, r: r + 8, type: 'company', line: lineId,
      label: co.name, role: co.role, industry: co.industry,
      years: yl, skills: co.skills, projects: co.projects,
    });
    ctx.globalAlpha = 1;
  });

  // ===== ZONE LABELS =====
  ctx.globalAlpha = p * 0.25;
  ctx.font = '700 9px "Syne", sans-serif';
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = COLORS.skills;
  ctx.fillText('SKILLS', PL - 60, (skillTop + skillBot) / 2);
  ctx.fillStyle = COLORS.projects;
  ctx.fillText('PROJECTS', PL - 60, projTop + 15);
  ctx.globalAlpha = 1;
}

// ===== ANIMATION =====
let t0 = null;
const DUR = 2800;
function loop(ts) {
  if (!t0) t0 = ts;
  animT = Math.min((ts - t0) / DUR, 1);
  render();
  if (animT < 1) requestAnimationFrame(loop);
}

// ===== INTERACTION =====
const tooltip = document.getElementById('tooltip');

function hitTest(mx, my) {
  for (let i = hits.length - 1; i >= 0; i--) {
    const h = hits[i];
    if ((mx - h.x) ** 2 + (my - h.y) ** 2 <= h.r ** 2) return h;
  }
  return null;
}

canvas.addEventListener('mousemove', e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    canvas.style.cursor = 'pointer';
    hovered = hit;
    showTip(hit, e.clientX, e.clientY);
    if (animT >= 1) render();
  } else {
    if (hovered) { hovered = null; if (animT >= 1) render(); }
    canvas.style.cursor = 'default';
    tooltip.classList.remove('visible');
  }
});

canvas.addEventListener('click', e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    activeLine = activeLine === hit.line ? null : hit.line;
  } else {
    activeLine = null;
  }
  updateLegend();
  if (animT >= 1) render();
});

canvas.addEventListener('mouseleave', () => {
  hovered = null; tooltip.classList.remove('visible');
  if (animT >= 1) render();
});

function showTip(item, mx, my) {
  let h = '';
  const lc = COLORS[item.line] || '#2a2520';
  if (item.type === 'company') {
    h = `<div class="tt-label">${item.label}</div>`;
    h += `<div class="tt-row"><span class="tt-dot" style="background:${lc}"></span>${item.role}</div>`;
    h += `<div class="tt-meta">${item.years} &middot; ${item.industry}</div>`;
    if (item.skills?.length) h += `<div class="tt-meta" style="margin-top:5px">Skills: ${item.skills.join(', ')}</div>`;
    if (item.projects?.length) h += `<div class="tt-meta">Projects: ${item.projects.join(', ')}</div>`;
  } else if (item.type === 'skill') {
    h = `<div class="tt-label">${item.label}</div>`;
    h += item.isTransfer
      ? `<div class="tt-row"><span class="tt-dot" style="background:${COLORS.skills}"></span>Interchange Skill</div><div class="tt-meta">Used at: ${item.companies}</div>`
      : `<div class="tt-row"><span class="tt-dot" style="background:${COLORS.skills}"></span>${item.company}</div>`;
  } else if (item.type === 'project') {
    h = `<div class="tt-label">${item.label}</div>`;
    h += `<div class="tt-row"><span class="tt-dot" style="background:${COLORS.projects}"></span>${item.company}</div>`;
    h += `<div class="tt-meta">${item.years}</div>`;
  } else if (item.type === 'role') {
    h = `<div class="tt-label">${item.label}</div>`;
    h += `<div class="tt-row"><span class="tt-dot" style="background:${COLORS.roles}"></span>${item.company}</div>`;
    h += `<div class="tt-meta">${item.years}</div>`;
  }
  tooltip.innerHTML = h;
  tooltip.classList.add('visible');
  requestAnimationFrame(() => {
    const rect = tooltip.getBoundingClientRect();
    let tx = mx + 16, ty = my - 10;
    if (tx + rect.width > W - 12) tx = mx - rect.width - 16;
    if (ty + rect.height > H - 12) ty = H - 12 - rect.height;
    if (ty < 8) ty = 8;
    tooltip.style.left = tx + 'px'; tooltip.style.top = ty + 'px';
  });
}

// ===== LEGEND =====
function buildLegend() {
  const el = document.getElementById('lg-lines');
  Object.keys(LINE_NAMES).forEach(k => {
    const row = document.createElement('div');
    row.className = 'lg-row'; row.dataset.line = k;
    row.innerHTML = `<div class="lg-bar" style="background:${COLORS[k]}"></div><div class="lg-name">${LINE_NAMES[k]}</div>`;
    row.onclick = () => {
      activeLine = activeLine === k ? null : k;
      updateLegend();
      if (animT >= 1) render();
    };
    el.appendChild(row);
  });
}
function updateLegend() {
  document.querySelectorAll('.lg-row').forEach(r => r.classList.toggle('on', r.dataset.line === activeLine));
}

// ===== INIT =====
addEventListener('resize', () => { resize(); if (animT >= 1) render(); });
resize();
buildLegend();
requestAnimationFrame(loop);
</script>
</body>
</html>
