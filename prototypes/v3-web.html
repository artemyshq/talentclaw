<!DOCTYPE html>

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: rgba(255,255,255,0.03);
    --surface-hover: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.14);

    --text-secondary: #a1a1aa;
    --text-tertiary: #71717a;

    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
  }

  canvas.dragging { cursor: grabbing; }

  /* ── Top Bar ── */
  #top-bar {
    position: fixed;
    top: 16px;
    left: 16px;
    right: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 30;
    pointer-events: none;
  }

  #top-bar > * { pointer-events: auto; }

  #search-wrap {
    position: relative;
    width: 240px;
    flex-shrink: 0;
  }

  #search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    pointer-events: none;
  }

  #search {
    width: 100%;
    height: 36px;
    padding: 0 12px 0 32px;
    background: rgba(15,15,22,0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: var(--font);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }

  #search::placeholder { color: var(--text-tertiary); }
  #search:focus { border-color: var(--border-hover); background: rgba(18,18,28,0.95); }

  #filters {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    background: rgba(15,15,22,0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    height: 28px;
    padding: 0 10px;
    border: none;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text-secondary);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover { background: var(--surface-hover); color: var(--text-primary); }

  .filter-btn.active { background: var(--surface-hover); color: var(--text-primary); }

  .filter-btn .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .filter-btn.inactive { opacity: 0.35; }
  .filter-btn.inactive:hover { opacity: 0.6; }

  /* ── Detail Panel ── */
  #detail-panel {
    position: fixed;
    top: 68px;
    right: 16px;
    width: 280px;
    background: rgba(15,15,22,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    z-index: 20;
    opacity: 0;
    transform: translateX(8px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    overflow: hidden;
  }

  #detail-panel.visible {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }

  #panel-header {
    padding: 20px 20px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  #panel-close {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--text-tertiary);
    cursor: pointer;
    border-radius: 4px;
    flex-shrink: 0;
    margin-left: 8px;

  #panel-close:hover { color: var(--text-secondary); background: var(--surface-hover); }

  #panel-type {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  #panel-label {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.3;
  }

  #panel-detail {
    font-size: 13px;
    color: var(--text-secondary);
    padding: 4px 20px 0;
  }

  #panel-divider {
    height: 1px;
    background: var(--border);
    margin: 16px 20px;
  }

  #panel-connections-label {

    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
    padding: 0 20px;

  #panel-connections {

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 40;
    background: rgba(18,18,28,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border: none;
    background: transparent;
    color: var(--text-secondary);

  .zoom-sep {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }
</style>

// ── Node map and adjacency ──
const nodeMap = new Map(nodes.map(n => [n.id, n]));
const adjacency = new Map();
nodes.forEach(n => adjacency.set(n.id, new Set()));
edges.forEach(e => {
  adjacency.get(e.source)?.add(e.target);
  adjacency.get(e.target)?.add(e.source);
});

// ── Type visibility ──
const typeVisible = {};
Object.keys(TYPE_COLORS).forEach(t => typeVisible[t] = true);

// ── Build filter buttons ──
const filtersEl = document.getElementById('filters');
Object.keys(TYPE_COLORS).forEach(type => {

  btn.className = 'filter-btn active';
  btn.dataset.type = type;

  btn.onclick = () => {
    typeVisible[type] = !typeVisible[type];
    btn.className = `filter-btn ${typeVisible[type] ? 'active' : 'inactive'}`;

// ── Stats ──
document.getElementById('stat-nodes').textContent = `${nodes.length} nodes`;

// ── Search ──
let searchQuery = '';

searchInput.addEventListener('input', e => {

// ── Canvas setup ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── Camera (pan/zoom with smooth easing) ──
let cam = { x: 0, y: 0, zoom: 1 };
let camTarget = { x: 0, y: 0, zoom: 1 };
const CAM_EASE = 0.12;

function worldToScreen(wx, wy) {
  return {
    x: (wx - cam.x) * cam.zoom + W / 2,
    y: (wy - cam.y) * cam.zoom + H / 2,
  };
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - W / 2) / cam.zoom + cam.x,
    y: (sy - H / 2) / cam.zoom + cam.y,
  };
}

// ── Force simulation (custom, no d3 dependency) ──
// Each node gets x, y, vx, vy
const SIM_NODES = nodes.map(n => ({
  ...n,
  x: (Math.random() - 0.5) * 300,
  y: (Math.random() - 0.5) * 300,
  vx: 0,
  vy: 0,
  _visible: true,
  _searchMatch: true,
}));

const simNodeMap = new Map(SIM_NODES.map(n => [n.id, n]));
const SIM_EDGES = edges.map(e => ({
  source: simNodeMap.get(e.source),
  target: simNodeMap.get(e.target),
}));

// Cluster centers to encourage grouping
const CLUSTER_ANGLES = {
  center: 0,
  companies: 0,
  titles: Math.PI * 0.33,
  skills: Math.PI * 0.67,
  projects: Math.PI,
  education: Math.PI * 1.33,
  goals: Math.PI * 1.67,
  industries: Math.PI * 0.15,
};

const CLUSTER_DIST = 180;

function clusterCenter(cluster) {
  const a = CLUSTER_ANGLES[cluster] ?? 0;
  if (cluster === 'center') return { x: 0, y: 0 };
  return { x: Math.cos(a) * CLUSTER_DIST, y: Math.sin(a) * CLUSTER_DIST };
}

// Simulation step
const ALPHA_DECAY = 0.002;
const ALPHA_MIN = 0.001;
const VELOCITY_DECAY = 0.4;
let alpha = 1;

function simStep() {
  if (alpha < ALPHA_MIN) return;

  const n = SIM_NODES.length;

  // 1. Repulsion (charge) - between all visible nodes
  for (let i = 0; i < n; i++) {
    if (!SIM_NODES[i]._visible) continue;
    for (let j = i + 1; j < n; j++) {
      if (!SIM_NODES[j]._visible) continue;
      const a = SIM_NODES[i];
      const b = SIM_NODES[j];
      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let d2 = dx * dx + dy * dy;
      if (d2 < 1) d2 = 1;
      const d = Math.sqrt(d2);
      const strength = -800 * alpha / d2;
      const fx = dx / d * strength;
      const fy = dy / d * strength;
      a.vx -= fx;
      a.vy -= fy;
      b.vx += fx;
      b.vy += fy;
    }
  }

  // 2. Link attraction
  const linkStrength = 0.15 * alpha;
  const targetDist = 70;
  for (const e of SIM_EDGES) {
    if (!e.source._visible || !e.target._visible) continue;
    let dx = e.target.x - e.source.x;
    let dy = e.target.y - e.source.y;
    let d = Math.sqrt(dx * dx + dy * dy) || 1;
    const force = (d - targetDist) * linkStrength;
    const fx = dx / d * force;
    const fy = dy / d * force;
    e.source.vx += fx;
    e.source.vy += fy;
    e.target.vx -= fx;
    e.target.vy -= fy;
  }

  // 3. Cluster attraction
  const clusterStrength = 0.04 * alpha;
  for (const node of SIM_NODES) {
    if (!node._visible) continue;
    const cc = clusterCenter(node.cluster);
    node.vx += (cc.x - node.x) * clusterStrength;
    node.vy += (cc.y - node.y) * clusterStrength;
  }

  // 4. Center gravity
  const centerStrength = 0.01 * alpha;
  for (const node of SIM_NODES) {
    if (!node._visible) continue;
    node.vx -= node.x * centerStrength;
    node.vy -= node.y * centerStrength;
  }

  // 5. Apply velocity
  for (const node of SIM_NODES) {
    if (!node._visible) continue;
    if (node._dragging) { node.vx = 0; node.vy = 0; continue; }
    node.vx *= (1 - VELOCITY_DECAY);
    node.vy *= (1 - VELOCITY_DECAY);
    node.x += node.vx;
    node.y += node.vy;
  }

  alpha = Math.max(alpha - ALPHA_DECAY, 0);
}

function reheat() {
  alpha = 0.3;
}

// ── Visibility ──
function updateVisibility() {
  for (const n of SIM_NODES) {
    n._visible = typeVisible[n.type];
  }
  reheat();
}

// ── Interaction state ──
let hoveredNode = null;
let selectedNode = null;
let dragNode = null;
let isDragging = false;
let isPanning = false;
let panStart = null;
let camStartOnPan = null;

// ── Hit test ──
function hitTest(sx, sy) {
  const w = screenToWorld(sx, sy);
  let best = null;
  let bestD2 = Infinity;
  for (const n of SIM_NODES) {
    if (!n._visible) continue;
    const r = nodeRadius(n);
    const dx = w.x - n.x;
    const dy = w.y - n.y;
    const d2 = dx * dx + dy * dy;
    const hitR = Math.max(r + 4, 12) / cam.zoom;  // generous hit area
    if (d2 < hitR * hitR && d2 < bestD2) {
      bestD2 = d2;
      best = n;
    }
  }
  return best;
}

function nodeRadius(n) {
  return n.size * 1.2;
}

// ── Mouse events ──
canvas.addEventListener('mousedown', e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    dragNode = hit;
    hit._dragging = true;
    isDragging = false;
    canvas.classList.add('dragging');
  } else {
    isPanning = true;
    panStart = { x: e.clientX, y: e.clientY };
    camStartOnPan = { x: camTarget.x, y: camTarget.y };
    canvas.classList.add('dragging');
  }
});

window.addEventListener('mousemove', e => {
  if (dragNode) {
    isDragging = true;
    const w = screenToWorld(e.clientX, e.clientY);
    dragNode.x = w.x;
    dragNode.y = w.y;
    reheat();
  } else if (isPanning) {
    const dx = (e.clientX - panStart.x) / cam.zoom;
    const dy = (e.clientY - panStart.y) / cam.zoom;
    camTarget.x = camStartOnPan.x - dx;
    camTarget.y = camStartOnPan.y - dy;
  } else {
    const hit = hitTest(e.clientX, e.clientY);
    if (hit !== hoveredNode) {
      hoveredNode = hit;
      canvas.style.cursor = hit ? 'pointer' : 'grab';
    }
    // Tooltip
    const tooltip = document.getElementById('tooltip');
    if (hit && hit !== selectedNode) {
      document.getElementById('tooltip-label').textContent = hit.label;
      document.getElementById('tooltip-detail').textContent = hit.detail || TYPE_LABELS[hit.type];
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      tooltip.classList.add('visible');
    } else {
      tooltip.classList.remove('visible');
    }
  }
});

window.addEventListener('mouseup', e => {
  if (dragNode) {
    if (!isDragging) {
      // It was a click, not a drag
      selectNode(dragNode);
    }
    dragNode._dragging = false;
    dragNode = null;
    isDragging = false;
    canvas.classList.remove('dragging');
    reheat();
  }
  if (isPanning) {
    isPanning = false;
    canvas.classList.remove('dragging');
  }
});

// ── Wheel zoom ──
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = 1 - e.deltaY * 0.001;
  const newZoom = Math.max(0.15, Math.min(5, camTarget.zoom * zoomFactor));

  // Zoom toward cursor
  const wx = (e.clientX - W / 2) / cam.zoom + cam.x;
  const wy = (e.clientY - H / 2) / cam.zoom + cam.y;

  camTarget.zoom = newZoom;
  camTarget.x = wx - (e.clientX - W / 2) / newZoom;
  camTarget.y = wy - (e.clientY - H / 2) / newZoom;
}, { passive: false });

// ── Zoom buttons ──
document.getElementById('zoom-in').onclick = () => {
  camTarget.zoom = Math.min(5, camTarget.zoom * 1.3);
};
document.getElementById('zoom-out').onclick = () => {
  camTarget.zoom = Math.max(0.15, camTarget.zoom / 1.3);
};
document.getElementById('zoom-fit').onclick = fitToView;

function fitToView() {
  const visible = SIM_NODES.filter(n => n._visible);
  if (!visible.length) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const n of visible) {
    const r = nodeRadius(n);
    minX = Math.min(minX, n.x - r);
    minY = Math.min(minY, n.y - r);
    maxX = Math.max(maxX, n.x + r);
    maxY = Math.max(maxY, n.y + r);
  }
  const cw = maxX - minX + 100;
  const ch = maxY - minY + 100;
  camTarget.x = (minX + maxX) / 2;
  camTarget.y = (minY + maxY) / 2;
  camTarget.zoom = Math.min(W / cw, H / ch, 2.5);
}

// ── Selection / detail panel ──
const detailPanel = document.getElementById('detail-panel');

function selectNode(node) {
  if (selectedNode === node) {
    selectedNode = null;
    detailPanel.classList.remove('visible');
    return;
  }
  selectedNode = node;
  const color = TYPE_COLORS[node.type];

  document.getElementById('panel-type').textContent = TYPE_LABELS[node.type];
  document.getElementById('panel-type').style.color = color;
  document.getElementById('panel-label').textContent = node.label;
  document.getElementById('panel-detail').textContent = node.detail || '';
  document.getElementById('panel-detail').style.display = node.detail ? 'block' : 'none';

  // Connected nodes
  const connEl = document.getElementById('panel-connections');
  connEl.innerHTML = '';
  const neighbors = adjacency.get(node.id);
  if (neighbors) {
    for (const nid of neighbors) {
      const nn = nodeMap.get(nid);
      if (!nn) continue;
      const item = document.createElement('div');
      item.className = 'conn-item';
      item.innerHTML = `<span class="dot" style="background:${TYPE_COLORS[nn.type]}"></span>${nn.label}`;
      item.onclick = () => {
        const sn = simNodeMap.get(nid);
        if (sn && sn._visible) selectNode(sn);
      };
      connEl.appendChild(item);
    }
  }

  detailPanel.classList.add('visible');

  // Tooltip should hide
  document.getElementById('tooltip').classList.remove('visible');
}

document.getElementById('panel-close').onclick = () => {
  selectedNode = null;
  detailPanel.classList.remove('visible');
};

// Click on canvas background to deselect
canvas.addEventListener('dblclick', e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    // Focus on the node
    camTarget.x = hit.x;
    camTarget.y = hit.y;
    camTarget.zoom = Math.min(camTarget.zoom * 1.5, 3);
  }
});

// ── Rendering ──
function draw() {
  // Ease camera
  cam.x += (camTarget.x - cam.x) * CAM_EASE;
  cam.y += (camTarget.y - cam.y) * CAM_EASE;
  cam.zoom += (camTarget.zoom - cam.zoom) * CAM_EASE;

  // Simulation
  simStep();

  // Search matching
  const hasSearch = searchQuery.length > 0;
  for (const n of SIM_NODES) {
    n._searchMatch = !hasSearch || n.label.toLowerCase().includes(searchQuery) || (n.type && n.type.includes(searchQuery));
  }

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  // Connected set for hover/select highlighting
  const highlightSet = new Set();
  const highlightEdges = new Set();
  const focusNode = hoveredNode || selectedNode;
  if (focusNode) {
    highlightSet.add(focusNode.id);
    const neighbors = adjacency.get(focusNode.id);
    if (neighbors) neighbors.forEach(nid => highlightSet.add(nid));
    for (let i = 0; i < SIM_EDGES.length; i++) {
      const e = SIM_EDGES[i];
      if (e.source.id === focusNode.id || e.target.id === focusNode.id) {
        highlightEdges.add(i);
      }
    }
  }

  const hasFocus = focusNode != null;

  // ── Draw edges ──
  for (let i = 0; i < SIM_EDGES.length; i++) {
    const e = SIM_EDGES[i];
    if (!e.source._visible || !e.target._visible) continue;

    const s = worldToScreen(e.source.x, e.source.y);
    const t = worldToScreen(e.target.x, e.target.y);

    let opacity;
    if (hasFocus) {
      opacity = highlightEdges.has(i) ? 0.35 : 0.04;
    } else if (hasSearch) {
      const bothMatch = e.source._searchMatch && e.target._searchMatch;
      opacity = bothMatch ? 0.2 : 0.03;
    } else {
      opacity = 0.1;
    }

    let color;
    if (highlightEdges.has(i)) {
      // Blend source and target colors
      color = TYPE_COLORS[focusNode.type];
    } else {
      color = '#ffffff';
    }

    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(t.x, t.y);
    ctx.strokeStyle = color;
    ctx.globalAlpha = opacity;
    ctx.lineWidth = highlightEdges.has(i) ? 1.2 : 0.8;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // ── Draw nodes ──
  // Sort: draw non-highlighted first, highlighted on top
  const sortedNodes = [...SIM_NODES].sort((a, b) => {
    const aH = highlightSet.has(a.id) ? 1 : 0;
    const bH = highlightSet.has(b.id) ? 1 : 0;
    if (aH !== bH) return aH - bH;
    return a.size - b.size;
  });

  for (const n of sortedNodes) {
    if (!n._visible) continue;

    const s = worldToScreen(n.x, n.y);
    const r = nodeRadius(n) * cam.zoom;
    const color = TYPE_COLORS[n.type];

    // Off-screen culling
    if (s.x + r < -50 || s.x - r > W + 50 || s.y + r < -50 || s.y - r > H + 50) continue;

    let nodeOpacity;
    if (hasFocus) {
      nodeOpacity = highlightSet.has(n.id) ? 1 : 0.15;
    } else if (hasSearch) {
      nodeOpacity = n._searchMatch ? 1 : 0.12;
    } else {
      nodeOpacity = 1;
    }

    const isHovered = n === hoveredNode;
    const isSelected = n === selectedNode;
    const scale = isHovered ? 1.15 : isSelected ? 1.1 : 1;
    const drawR = r * scale;

    ctx.globalAlpha = nodeOpacity;

    // Subtle shadow for depth
    if (nodeOpacity > 0.5) {
      ctx.shadowColor = 'rgba(0,0,0,0.4)';
      ctx.shadowBlur = 8;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 2;
    }

    // Fill
    ctx.beginPath();
    ctx.arc(s.x, s.y, drawR, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    // Reset shadow
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;

    // Border
    ctx.beginPath();
    ctx.arc(s.x, s.y, drawR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = isSelected ? 2 : 1;
    ctx.stroke();

    // Selected ring
    if (isSelected) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, drawR + 4, 0, Math.PI * 2);
      ctx.strokeStyle = color;
      ctx.globalAlpha = nodeOpacity * 0.4;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.globalAlpha = nodeOpacity;
    }

    // Label
    const showLabel = n.size >= 8 || isHovered || isSelected || (highlightSet.has(n.id) && hasFocus);
    if (showLabel && nodeOpacity > 0.1) {
      const fontSize = Math.max(10, Math.min(13, 11 * cam.zoom));
      ctx.font = `500 ${fontSize}px ${getComputedStyle(document.body).fontFamily}`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      const labelY = s.y + drawR + 6;
      const text = n.label;
      const metrics = ctx.measureText(text);

      // Background pill behind text
      const px = 5, py = 2;
      ctx.fillStyle = 'rgba(10,10,15,0.75)';
      const pillW = metrics.width + px * 2;
      const pillH = fontSize + py * 2;
      ctx.beginPath();
      roundRect(ctx, s.x - pillW / 2, labelY - py, pillW, pillH, 3);
      ctx.fill();

      ctx.fillStyle = nodeOpacity > 0.5 ? '#d4d4d8' : '#71717a';
      ctx.globalAlpha = nodeOpacity;
      ctx.fillText(text, s.x, labelY);
    }

    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(draw);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── Keyboard ──
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    selectedNode = null;
    detailPanel.classList.remove('visible');
    searchInput.blur();
    searchQuery = '';
    searchInput.value = '';
  }
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
});

// ── Initial fit ──
// Let simulation settle briefly, then fit
let initFrames = 0;
function initLoop() {
  simStep();
  initFrames++;
  if (initFrames < 120) {
    requestAnimationFrame(initLoop);
  } else {
    fitToView();
    requestAnimationFrame(draw);
  }
}
initLoop();
</script>
</body>
</html>
